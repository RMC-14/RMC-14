- type: entity
  abstract: true
  parent: BaseStorageItem
  id: CMPacketBase
  name: packet
  components:
  - type: Sprite
    sprite: _CM14/Objects/Storage/packets.rsi
    layers:
    - state: general_packet
    - state: general_packet_e
      map: [ "emptyLayer" ]
      visible: false
  - type: Item
    size: Normal
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,5,1 # 3 slots
    whitelist:
      tags:
      - Grenade
  - type: UseDelay
    delay: 0.5
  - type: FixedItemSizeStorage
  - type: GenericVisualizer
    visuals:
      enum.SharedEmptyStorageVisuals.StorageState:
        emptyLayer:
          Empty: { visible: true }
          NotEmpty: { visible: false }
  - type: Appearance

- type: entity
  parent: CMPacketBase
  id: CMPacketGrenadeHighExplosive
  name: HEDP grenade packet
  description: It contains three HEDP high explosive grenades.
  components:
  - type: Sprite
    layers:
    - state: hedp_packet
    - state: hedp_packet_e
      map: [ "emptyLayer" ]
      visible: false

- type: entity
  parent: CMPacketGrenadeHighExplosive
  id: CMPacketGrenadeHighExplosiveFilled
  name: HEDP grenade packet
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMGrenadeHighExplosive
      amount: 3

- type: entity
  parent: CMPacketBase
  id: CMPacketGrenadeFrag
  name: HEFA grenade packet
  description: It contains three HEFA grenades. Don't tell the HEFA order.
  components:
  - type: Sprite
    layers:
    - state: hefa_packet
    - state: hefa_packet_e
      map: [ "emptyLayer" ]
      visible: false

- type: entity
  parent: CMPacketGrenadeFrag
  id: CMPacketGrenadeFragFilled
  name: HEFA grenade packet
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMGrenadeFrag
      amount: 3
