- type: entity
  parent: CMPersonalStorageBase
  id: RMCM271A2BruteLauncherRig
  name: M271A2 pattern launcher rig
  description: A specialized back harness for carrying the M6H-BRUTE breaching launcher and M5510 rockets.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/brute_rig.rsi
    layers:
    - state: icon
      map: [ "base" ]
    - state: half
      map: [ "half" ]
      visible: false
    - state: full
      map: [ "full" ]
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.CMHolsterLayers.Fill:
        base:
          Empty: { state: icon }
          Full: { state: launcher }
  - type: ItemMapper
    mapLayers:
      half:
        minCount: 1
        maxCount: 3
        whitelist:
          tags:
          - RMCRocketAmmoM5510Brute
      full:
        minCount: 4
        whitelist:
          tags:
          - RMCRocketAmmoM5510Brute
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/brute_rig.rsi
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,13,1 # 7 slots
    whitelist:
      tags:
      - RMCWeaponLauncherM6HBrute
      - RMCRocketAmmoM5510Brute
  - type: CMStorageVisualizer
    storageClosed: null
    storageOpen: null
  - type: FixedItemSizeStorage
  - type: CMHolster
    fullEquippedState: equipped-BACKPACK-g
    fullInhandPrefix: launcher
    whitelist:
      tags:
      - RMCWeaponLauncherM6HBrute
  - type: Item
    size: Large
  - type: Tag
    tags:
    - RMCM271A2BruteLauncherRig

- type: entity
  parent: RMCM271A2BruteLauncherRig
  id: RMCM271A2BruteLauncherRigFilled
  suffix: Filled
  components:
  - type: Icon
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/brute_rig.rsi
    state: launcher
  - type: StorageFill
    contents:
    - id: RMCWeaponLauncherM6HBrute
    - id: RMCRocketM5510Brute
      amount: 3

- type: Tag
  id: RMCM271A2BruteLauncherRig
