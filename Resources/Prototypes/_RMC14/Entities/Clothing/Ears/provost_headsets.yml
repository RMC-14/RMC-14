- type: entity
  parent: RMCHeadsetShip
  id: RMCHeadsetProvost
  name: UNMC provost headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyProvost
  - type: RMCRadioFilter
    disabledChannels:
    - MarineAlpha
    - MarineBravo
    - MarineCharlie
    - MarineDelta
    - MarineEcho
    - MarineFoxtrot
    - MarineIntel
    - MarineJTAC
  - type: RMCHeadset
    radioTextIncrease: 3
  - type: GrantSquadLeaderTracker
    defaultMode: ChiefMilitaryPolice
    trackerModes:
    - ProvostMarshal
    - ProvostDeputyMarshal
    - ProvostChiefInspector
    - ProvostInspector
    - ProvostTeamLeader
    - ProvostAdvisor
    - CommandingOfficer
    - ExecutiveOfficer
    - ChiefMilitaryPolice
    - MilitaryWarden
    - MilitaryPolice

- type: entity
  parent: RMCHeadsetProvost
  id: RMCHeadsetProvostLead
  suffix: SL Tracker
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: ProvostTeamLeader
