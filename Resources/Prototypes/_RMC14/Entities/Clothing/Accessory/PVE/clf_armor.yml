# Pads
- type: entity
  parent: RMCPVEArmorPadsBase
  id: RMCPVEArmorPadsCLF
  name: Milita Pauldrons
  description: Attachable supplementary armor with leather straps intented to paired with a milita hauberk or vest. Protects from glancing hits and covers the arm opening in the cuirass against shrapnel.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/pads.rsi

# Bracers
- type: entity
  parent: RMCPVEArmorBracersBase
  id: RMCPVEArmorBracersCLF
  name: Milita Vambraces
  description: Attachable supplementary armor with leather straps intented to paired with a milita hauberk or vest. A pair of workshoped composite vambraces to shield the forearms, boiled leather straps wrap around the underside to ensure it doesn't ride up or down.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/bracer.rsi

# Neck Guard
- type: entity
  parent: RMCPVEArmorNeckGuardBase
  id: RMCPVEArmorNeckGuardCLF
  name: Milita Gorget
  description: Attachable supplementary armor with leather straps intented to paired with a milita hauberk or vest. A neck guard of sorts made out of some workshopped metal plates, it has straps on the front and back to allow it to be attached to the neck of milita armor.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/neckguard.rsi

# Groin Plate
- type: entity
  parent: RMCPVEArmorGroinPlateBase
  id: RMCPVEArmorGroinPlateCLF
  name: Milita Lap Panel
  description: Attachable supplementary armor with leather straps intented to paired with a milita hauberk or vest. Made of boiled leather and workshopped metal rods, its not the most comfortable thing out there but at least it keeps the lower torso somewhat safe.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/groinplate.rsi

# Shin Guard
- type: entity
  parent: RMCPVEArmorShinGuardBase
  id: RMCPVEArmorShinGuardCLF
  name: Milita Greaves
  description: Attachable supplementary armor with leather straps intented to paired with a milita hauberk or vest. Workshopped metal plating, salvaged plasteel rods, and some boiled leather strap for good messure, it rides a fine line between modern armor and the plate metal of old.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/shinguards.rsi

# Knee Guard
- type: entity
  parent: RMCPVEArmorKneeGuardBase
  id: RMCPVEArmorKneeGuardCLF
  name: Milita Kneepads
  description: Attachable supplementary armor with leather straps intented to paired with a milita hauberk or vest. Plasteel-metal polymer sheets designed to be wrapped around the upper leg, boiled leather straps on the inside allow it to clamp around the thigh.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/thighguards.rsi

# Paint
- type: entity
  parent: RMCPVEArmorPaintBase
  id: RMCPVEArmorPaintCLF
  name: CLF flag armor paint
  description: A set of paint tones to etch the red, black, and green of the front into a rebel's armor.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/paint/CLF.rsi
  - type: UniformAccessory
    playerSprite:
      sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/paint/CLF.rsi
      state: equipped

- type: entity
  parent: RMCPVEArmorPaintBase
  id: RMCPVEArmorPaintAltCLF
  name: CLF stars armor paint
  description: A set of paint tones the stars of the liberation into a rebel's armor.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/paint/altCLF.rsi
  - type: UniformAccessory
    playerSprite:
      sprite: _RMC14/Objects/Clothing/Accessory/PVE/CLF/paint/altCLF.rsi
      state: equipped
