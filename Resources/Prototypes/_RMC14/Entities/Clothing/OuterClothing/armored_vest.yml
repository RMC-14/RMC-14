# M3-XL
- type: entity
  parent: [ClothingOuterBase, RMCAllowSuitStorageClothingArmorMP, BaseStorageItem, RMCBaseUniformAccessoryItemOuterClothing]
  id: RMCArmorVestXLBase
  abstract: true
  name: M3-XL pattern flak vest
  description: A type of flak vest, standard issue for UNMC auxiliary support troops. While it lacks a TNR shoulder lamp, it does come with IMP compatibility putting it just a step above older generation vests. It has been designed to exclusively protect the user's chest from light ballistics, it is not recommended for direct combat.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/standard/jungle.rsi
  - type: CMArmor
    melee: 0
    bullet: 20
    bio: 0
    explosionArmor: 0
  - type: Item
    size: Huge
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: EmitSoundOnPickup
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: Clothing
    equipSound:
      path: /Audio/_RMC14/Machines/armor_equip.ogg
  - type: StoreAfterFailedInteract
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,1 # 2 slots
  - type: FixedItemSizeStorage
  - type: RMCStorageEjectHand
  - type: IgnoreContentsSize
    items:
      tags:
      - MRE
      - PillPacket
      - PillCanister
      - CMSurgicalCase
      - RMCSyringeCase
      - RMCBoxZipties
  - type: RMCNameItemOnVend
    item: Armor
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: Appearance

# MP

- type: entity
  parent: RMCArmorVestXLBase
  id: RMCArmorVestMP
  name: M2-XL pattern MP flak vest
  description:  A variation of the varient of the M2 pattern armor issued exclusively to UNMC Military Police. Compared to your average flak vest it comes with additonal ballistic padding, a partial guard for the lower torso and shoulder pads. It will only protect the use from the impact of a ballistic and as such is not recommended for direct combat.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/mp/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/mp/jungle.rsi
      Desert: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/mp/desert.rsi
      Snow: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/mp/snow.rsi
      Classic: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/mp/classic.rsi
      Urban: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/mp/urban.rsi

# Officers

- type: entity
  parent: RMCArmorVestXLBase
  id: RMCArmorVestIntel
  name: M3-XL pattern intelligence flak vest
  description: A type of M3-XL flak vest, uncommonly issued to UNMC intelligence officers, designed primarily for mobility. While it may lack a TNR shoulder lamp, it does come with IMP compatibility putting it just a step above older generation vests. It has been designed to exclusively protect the user's chest from light ballistics and blades, it is not recommended for direct combat.
  components:
  - type: CMArmor
    melee: 10
    bullet: 10
    bio: 0
    explosionArmor: 0
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/intel/classic-jungle-urban.rsi
      Desert: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/intel/desert
      Snow: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/intel/snow.rsi
      Classic: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/intel/classic-jungle-urban.rsi
      Urban:  _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/intel/classic-jungle-urban.rsi

- type: entity
  parent: RMCArmorVestIntel
  id: RMCArmorVestCrewchief
  name: M80B1 flak vest
  description: The predecessor to the M3-XL flak vest, commonly issued to UNMC flight crew members not situated in the cockpit such as Weapons Crew and Drop Crew. Designed to protect the wearer's chest against small arms fire and loose sharp objects.
- type: entity
  parent: RMCArmorVestIntel
  id: RMCArmorVestOfficer
  name: M3-XL pattern officer flak vest
  description: A type of M3-XL flak vest, uncommonly issued to UNMC officers, designed primarily for mobility. Compared to your average flak vest it comes with additonal padding, a partial guard for the lower torso and shoulder pads. This added protection will not protect against explosions or biohazards. As such it is not recommended for direct combat.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/officer/classic-jungle-urban.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/officer/classic-jungle-urban.rsi
      Desert: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/officer/desert-snow.rsi
      Snow: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/officer/desert-snow.rsi
      Classic: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/officer/classic-jungle-urban.rsi
      Urban: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/officer/classic-jungle-urban.rsi

- type: entity
  parent: RMCArmorVestOfficer
  id: RMCArmorVestSeniorOfficer
  name: M3-XL pattern senior officer flak vest
  description: A type of M3-XL flak vest, uncommonly issued to UNMC senior officers, designed primarily for mobility. Compared to your average flak vest it comes with additonal padding, a partial guard for the lower torso and shoulder pads. This added protection will not protect against explosions. Not recommended for direct combat.
  components:
  - type: CMArmor
    melee: 10
    bullet: 10
    bio: 10
    explosionArmor: 0
#    rad: 10
#    internal: 10

- type: entity
  parent: RMCArmorVestSeniorOfficer
  id: RMCArmorVestCommandingOfficer
  name: M4-XL pattern commanding officer flak vest
  description: A next generation model of flak vest, the M4-XL has been designed for mobility and with additional padding and protection. While it may still lack a TNR shoulder lamp the M4-XL imrpoves on the protection provided by the M3 via having a padded composit mesh guard over the shoulders and upper chest. This increased protection does not protect the use from blasts however and as such is still not recommended for direct combat.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/commanding_officer/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
