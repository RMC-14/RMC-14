- type: entity
  parent: [RMCAllowSuitStorageClothingArmorVest, RMCBaseArmor]
  id: RMCArmorVest
  name: armor vest
  description: An armored vest that protects against some damage.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/armored_vest.rsi
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: CMArmor
    melee: 15
    bullet: 20
    bio: 20
    explosionArmor: 10
  - type: CMHardArmor
  - type: RMCNameItemOnVend
    item: Armor

- type: entity
  parent: RMCArmorVest
  id: RMCArmorVestFlak
  name: M70 flak jacket
  description: A flak jacket used by dropship pilots to protect themselves while flying in the cockpit. Excels in protecting the wearer against high-velocity solid projectiles.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/pilot/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/OuterClothing/Armor/pilot/jungle.rsi
      Desert: _RMC14/Objects/Clothing/OuterClothing/Armor/pilot/desert.rsi
      Snow: _RMC14/Objects/Clothing/OuterClothing/Armor/pilot/snow.rsi
      Classic: _RMC14/Objects/Clothing/OuterClothing/Armor/pilot/classic.rsi
      Urban: _RMC14/Objects/Clothing/OuterClothing/Armor/pilot/urban.rsi
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,1 # 2 slots
  - type: FixedItemSizeStorage
  - type: IgnoreContentsSize
    items:
      tags:
      - MRE
      - PillPacket
      - PillCanister
      - CMSurgicalCase
      - RMCSyringeCase
  - type: CMArmor
    melee: 15
    bullet: 20
    bio: 10
    explosionArmor: 10

- type: entity
  parent: RMCArmorVest
  id: RMCArmorVestWeYa
  name: We-Ya security armor vest
  description: An armored vest that protects against some damage. This one has a Weston-Yamada corporate badge.

- type: entity
  parent: RMCArmorVestWeYa
  id: RMCArmorSecurity
  name: security armor vest
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/security_armor.rsi

- type: entity
  parent: RMCArmorVest
  id: RMCArmorVestCivilian
  name: armored vest
  description: An general-use, unmarked armored vest that protects against some damage.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/security_armor.rsi

- type: entity
  parent: RMCArmorVest
  id: RMCArmorBulletproof
  name: bulletproof vest
  description: A vest that excels in protecting the wearer against high-velocity solid projectiles.
  suffix: RMC
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Armor/bulletproof/vest.rsi
  - type: CMArmor # TODO 20 internal damage armor
    bullet: 30

- type: entity
  parent: RMCArmorBulletproof
