      Classic: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/commanding_officer/classic.rsi
      Urban: _RMC14/Objects/Clothing/OuterClothing/Armor/m3/extra-light/commanding_officer/urban.rsi

