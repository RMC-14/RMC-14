- type: entity
  abstract: true
  parent: CMBaseStructure
  id: RMCGrassTallBase
  name: tallgrass
  suffix: Centre
  components:
  - type: Tag
    tags: []
  - type: TallGrass
  - type: FloorOccluder
  - type: Sprite
    sprite: _RMC14/Structures/Flora/tallgrass.rsi
    state: tallgrass
    drawdepth: Walls
  - type: Physics
    canCollide: true
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 7
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        layer:
        - LowImpassable
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.65
    sprintSpeedModifier: 0.65
    ignoreWhitelist:
      components:
      - Xeno
  - type: Flammable
    fireSpread: false
    maximumFireStacks: 0.5
    damage:
      types:
        Heat: 1
  - type: Damageable
    damageContainer: Inorganic
  - type: MeleeSound
    soundGroups:
      Brute:
        path: /Audio/Effects/chop.ogg
        params:
          variation: 0.05
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  abstract: true
  parent: RMCGrassTallBase
  id: RMCGrassTallSidesBase
  suffix: Sides
  components:
  - type: Sprite
    state: tallgrass_sides

- type: entity
  abstract: true
  parent: RMCGrassTallBase
  id: RMCGrassTallCornerBase
  suffix: Corner
  components:
  - type: Sprite
    state: tallgrass_corner

