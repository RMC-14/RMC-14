# Sedimentation Tanks

- type: entity
  parent: RMCFiltrationMachineA
  id: RMCFiltrationSedimentationTank
  name: sedimentation tank
  description: A large tank that holds water to allow sediment to settle at the bottom for easier filtration.
  components:
