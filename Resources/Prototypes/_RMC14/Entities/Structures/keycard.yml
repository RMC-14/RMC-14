- type: entity
  id: RMCKeycardDevice
  name: keycard authentication device
  description: This device is used to trigger station functions, which require multiple swipes of an ID card to authenticate.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/monitors.rsi
    drawdepth: WallMountedItems
    layers:
    - state: auth_off
      map: ["keycard"]
  - type: Clickable
  - type: InteractionOutline
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.KeycardDeviceVisuals.Active:
        keycard:
          True: { state: auth_on }
          False: { state: auth_off }
  - type: ApcPowerReceiver
    powerLoad: 6
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 2
    activeLoad: 6
    channel: Equipment
  - type: KeycardDevice
  - type: AccessReader
    access: [ [ "RMCAccessCommand" ] ]
  - type: UserInterface
    interfaces:
      enum.DialogUiKey.Key:
        type: DialogBui
