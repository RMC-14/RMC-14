- type: entity
  parent: RMCPropBase
  id: RMCPropSupermartShelfEmpty
  suffix: Empty
  name: shelf
  description: A long empty shelf.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/supermart.rsi
    state: longrackempty
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 2
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 20
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: PlaceableSurface

