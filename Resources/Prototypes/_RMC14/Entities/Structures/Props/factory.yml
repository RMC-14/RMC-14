- type: entity
  parent: CMBaseStructureCorrodible
  id: RMCConveyorBelt
  name: conveyor belt
  description: A conveyor belt, commonly used to transport large numbers of items elsewhere quite quickly.
  placement:
    mode: SnapgridCenter
  components:
  - type: Rotatable
    rotateWhileAnchored: true
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _RMC14/Structures/Props/factory.rsi
    state: factory_conveyer
    drawdepth: HighFloorObjects
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: false
  - type: Fixtures
    fixtures:
      conveyor:
        shape: !type:PolygonShape
          vertices:
          - -0.50,-0.50
          - 0.50,-0.50
          - 0.50,0.50
          - -0.50,0.50
        layer:
        - Impassable
        - MidImpassable
        - LowImpassable
        - DoorPassable
        hard: False
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      # if ConveyorBeltAssembly becomes craftable, maybe spawn some of the ingredients?
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IgnorePredictionHit
  - type: Tag
    tags:
    - Structure

- type: entity
  parent: CMBaseStructureCorrodible
  id: RMCRoboticArm
  name: robotic arm
  description: A robust robotic arm used in a range of mechanical processes, including assembly and packaging.
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.2,0.5,0.5"
        density: 190
        layer:
        - MobMask
  - type: Sprite
    sprite: _RMC14/Structures/Props/factory.rsi
    state: factory_roboticarm
  - type: Transform
    anchored: false

- type: entity
  parent: RMCRoboticArm
  id: RMCRoboticArmFlipped
  suffix: Flipped
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Props/factory.rsi
    state: factory_roboticarm2
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.5,0.5,0.2"
        density: 190
        layer:
        - MobMask
