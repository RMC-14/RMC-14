- type: entity
  parent: RMCPropBase
  id: RMCPropSlotmachinebroken
  name: slot machine
  suffix: broken
  description: Looks like the house lost... a machine.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/hybrisa_misc_props/64x64.rsi
    state: slotmachine_broken
    offset: 0.7, 0.5
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.5,0.3,0.5"
        density: 55
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Transform
    anchored: false
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -4
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 3
      - !type:DoActsBehavior
        acts: ["Destruction"]

