- type: entity
  parent: BaseStructureDynamic
  id: RMCCoffeeMachine
  name: coffee machine
  description: A coffee machine
  components: #TODO: Make the coffee machine actually function
  - type: RMCCoffeeMachine
    reagent: Coffee
    dispenseAmount: 30
    dispenseSound: /Audio/Machines/machine_vend_hot_drink.ogg
    cooldown: 2
  - type: ItemSlots
    slots:
      coffee_machine_slot:
        name: Coffee Machine
        whitelist:
          components:
          - RefillableSolution
  - type: ContainerContainer
    containers:
      coffee_machine_slot: !type:ContainerSlot {}
  - type: Transform
    noRot: true
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/coffee_machine.rsi
    drawdepth: SmallObjects
    state: coffee_empty_on
    noRot: true
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.03
        density: 155
        mask:
        - MachineMask
        layer:
        - MobMask
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Appearance
