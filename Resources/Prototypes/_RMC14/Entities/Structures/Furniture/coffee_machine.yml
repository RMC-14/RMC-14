- type: entity
  parent: BaseStructureDynamic
  id: RMCCoffeeMachine
  name: coffee machine
  description: A coffee machine
  components:
  - type: RMCCoffeeMachine
    reagent: RMCCoffee
    dispenseAmount: 30
    dispenseSound: /Audio/_RMC14/Machines/coffee1.ogg
  - type: ItemSlots
    slots:
      coffee_machine_slot:
        name: Coffee Machine
        whitelist:
          tags:
          - DrinkGlass
  - type: ContainerContainer
    containers:
      coffee_machine_slot: !type:ContainerSlot {}
  - type: Transform
    noRot: true
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/coffee_machine.rsi
    drawdepth: SmallObjects
    noRot: true
    layers:
    - state: coffee_empty_on
    - state: coffee_cup_generic
      map: ["enum.CoffeeMachineLayers.Cup"]
      visible: false
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.03
        density: 155
        mask:
        - MachineMask
        layer:
        - MobMask
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Appearance
