# Marshal IFV
- type: entity
  parent: RMCPropTyrargoVehicleBase
  id: RMCPropTyrargoVehicleIFV
  name: M34 Marshal IFV
  description: Developed by Weston-Yamada, the RAT (Rover Armed Transport) was originally designed for the TSE military as an armed version of their RT series of expeditionary vehicles, being instead adopted by the UN Marine Corps. It's heavier and and more durable then the M570 series the Marines use, as they don't have a need for APCs capable of being transported via a dropship.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Tyrargo_Vehicles/tyrargo_ifv.rsi
    state: ifv

