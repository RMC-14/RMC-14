# Bison ATV
- type: entity
  parent: RMCPropTyrargoVehicleBase
  id: RMCPropTyrargoVehicleATV
  name: BISON Automated Transport Vehicle
  description: The BISON ATV is an remote-controlled logistical supply vehicle, intended to assist UNMC rear-line logistics forces in moving supplies. It requires someone to be standing near it for the auto-pilot functions to work. This model is non-functional.
