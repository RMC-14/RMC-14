## Tyrargo vehicle props
# they don't have collisions here and in CM cause Tyrargo vehicles are all walled off by invisible walls so they don't need it
- type: entity
  abstract: true
  id: RMCPropTyrargoVehicleBase
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    noRot: false
  - type: Physics
    fixedRotation: false
  - type: Sprite
    sprite: _RMC14/Structures/tyrargo_vehicles.rsi
  - type: Clickable
  - type: InteractionOutline
  - type: Corrodible
    isCorrodible: false

# AD-71E VTOL
- type: entity
  parent: RMCPropTyrargoVehicleBase
  id: RMCPropTyrargoVehicleVTOL
  name: AD-71E VTOL
  description: A twin tilt-jet VTOL, the Blackfoot is the Bearcat's ugly big sister. For what she lacks in fire power and agility, she more than makes up for in utility and love handles. First tested by UN Northridge on United Nations soil, the Blackfoot is currently undergoing active combat trials. This craft appears to be undergoing maintenance and is not ready to fly.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Tyrargo_Vehicles/tyrargo_vtol.rsi
    state: vtol

- type: entity
  parent: RMCPropTyrargoVehicleBase
  id: RMCPropTyrargoVehicleVTOLCrashed
  suffix: Crashed
  name: AD-71E VTOL
  description: A twin tilt-jet VTOL, the Blackfoot is the Bearcat's ugly big sister. For what she lacks in fire power and agility, she more than makes up for in utility and love handles. First tested by UN Northridge on United Nations soil, the Blackfoot is currently undergoing active combat trials. This craft appears to have crash landed, and is inoperable.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Tyrargo_Vehicles/tyrargo_vtol.rsi
    state: vtol_damaged

# F-44
- type: entity
  parent: RMCPropTyrargoVehicleBase
  id: RMCPropTyrargoVehicleEvacBlack
  suffix: Black
  name: F-44 Aerospace fighter
  description: A high tech, silver coated F-44 aerospace fighter used by the UNMC in deep recon missions. The thermal-absorbent paint alone probably costs more than your squad's collective paycheck. Unfortunately however, this jet was in the middle of a repair cycle when the northern defences were breached, necessitating an evacuation.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Tyrargo_Vehicles/tyrargo_evac.rsi
    state: evac_black
  - type: Physics
    fixedRotation: true

- type: entity
  parent: RMCPropTyrargoVehicleBase
  id: RMCPropTyrargoVehicleEvacGreen
  name: F-44 Aerospace fighter
  suffix: Green
  description: A state of the art F-44 aerospace fighter used by the UNMC. This fighter has seen better days with extensive internal wiring damage and unfinished repairs to the bomb-bays.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Tyrargo_Vehicles/tyrargo_evac.rsi
    state: evac_green
  - type: Physics
    fixedRotation: true

# M887
- type: entity
  parent: RMCPropTyrargoVehicleBase
  id: RMCPropTyrargoVehicleTruck
  name: M887 Truck
  description: A small box-type van. It's a compact vehicle with a rectangular cargo area, typically designed for transporting goods or small equipment. It features a high roof and straight sides, providing ample vertical space for storage. Its size makes it maneuverable and ideal for urban driving and tight spaces. This van appears to be non-functional, likely due to excessive use during the recent outbreak.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Tyrargo_Vehicles/tyrargo_truck.rsi
    state: truck

- type: entity
  parent: RMCPropTyrargoVehicleTruck
  id: RMCPropTyrargoVehicleTruckBroken
  suffix: Broken
  components:
  - type: Sprite
    state: truck_broken

