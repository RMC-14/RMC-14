#Cliff face
- type: entity
  parent: CMPlatformBase
  id: RMCPlatformCliffStone
  name: cliff face
  description: A large cliff-face. Looks like it'd be pretty tough to climb.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Sprite
    state: peak_rock_platform
  - type: Climbable
    delay: 3

- type: entity
  parent: RMCPlatformCliffStone
  id: RMCPlatformCliffStoneCorner
  suffix: Corner
  components:
  - type: Sprite
    state: peak_rock_deco
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,0.49,-0.36,0.36"
        density: 1500
        mask:
        - TableMask
        layer:
        - TableLayer
