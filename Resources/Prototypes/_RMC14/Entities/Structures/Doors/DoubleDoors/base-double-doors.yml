- type: entity
  abstract: true
  parent:
  - CMBaseDoor
  - CMBaseDoorConstructible
  id: RMCDoubleDoorBase
  components:
  - type: Sprite
    offset: "0.5, 0.5"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,1.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - FullTileLayer

- type: entity
  parent: RMCDoubleDoorBase
  id: RMCDoubleDoorAlmayerGlass
  suffix: Almayer, Glass
  components:
  - type: Sprite
