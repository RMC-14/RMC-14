- type: entity
  abstract: true
  parent: CMBaseStructure
  id: RMCPropComputerBase
  name: terminal
  description: This can be used for various functions.
  suffix: Prop
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _RMC14/Structures/Machines/computer.rsi
    layers:
    - state: "terminal0"
    - map: ["enum.PowerDeviceVisualLayers.Powered"]
      state: "terminal"
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: ApcPowerReceiver
    powerLoad: 250
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 300
    activeLoad: 300
    channel: Equipment
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: WallMount
    arc: 360

- type: entity
  parent: RMCPropComputerBase
  id: RMCPropCommunicationsConsole
  name: communications console
  components:
  - type: Sprite
    state: comm
    layers:
    - state: "comm0"
    - map: ["enum.PowerDeviceVisualLayers.Powered"]
      state: "comm"

- type: entity
  parent: RMCPropCommunicationsConsole
  id: RMCPropCommunicationsConsoleAlt
