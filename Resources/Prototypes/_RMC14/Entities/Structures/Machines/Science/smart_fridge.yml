- type: entity
  parent: [ BaseMachinePowered, RMCConstructibleMachine ]
  id: RMCSmartFridge
  name: smart chemical storage
  description: A refrigerated storage unit for medicine and chemical storage.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/smart_fridge.rsi # TODO RMC14 deny, vend states
    layers:
    - state: "smartfridge-off"
    - map: ["enum.PowerDeviceVisualLayers.Powered"]
      state: "smartfridge"
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.4,0.25,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: null
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: ActivatableUI
    key: enum.RMCSmartFridgeUI.Key
  - type: ActivatableUIRequiresPower
  - type: ApcPowerReceiver
    powerLoad: 250
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 5
    activeLoad: 100
    channel: Equipment
  - type: Appearance
  - type: GuideHelp
    guides:
    - Chemicals
    - Chemist
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: UserInterface
    interfaces:
      enum.RMCSmartFridgeUI.Key:
        type: RMCSmartFridgeBui
  - type: RMCSmartFridge
