        whitelist:
          tags:
          - RMCWeaponShotgunType23
  - type: ItemMapper
    mapLayers:
      fill_1:
        minCount: 1
        whitelist:
          tags:
          - RMCWeaponShotgunType23
      fill_2:
        minCount: 2
        whitelist:
          tags:
          - RMCWeaponShotgunType23

- type: entity
