- type: entity
  parent: CMBaseStructure
  id: RMCSupplyDropPod
  components:
  - type: Transform
    anchored: false
  - type: Corrodible
    isCorrodible: false
  - type: Sprite
    sprite: _RMC14/Structures/Machines/drop_pod.rsi
    state: techpod_closed
    drawdepth: Overdoors
    offset: 0, 0.5
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - GlassAirlockLayer
  - type: InteractionOutline
  - type: Clickable
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 350
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:EmptyContainersBehaviour
        containers:
        - drop_pod
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Appearance
  - type: SupplyDropPod
    landingDamage:
      types:
        Blunt: 5000
  - type: NoStunOnExit
