- type: entity
  parent: CMBaseStructure
  abstract: true
  id: CMComputerDropship
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/shuttle_console.rsi
    drawdepth: SmallObjects
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipNavigation
  name: dropship navigation computer
  description: A flight computer that can be used for autopilot or long-range flights.
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCAS
  - type: Sprite
    state: console
  - type: DropshipNavigationComputer
  - type: ActivatableUI
    key: enum.DropshipNavigationUiKey.Key
  - type: AccessReader
    access: [["CMAccessSquadLeaderPrep"], ["CMAccessDropship"], ["CMAccessXeno"]] # Xeno have access as to not cause the "Access denied!" popup.
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui

- type: entity
  parent: CMComputerDropshipNavigation
  id: CMComputerDropshipNavigationERT
  name: transport shuttle
  description: A transport shuttle flight computer.
  components:
  - type: Sprite
    state: syndishuttle
  - type: DropshipNavigationComputer
    hijackable: false
    requiresRestrictedDestination: true
    shuttleDockingClass: Standard
    dockingBounds: "-3.5,-7,3.5,6"
  - type: AccessReader
    access: [["CMAccessERT"]]
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationERTBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui

- type: entity
  parent: CMComputerDropshipNavigationERT
  id: CMComputerDropshipNavigationERTCommAlt
  suffix: Standard, Comm Alt
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: comm_alt

- type: entity
  parent: CMComputerDropshipNavigationERT
  id: CMComputerDropshipNavigationERTSmall
  suffix: Small
  components:
  - type: DropshipNavigationComputer
    shuttleDockingClass: Small
    dockingBounds: "-3,-5,3,4"

- type: entity
  parent: CMComputerDropshipNavigationERTSmall
  id: CMComputerDropshipNavigationERTSmallCommAlt
  suffix: Small, Comm Alt
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: comm_alt

- type: entity
  parent: CMComputerDropshipNavigationERT
  id: CMComputerDropshipNavigationERTBig
  suffix: Big
  components:
  - type: DropshipNavigationComputer
    shuttleDockingClass: Big
    dockingBounds: "-5.5,-10,5.5,8"

- type: entity
  parent: CMComputerDropshipNavigationERTBig
  id: CMComputerDropshipNavigationERTBigCommAlt
  suffix: Big, Comm Alt
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: comm_alt

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipNavigationPlanetside
  name: dropship navigation computer
  description: A flight computer that can be used to direct linked dropships.
  suffix: Planetside
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/dropship_nav_computer.rsi
    state: on
  - type: ActivatableUI
    key: enum.DropshipTerminalUiKey.Key
  - type: AccessReader
    access: [["CMAccessDropship"], ["CMAccessSquadLeaderPrep"], ["CMAccessXeno"]] # Xeno have access as to not cause the "Access denied!" popup.
  - type: ActivatableUIRequiresAccess
  - type: DropshipTerminal
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalUiKey.Key:
        type: DropshipTerminalBui

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipCamerasAlamo
  name: camera controls
  description: A computer to monitor cameras linked to the dropship.
  suffix: Alamo
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCAS
  - type: Sprite
    state: consoleleft
  - type: UserInterface
    interfaces:
      enum.RMCCameraUiKey.Key:
        type: RMCCameraBui
  - type: RMCCameraComputer
    protoIds:
    - RMCMonitorCameraAlamo
    - RMCFlareCAS
    - RMCAirFlareCAS
    - RMCLaserDesignatorTarget
  - type: ActivatableUI
    key: enum.RMCCameraUiKey.Key

- type: entity
  parent: CMComputerDropshipCamerasAlamo
  id: RMCComputerDropshipCamerasNormandy
  name: camera controls
  description: A computer to monitor cameras linked to the dropship.
  suffix: Normandy
  components:
  - type: RMCCameraComputer
    protoIds:
    - RMCMonitorCameraNormandy
    - RMCFlareCAS
    - RMCAirFlareCAS
    - RMCLaserDesignatorTarget

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipWeapons
  name: weapons controls
  description: A computer to manage equipment, weapons and simulations installed on the dropship.
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCAS
  - type: Sprite
    state: consoleright
  - type: ActivatableUI
    key: enum.DropshipTerminalWeaponsUi.Key
  - type: AccessReader
    access: [ [ "CMAccessPilot" ], [ "CMAccessSquadLeaderPrep" ], [ "RMCAccessWeYaFlight" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalWeaponsUi.Key:
        type: DropshipWeaponsBui
  - type: DropshipTerminalWeapons
  - type: TacticalMapComputer
  - type: RequiresSkill
    skills:
      RMCSkillPilot: 1

- type: entity
  parent: CMBaseStructure
  id: RMCComputerDropshipNavigationSmall
  name: dropship navigation computer
  description: A flight computer that can be used for autopilot or long-range flights.
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: Objects
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: security_cam
    layers: [ ]
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: WallMount
    arc: 360
  - type: DropshipNavigationComputer
  - type: ActivatableUI
    key: enum.DropshipNavigationUiKey.Key
  - type: AccessReader
    access: [ ["CMAccessSquadLeaderPrep"], [ "CMAccessDropship" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui
  - type: PointLight
    enabled: true
    radius: 1.5
    netsync: true
    energy: 1
    offset: "0,0"
    color: "#FFEFD2"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png

- type: entity
  parent: CMBaseStructure
  id: RMCComputerDropshipWeaponsSmall
  name: weapons controls
  description: A computer to manage equipment, weapons and simulations installed on the dropship.
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: Objects
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: security_cam
    layers: [ ]
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: WallMount
    arc: 360
  - type: AccessReader
    access: [ ["CMAccessSquadLeaderPrep"], [ "CMAccessDropship" ] ]
  - type: PointLight
    enabled: true
    radius: 1.5
    netsync: true
    energy: 1
    offset: "0,0"
    color: "#FFEFD2"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png
  - type: ActivatableUI
    key: enum.DropshipTerminalWeaponsUi.Key
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalWeaponsUi.Key:
        type: DropshipWeaponsBui
  - type: DropshipTerminalWeapons
  - type: TacticalMapComputer

- type: entity
  parent: MarkerBase
  id: CMDropshipDestination
  name: dropship destination
  description: Defines a valid location for the dropships to FTL to when piloted.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: green
  - type: FTLBeacon
  - type: DropshipDestination
  - type: FTLSmashImmune
  - type: NoFTL

- type: entity
  parent: CMDropshipDestination
  id: CMDropshipDestinationAlamo
  suffix: Alamo
  components:
  - type: DropshipDestination
    spawn: "/Maps/_RMC14/alamo.yml" # The actual Dropship files are private. These are debug versions to ensure tests pass.

- type: entity
  parent: CMDropshipDestination
  id: CMDropshipDestinationNormandy
  suffix: Normandy
  components:
  - type: DropshipDestination
    spawn: "/Maps/_RMC14/normandy.yml" # The actual Dropship files are private. These are debug versions to ensure tests pass.

- type: entity
  parent: CMDropshipDestination
  id: RMCRestrictedShuttleDestination
  abstract: true
  name: restricted shuttle destination
  description: Defines a valid landing location for restricted shuttle routing.
  components:
  - type: Transform
    anchored: true
    noRot: false
  - type: Rotatable

- type: entity
  parent: RMCRestrictedShuttleDestination
  id: RMCRestrictedShuttleDestinationInternal
  suffix: Shuttle, Internal
  components:
  - type: DropshipDestination
    dockBounds: "-4,-8.5,4,6.5"
    reserved: true
    landingClasses: [ internal ]
    landingTags: [ mainship, ert, internal ]

- type: entity
  parent: RMCRestrictedShuttleDestinationInternal
  id: RMCERTShuttleReturnDestination
  name: Base
  suffix: ERT, Return, Internal

- type: entity
  parent: RMCRestrictedShuttleDestinationExternalSide
  id: RMCERTShuttleReturnDestinationSmall
  name: Base
  suffix: ERT, Return, External Side

- type: entity
  parent: RMCRestrictedShuttleDestinationExternalHangar
  id: RMCERTShuttleReturnDestinationBig
  name: Base
  suffix: ERT, Return, External Hangar

- type: entity
  parent: RMCRestrictedShuttleDestination
  id: RMCRestrictedShuttleDestinationExternalSide
  suffix: Shuttle, External Side
  components:
  - type: DropshipDestination
    dockBounds: "-5,-9.5,5,7.5"
    reserved: true
    landingClasses: [ external_side ]
    landingTags: [ mainship, ert, external_side ]
  - type: RMCDockingPortAirlockControl
    airlockTags: [ RMCShuttleAirlockExternalSide ]
    searchRadius: 5

- type: entity
  parent: RMCRestrictedShuttleDestination
  id: RMCRestrictedShuttleDestinationExternalHangar
  suffix: Shuttle, External Hangar
  components:
  - type: DropshipDestination
    dockBounds: "-6,-10.5,6,8.5"
    reserved: true
    landingClasses: [ external_hangar ]
    landingTags: [ mainship, ert, external_hangar ]
  - type: RMCDockingPortAirlockControl
    airlockTags: [ RMCShuttleAirlockExternalHangar ]
    searchRadius: 8

- type: entity
  parent: MarkerBase
  id: CMDropshipHijackDestination
  name: hijack destination
  description: Defines a valid location for the dropships to FTL to when hijacked.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: green
  - type: FTLBeacon
  - type: DropshipHijackDestination
  - type: FTLSmashImmune
  - type: NoFTL
