- type: entity
  parent: CMBaseStructureCorrodible
  id: RMCSyntheticMaintenanceStation
  name: synthetic maintenance station
  description: A wall-mounted maintenance cradle for synthetic units.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/Machines/synth_charger.rsi
    drawdepth: Mobs
    noRot: true
    layers:
    - state: borgcharger0
      map: [ "enum.RMCSyntheticMaintenanceStationLayers.Base" ]
    - state: statn_c100
      shader: unshaded
      map: [ "enum.RMCSyntheticMaintenanceStationLayers.Charge" ]
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: ApcPowerReceiver
    powerLoad: 1000
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 250
    activeLoad: 1000
    channel: Equipment
  - type: RMCSyntheticMaintenanceStation
  - type: ContainerContainer
    containers:
      rmc_synthetic_maintenance_station_body: !type:ContainerSlot {}
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RMCSyntheticMaintenanceStationVisuals.Status:
        enum.RMCSyntheticMaintenanceStationLayers.Base:
          Off: { state: borgcharger2 }
          Empty: { state: borgcharger0 }
          Occupied: { state: borgcharger1 }
      enum.RMCSyntheticMaintenanceStationVisuals.Charge:
        enum.RMCSyntheticMaintenanceStationLayers.Charge:
          Empty: { state: statn_c0 }
          Low: { state: statn_c20 }
          Medium: { state: statn_c60 }
          High: { state: statn_c80 }
          Full: { state: statn_c100 }
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: RMCMesonsNonviewable
