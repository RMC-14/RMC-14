- type: entity
  parent: [ BaseMachinePowered, RMCConstructibleMachine ]
  id: RMCPropExosuitFab
  name: exosuit fabricator
  suffix: Prop, RMC
  components:
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: null
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: machineFrame
      - !type:DoActsBehavior
        acts: ["Destruction"] 
  - type: Sprite
    sprite: Structures/Machines/exosuit_fabricator.rsi
    state: fab-idle