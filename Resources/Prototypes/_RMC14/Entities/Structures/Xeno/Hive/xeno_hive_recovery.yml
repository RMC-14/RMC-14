# Recovery Node
- type: entity
  id: HiveRecoveryNodeXeno
  parent: BaseHiveStructure
  name: recovery node
  description: A warm, soothing light source that pulsates with a faint hum.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/hive_structures.rsi
    state: recovery
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: MeleeReceivedMultiplier
    xenoDamage:
      types:
        Slash: 100
  - type: RecoveryNode
    recoveryType: Health
  - type: HiveConstructionRequiresHiveCore
  - type: HiveConstructionLimited
    id: HiveRecoveryNodeXeno
  - type: HiveConstructionRequiresHiveWeeds
  - type: HiveConstructionRequiresSpace
  - type: DoAfter
  - type: XenoStructureMapTracked
  - type: TacticalMapTracked
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: recovery_node

- type: entity
  id: HiveRecoveryNodeXenoConstructionNode
  parent: BaseHiveStructureNode
  name: recovery node
  description: A warm, soothing light source that pulsates with a faint hum. Looks like a marker for something.
  suffix: Construction
  components:
  - type: Sprite
    color: '#FFFFFFAA'
    layers:
    - sprite: _RMC14/Structures/Xenos/hive_structures.rsi
      state: recovery
    - sprite: _RMC14/Interface/xeno_hud.rsi
      state: xeno_structure_node_indicator
      scale: 0.8, 0.8
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: HiveConstructionNode
    initialPlasmaCost: 400
    plasmaCost: 450
    spawn: HiveRecoveryNodeXeno
  - type: HiveConstructionRequiresHiveCore
  - type: HiveConstructionLimited
    id: HiveRecoveryNodeXeno
  - type: HiveConstructionRequiresHiveWeeds
  - type: HiveConstructionRequiresSpace
  - type: WarpPoint
    location: recovery node


# Plasma Tree
- type: entity
  id: HivePlasmaTreeXeno
  parent: HiveRecoveryNodeXeno
  name: plasma tree
  description: A tree-shaped node whose "berries" are filled with glowing blue liquid that drips from them.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/hive_structures.rsi
    state: recovery_plasma
  - type: RecoveryNode
    recoveryType: Plasma
  - type: HiveConstructionLimited
    id: HivePlasmaTreeXeno

- type: entity
  id: HivePlasmaTreeXenoConstructionNode
  parent: HiveRecoveryNodeXenoConstructionNode
  name: plasma tree
  description: Making glowing blue "berries", replenishing plasma reserves of the sisters around it.
  components:
  - type: Sprite
    layers:
    - sprite: _RMC14/Structures/Xenos/hive_structures.rsi
      state: recovery_plasma
    - sprite: _RMC14/Interface/xeno_hud.rsi
      state: xeno_structure_node_indicator
      scale: 0.8, 0.8
  - type: HiveConstructionNode
    initialPlasmaCost: 400
    plasmaCost: 450
    spawn: HivePlasmaTreeXeno
  - type: HiveConstructionLimited
    id: HivePlasmaTreeXeno
  - type: WarpPoint
    location: plasma tree
