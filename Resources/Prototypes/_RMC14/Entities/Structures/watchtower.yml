- type: entity
  id: RMCPropWatchtower
  name: Watchtower
  description: A UN Marine Corps watchtower. Who watches the watchers?
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    noRot: true
  - type: Physics
    bodyType: Static
    fixedRotation: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,-0.5,0.5,1.5"
        density: 190
        layer:
        - MobMask
  - type: Sprite
    sprite: _RMC14/Structures/watchtower.rsi
    state: watchtower
    offset: -0.5, 1
  - type: DeleteOnExplosion
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Clickable
  - type: InteractionOutline
  - type: Corrodible
    isCorrodible: false
