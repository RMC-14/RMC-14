- type: entity
  parent: RMCBaseAlienTank
  id: RMCBaseHybrisaXenoCryogenics
  name: specimen contaiment cell
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/hybrisa_misc_props/hybrisaxenocryogenics.rsi
    state: xenocellempty
    offset: "0, -0.5"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
            bounds: "-0.5,-1.5,0.5,-0.5"
        density: 190
        layer:
        - MobMask


- type: entity
  parent: RMCBaseHybrisaXenoCryogenics
  id: RMCHybrisaXenoCryogenicsEmpty
  description: It is empty.
  suffix: empty
  components:
  - type: Sprite
    state: xenocellempty
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 250 # excessive damage destroys our inhabitant
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:DoActsBehavior
            acts: ["Destruction"]
      - trigger:
          !type:DamageTrigger
          damage: 75
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:SpawnEntitiesBehavior
            spawn:
              RMCHybrisaXenoCryogenicsCracked:
                min: 1
                max: 1
          - !type:DoActsBehavior
            acts: ["Destruction"]

