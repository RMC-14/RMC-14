- type: entity
  id: RMCSpiderWeb
  parent: SpiderWeb
  name: resinous spider web
  description: Thick webbing that clings to boots and catches stray fire.
  components:
  - type: RMCSpiderWeb
    projectileBlockChance: 0.30
    mobRootChance: 0.50
  - type: Sprite
    sprite: _RMC14/Effects/effects.rsi
    state: stickyweb1
    color: "#ffffffdd"
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWebSilk:
            min: 0
            max: 1
  - type: RandomSprite
    available:
    - 0:
        stickyweb1: ""
        stickyweb2: ""

- type: entity
  id: RMCSpiderEgg
  parent: BaseStructure
  name: spider egg cluster
  description: A wet cluster of eggs. Something inside keeps tapping.
  components:
  - type: RMCSpiderEgg
  - type: Sprite
    sprite: _RMC14/Effects/effects.rsi
    state: eggs
    drawdepth: Mobs
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        layer:
        - LowImpassable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Flammable
    fireSpread: true
    damage:
      types:
        Heat: 5

- type: entity
  id: RMCSpiderCocoon
  parent: BaseStructure
  name: spider cocoon
  description: A dense mass of webbing. It can be cut or burned open.
  components:
  - type: RMCSpiderCocoon
  - type: Sprite
    sprite: _RMC14/Effects/effects.rsi
    state: cocoon1
    drawdepth: Mobs
  - type: RandomSprite
    available:
    - 0:
        cocoon1: ""
        cocoon2: ""
        cocoon3: ""
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWebSilk:
            min: 1
            max: 2
  - type: Flammable
    fireSpread: true
    damage:
      types:
        Heat: 5

- type: entity
  id: RMCSpiderCocoonLarge
  parent: RMCSpiderCocoon
  name: large spider cocoon
  description: A dense, bulging mass of webbing. Something substantial is wrapped inside.
  components:
  - type: Sprite
    sprite: _RMC14/Effects/effects.rsi
    state: cocoon_large1
    drawdepth: Mobs
  - type: RandomSprite
    available:
    - 0:
        cocoon_large1: ""
        cocoon_large2: ""
        cocoon_large3: ""

- type: entity
  id: RMCSpiderlingRemains
  name: spiderling remains
  description: Green, squishy spiderling mess.
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    noRot: true
    anchored: true
  - type: Sprite
    sprite: _RMC14/Effects/effects.rsi
    state: greenshatter
    drawdepth: Puddles
  - type: TimedDespawn
    lifetime: 300
  - type: Tag
    tags:
    - HideContextMenu
