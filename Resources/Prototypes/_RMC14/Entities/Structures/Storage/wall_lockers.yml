- type: entity
  parent: CMLockerBase
  id: CMLockerCMDCabinet
  name: command tablet cabinet
  suffix: Empty
  description: A bulletproof cabinet containing the command tablet for usage by a Commander.
  # description: A bulletproof cabinet containing the command tablet for usage by the CO and XO. Opens only to them and department heads. (Parity desc, once Senior access is implemented)
  components:
  - type: WallMount
    arc: 175
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _RMC14/Structures/Wallmounts/cmdcabinet.rsi
  - type: EntityStorage
    capacity: 3 # for storing a tablet and headset, as well as for one more additional thing if needed
    isCollidableWhenOpen: true
    enteringOffset: 0, -0.6
    enteringRange: 0.03
    whitelist:
      tags:
      - CommandTablet
      - RMCHeadset
  - type: RMCEntityStorageWhitelist
    whitelist:
      tags:
      - CommandTablet
      - RMCHeadset
  - type: AccessReader
    access: [["RMCAccessSeniorCommand"]]
  - type: RMCMesonsNonviewable

- type: entity
  parent: CMLockerCMDCabinet
  id: CMLockerCMDCabinetFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: CMLockerFillCMDCabinet

# there should be a variant for CL, but it's fill is not yet implemented

- type: entityTable
  id: CMLockerFillCMDCabinet
  table: !type:AllSelector
    children:
    - id: RMCTabletCO
    - id: CMHeadsetSeniorCommand

- type: entity
  parent: CMLockerBase
  id: RMCEmergencySurgicalCabinet
  name: emergency surgical equipment cabinet
  description: A hyper-safe, self-sterilizing, wall-mounted cabinet containing extra surgical beds, surgical webbing vests, and portable dialysis machines. It unlocks and opens itself when the ship is threatened by a hostile force.
  suffix: Empty
  placement:
    mode: SnapgridCenter
  components:
  - type: WallMount
    arc: 175
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _RMC14/Structures/Wallmounts/surgical.rsi
  - type: Corrodible
    isCorrodible: false
  - type: Destructible
    thresholds: []
  - type: EntityStorage
    isCollidableWhenOpen: true
    enteringOffset: 0, -0.6
    enteringRange: 0.03
    whitelist:
      tags:
      - CMRollerItem
      - CMRollerBed
      components:
      - Webbing
      - PortableDialysis
  - type: RMCEntityStorageWhitelist
    whitelist:
      tags:
      - CMRollerItem
      - CMRollerBed
      components:
      - Webbing
      - PortableDialysis
  - type: AccessReader
    access: [["CMAccessMedical"]]
  - type: RMCLockerOpenOnHijack
  - type: RMCMesonsNonviewable

- type: entity
  parent: RMCEmergencySurgicalCabinet
  id: RMCEmergencySurgicalCabinetFilled
  suffix: Fills on Hijack
  components:
  - type: RMCOnHijackFill
    jobs:
    - CMCMO
    - CMDoctor
    scaleWithJobs: true
    table: !type:NestedSelector
      tableId: RMCEmergencySurgicalCabinetTable

- type: entityTable
  id: RMCEmergencySurgicalCabinetTable
  table: !type:AllSelector
    children:
    - id: CMPortableSurgicalBedSpawnFolded
    - id: RMCPortableDialysis
    - !type:GroupSelector
      children:
      - id: RMCWebbingSurgicalGreen
      - id: RMCWebbingSurgicalBlue
