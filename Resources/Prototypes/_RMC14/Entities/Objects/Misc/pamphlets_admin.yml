# Every skill at every level with related components.

- type: entity
  parent: CMPamphlet
  id: RMCPamphletAdmin
  suffix: ADMIN
  abstract: true
  description: An easy to understand training manual.
  components:
  - type: Sprite
    state: pamphlet_engineering


# Antagonist
- type: entity
  parent: RMCPamphletAdmin
  id: RMCPamphletAdminAntagonist
  name: antagonist training manual
  description: "An easy to understand training manual.\nReading 2 of these should be enough to master the skill."
  components:
  - type: SkillPamphlet
    addSkills:
      RMCSkillAntagonist: 1
    skillCap:
      RMCSkillAntagonist: 2

