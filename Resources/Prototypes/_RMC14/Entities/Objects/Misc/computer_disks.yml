- type: entity
  abstract: true
  parent: BaseItem
  id: RMCComputerDisk
  name: computer disk
  description: "A boring looking computer disk. The name label is just gibberish collection of letters and numbers."
  components:
  - type: Tag
    tags:
    - RMCDataDisk
  - type: Item
    size: Tiny

- type: entity
  parent: RMCComputerDisk
  id: RMCIntelComputerDisk1
  name: Grey computer disk
  suffix: Disk, 1
  components:
