- type: entity
  parent: BaseItem
  id: RMCDropshipMaintsComputer
  name: dropship maintenance computer
  description: An opened dropship maintenance computer, it seems to be off however. It's used by technicians and pilots to find damaged or broken systems on a dropship. It has various outlets for different systems.
  suffix: Open
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
    layers:
    - state: hangar_comp
      map: [ "enum.ToggleableVisuals.Enabled" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Enabled:
          True: { state: hangar_comp }
          False: { state: hangar_comp_open }
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
  - type: Item
    size: Large
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
  - type: ItemToggle
    activated: false
  - type: Appearance

- type: entity
  parent: RMCDropshipMaintsComputer
  id: RMCDropshipMaintsComputerOpen
  name: dropship maintenance computer
  description: A closed dropship maintenance computer that technicians and pilots use to find out what's wrong with a dropship. It has various outlets for different systems.
  suffix: Closed
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
    layers:
    - state: hangar_comp
      map: [ "enum.ToggleableVisuals.Enabled" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Enabled:
          True: { state: hangar_comp }
          False: { state: hangar_comp_open }
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
  - type: Item
    size: Large
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
  - type: ItemToggle
    activated: true
  - type: Appearance

- type: entity
  parent: BaseItem
  id: RMCLaptop
  name: laptop #RMC14: Deviation from parity, the laptop is a moveable entity which can be opened
  description: Laptops, porta-comps, and reel-back computers, all of these and more available at your local WEYA-Mart electronics section!
  suffix: closed
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/laptop.rsi
    layers:
    - state: laptop_closed
      map: [ "foldedLayer" ]
    - state: laptop_off
      map: [ "unfoldedLayer", "enum.ToggleableVisuals.Layer" ]
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.FoldedVisuals.State:
        foldedLayer:
          True: {visible: true}
          False: {visible: false}
        unfoldedLayer:
          True: {visible: false}
          False: {visible: true}
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: laptop_on }
          False: { state: laptop_off }
    sprite: _RMC14/Objects/Misc/laptop.rsi
  - type: Item
    size: Normal
    sprite: _RMC14/Objects/Misc/laptop.rsi
  - type: ItemToggle
    activated: false
  - type: Appearance
  - type: Foldable
    folded: true
    canFoldInsideContainer: true
  - type: ItemTogglePointLight
  - type: PointLight
    enabled: false
    radius: 2
    netsync: false
    color: "#52ff39"

- type: entity
  parent: RMCLaptop
  id: RMCLaptopOff
  suffix: off
  components:
  - type: Foldable
    folded: false
    canFoldInsideContainer: true

- type: entity
  parent: RMCLaptopOff
  id: RMCLaptopOn
  suffix: on
  components:
  - type: ItemToggle
    activated: true
  - type: PointLight
    enabled: true
