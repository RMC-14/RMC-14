- type: entity
  parent: BaseItem
  id: CMPamphlet
  name: instructional pamphlet
  description: A pamphlet used to quickly impart vital knowledge.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/pamphlets.rsi
    state: pamphlet_written
  - type: Item
    size: Tiny
  - type: SkillPamphlet
    bypassLimit: true
    whitelists:
    - popup: rmc-pamphlets-cant-use
      restrictions:
        components:
        - Marine
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/paper_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: Tag
    tags:
    - RMCSkillPamphlet

# Job/Role pamphlets

# Spotter
- type: entity
  parent: CMPamphlet
  id: CMPamphletSpotter
  name: spotter instructional pamphlet
  description: "Used to quickly impart vital knowledge.\nThis one has an image of binoculars on it."
  components:
  - type: Sprite
    state: pamphlet_spotter
  - type: SkillPamphlet
    bypassSkill: true
    bypassLimit: false
    addComps:
    - type: SpotterWhitelist
    addSkills:
      RMCSkillJtac: 1
    skillCap:
      RMCSkillJtac: 2 # QOL incase rfn used jtac pamphlet first; as Spotter into Jtac pamphlet = 2, but Jtac into spotter pamphlet = 1.
    giveJobTitle: rmc-job-name-spotter
    givePrefix: rmc-job-prefix-spotter
    isAppendPrefix: false
    giveIcon:
      sprite: _RMC14/Interface/job_icons/UNMC/marine.rsi
      state: hudsquad_ass
    giveMapBlip:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: spotter
    jobWhitelists:
    - popup: rmc-pamphlets-rifleman-warning
      jobProto: CMRifleman
    - popup: rmc-pamphlets-rifleman-warning
      jobProto: CMPVERifleman

