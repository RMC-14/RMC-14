- type: entity
  parent: BaseItem
  id: CMPamphlet
  name: instructional pamphlet
  description: A pamphlet used to quickly impart vital knowledge.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/pamphlets.rsi
    state: pamphlet_written
  - type: Item
    size: Tiny
  - type: SkillPamphlet
    whitelists:
    - popup: rmc-pamphlets-cant-use
      restrictions:
        components:
        - Marine
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/paper_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: Tag
    tags:
    - RMCSkillPamphlet

# SKILLS


# gives medical skill
- type: entity
  parent: CMPamphlet
  id: CMPamphletMedical
  name: medical instructional pamphlet
  description: A pamphlet used to quickly impart vital knowledge. This one has a medical insignia.
  components:
  - type: Sprite
    state: pamphlet_medical
  - type: SkillPamphlet
    addSkills:
      RMCSkillMedical: 1
    skillCap:
      RMCSkillMedical: 1
    bypassLimit: true

