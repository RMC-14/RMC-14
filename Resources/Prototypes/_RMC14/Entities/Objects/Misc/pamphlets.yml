# LANGUAGE / bypasses limit

#
- type: entity
  parent: CMPamphlet
  id: CMPamphletLanguage
  name: translation pamphlet
  description: A pamphlet used by lazy Marine interpreters to quickly learn new languages on the spot.
  abstract: true
  components:
  - type: SkillPamphlet

# gives japanese language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageJapanese
  suffix: JPN
  name: Pages of Turedobando Yohei Adobencha Zohuken
  description: A dog-eared volume of a popular isekai manga. Even if you don’t care about the plot, the annotated sound effects and dialogue provide a surprisingly solid foundation in the language.
  components:
  - type: SkillPamphlet
    language: Japanese

# gives chinese language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageChinese
  suffix: CHI
  name: Pages from the Little Red Book
  description: A dense, laminated technical manual for SPP industrial hardware. Navigating the maintenance protocols is a trial by fire, but you’ll learn the script eventually.
  components:
  - type: SkillPamphlet
    language: Chinese
  # desc starts with "没有共产党就没有新中国!" but RMC14 doesnt support chinese letters :(

# gives german language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageGerman
  suffix: GER
  name: Translated Lyrics to 99 Luftballons
  description: A beer-stained lyric sheet used for karaoke. It’s mostly 20th-century pop hits, but it’s enough to help you navigate a German-speaking mining colony without getting punched.
  components:
  - type: SkillPamphlet
    language: German

# gives spanish language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageSpanish
  suffix: SPA
  name: America Latina - A Quick Translation Guide
  description: A "Inter-Colony Relations" pamphlet issued by the United Nations. It was intended for peace-keeping efforts, but mostly serves as a guide for Marines looking for the nearest bar.
  components:
  - type: SkillPamphlet
    language: Spanish

# gives french language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageFrench
  suffix: FRE
  name: Dog-eared Pages of Le Petit Prince
  description: A few tattered pages from a fashion journal from the early 2100s. It teaches you just enough high-society vocabulary to sound sophisticated, or at least like an arrogant tourist.
  components:
  - type: SkillPamphlet
    language: French

# gives russian language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageRussian
  suffix: RUS
  name: Crumpled Transliteration Notes
  description: Gritty field notes scribbled on the pages of an old journal. Between the phonetic spellings of how to follow orders, win a bar fight, and toast the fallen, there is enough grammar hidden in the margins to learn the basics.
  components:
  - type: SkillPamphlet
    language: Russian

# gives sign language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageSign
  suffix: SIGN
  name: Illustrated Hand Signals Guide
  description: A UNMC laminated guide to 'Tactical Hand Signs.' It covers the essential hand signals used for coordination when any noise is a death sentence, plus a few unofficial gestures for insulting your squadmates without the CO hearing you.
  components:
  - type: SkillPamphlet
    language: SignLanguage

# gives scandinavian language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageScandinavian
  name: Treatise of the Scandinavian Frontiers
  description: This appears to be a record of the Scandinavian frontiers, a shadowy region that is the subject of much controversy from the conflict between the Socialist Progressive Peoples and its' separatists.
  components:
  - type: SkillPamphlet
    language: Scandinavian

# RESTRICTED LANGUAGES

# gives xenonid language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguageXenonid
  suffix: XENO
  name: Xenobiologist's file
  description: A heavily redacted Weston-Yamada research summary. It details the clicks, hisses, and pheromonal triggers of the 'Xenonid' in high detail. Attempting these sounds makes your throat ache and your skin crawl.
  components:
  - type: SkillPamphlet
    language: Xeno

# gives primitive language
- type: entity
  parent: CMPamphletLanguage
  id: CMPamphletLanguagePrimitive
  suffix: PRIM
  name: scribbled drawings
  description: A collection of crude drawings involving bananas and apes. It is either a masterpiece of primal communication or the work of a Marine who found an unattended box of crayons.
  components:
  - type: SkillPamphlet
    language: Primitive
