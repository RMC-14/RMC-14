- type: entity
  parent: BoxBase
  id: CMFolderBaseEmpty
  abstract: true
  name: folder
  description: A folder.
  suffix: Empty
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Folders/folder.rsi
    state: icon
  - type: Item
    sprite: _RMC14/Objects/Misc/Folders/folder.rsi
    size: Small
    shape: null
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,4,3
    whitelist:
      tags:
      - Document
      - Paper
  - type: Appearance
  - type: Tag
    tags:
    - Folder
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: PhysicalComposition
    materialComposition: {}

- type: entity
  parent: CMFolderBaseEmpty
  id: CMFolderBase
  suffix: ""
  components:
  - type: StorageFill
    contents:
    - id: CMPaper
      prob: 0.5
    - id: CMPaper
      prob: 0.4
    - id: CMPaper
      prob: 0.3
    - id: CMPaper
      prob: 0.2
    - id: CMPaper
      prob: 0.2


