- type: entity
  parent: DoorElectronics
  id: CMAirlockCircuitBoard
  name: airlock circuit board
  description: An electronics board used in airlocks.

- type: entity
  parent: CMMiniTank
  id: RMCES11MobileFuelCanister
  name: ES-11 mobile fuel canister
  description: A compact welding fuel canister for field repairs and refills.

- type: entity
  parent: BaseStorageItem
  id: RMCSynthRepairKit
  name: synthetic repair kit
  description: A compact kit of field tools and replacement cabling for synthetic structural repairs.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/engineer_kit.rsi
    layers:
    - state: toolkit
    - state: toolkit_empty
      map: [ "openLayer" ]
      visible: false
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,11,1
    whitelist:
      tags:
      - Crowbar
      - Screwdriver
      - Wirecutter
      - Wrench
      - CableCoil
      - Multitool
      - PowerCell
      components:
      - Welder
      - PowerCell
      - TrayScanner
  - type: FixedItemSizeStorage
  - type: Item
    size: Normal
  - type: GenericVisualizer
    visuals:
      enum.SharedBagOpenVisuals.BagState:
        openLayer:
          Open: { visible: true }
          Closed: { visible: false }
  - type: Appearance

- type: entity
  parent: RMCSynthRepairKit
  id: RMCSynthRepairKitFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMWelder
    - id: RMCCableCoil30
    - id: CMWirecutter
    - id: CMMultitool

- type: entity
  parent: RMCSynthRepairKit
  id: RMCSynthRepairKitEliteFilled
  name: elite synthetic repair kit
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: RMCWelderIndustrialHighCapacity
    - id: RMCCableCoil30
      amount: 2
    - id: CMWirecutter
    - id: CMMultitool
    - id: CMTRayScanner
