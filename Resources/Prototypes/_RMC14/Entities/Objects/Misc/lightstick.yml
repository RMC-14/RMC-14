- type: entity
  parent: BaseStructure
  id: RMCLightStick
  name: red lightstick
  description: You can stick them in the ground.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Misc/Lights/lightstick.rsi
    state: lightstick_spoke1
  - type: InteractionOutline
  - type: PointLight
    enabled: true
    radius: 1.65
    energy: 5
    netsync: false
    color: "#FF0000"
  - type: Appearance

- type: entity
  parent: RMCLightStick
  id: RMCLightStickRedSmall
  components:
  - type: Sprite
    state: lightstick_red_variant1

- type: entity
  parent: RMCLightStick
  id: RMCLightStickBlueSmall
  name: blue lightstick
  components:
  - type: Sprite
    state: lightstick_blue_variant1
  - type: PointLight
    color: "#2D2DE3"

- type: entity
  parent: RMCLightStick
  id: RMCLighttubeBlueWall
  name: blue lighttube
  components:
  - type: Clickable
  - type: Sprite
    sprite: _RMC14/Structures/Wallmounts/Lighting/light_tube.rsi
    layers:
    - state: btube-empty
    - state: btube1
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: LitOnPowered
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -15
    range: 2
    sound:
      path: /Audio/Ambience/Objects/light_hum.ogg
  - type: PointLight
    color: "#2D2DE3"
    radius: 3
