- type: entity
  parent: BaseItem
  id: RMCFishingPole
  name: fishing pole
  description: A fishing pole. You reckon you might need water for this.
  components:
  - type: RMCFishingRod
  - type: Sprite
    sprite: _RMC14/Objects/Fishing/Rod/fishing_rod.rsi
    noRot: true
    layers:
    - state: pole_inhand
      map: [ "base" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RMCFishingRodVisuals.Deployed:
        base:
          True: { state: pole }
          False: { state: pole_inhand }
  - type: Item
    size: Large
    sprite: _RMC14/Objects/Fishing/Rod/fishing_rod.rsi
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 15
    soundHit:
      collection: MetalThud
  - type: PhysicalComposition
    materialComposition:
      RMCWood: 50

- type: entity
  id: RMCFishingLineVisualBase
  abstract: true
  name: fishing line
  description: A taut fishing line with a bobber at the end.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Fishing/Effects/fishing_line.rsi
    drawdepth: Effects
  - type: Transform
    anchored: true

- type: entity
  parent: RMCFishingLineVisualBase
  id: RMCFishingLineVisualCastNorth
  components:
  - type: Sprite
    state: cast_north

- type: entity
  parent: RMCFishingLineVisualBase
  id: RMCFishingLineVisualCastSouth
