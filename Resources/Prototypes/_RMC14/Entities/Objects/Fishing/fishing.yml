- type: entity
  parent: BaseItem
  id: RMCFishingBait
  name: fish bait
  description: A tasty piece of... meat? Whatever it is, fish love this.
  components:
  - type: RMCFishBait
  - type: Sprite
    sprite: _RMC14/Objects/Fishing/Bait/bait.rsi
    state: worm_meat
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Fishing/Bait/bait.rsi

- type: entity
  parent: CMFoodBase
  id: RMCFoodFishBase
  abstract: true
  components:
  - type: RMCFish
  - type: Sprite
    sprite: _RMC14/Objects/Fishing/Fish/fish.rsi
  - type: Appearance
  - type: ScaleVisuals
  - type: Food
    transferAmount: 3
  - type: FlavorProfile
    flavors:
    - fishy
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: Nutriment
          Quantity: 3
        - ReagentId: UncookedAnimalProteins
          Quantity: 1
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food
  - type: DrawableSolution
    solution: food

- type: entity
  parent: RMCFoodFishBase
  id: RMCFoodFishCrab
  name: spindle crab
  description: Looks like a little crab.
  components:
  - type: RMCFish
    minLength: 4
    maxLength: 8
    baseGutSpawns:
    - id: RMCFoodMeatFishCrab
    extraGutSpawns:
    - id: RMCFoodMeatFishCrab
  - type: Sprite
    layers:
    - state: crab
      map: [ "base" ]
  - type: GenericVisualizer
    visuals:
      enum.RMCFishVisuals.Gutted:
        base:
          False: { state: crab }
          True: { state: crab_gutted }

