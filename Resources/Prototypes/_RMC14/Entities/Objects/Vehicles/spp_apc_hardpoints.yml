- type: entity
  parent: BaseItem
  id: RMCVehicleSPPAPCHardpointBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
  - type: Item
    size: Large

- type: entity
  parent: RMCVehicleSPPAPCHardpointBase
  id: RMCVehicleSPPAPCWheel
  name: SPP APC wheel
  description: A reinforced APC wheel produced for SPP vehicles.
  components:
  - type: Sprite
    state: spp_tires
  - type: RMCHardpointItem
    hardpointType: Wheel
    vehicleFamily: APC
    slotType: Wheel
    damageMultiplier: 0.15
  - type: RMCHardpointIntegrity
    maxIntegrity: 500
  - type: RMCVehicleWheelItem

- type: entity
  parent: RMCAPCDualCannon
  id: RMCVehicleSPPAPCMinigun
  name: SPP APC minigun turret
  description: A roof-mounted minigun turret for an SPP APC.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: apc_minigun
  - type: RMCHardpointVisual
    vehicleState: apc_minigun_0

- type: entity
  parent: RMCAPCFrontCannon
  id: RMCVehicleSPPAPCAutocannon
  name: SPP APC autocannon
  description: A frontal autocannon hardpoint for an SPP APC.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: apc_autocannon
  - type: RMCHardpointVisual
    vehicleState: apc_autocannon_0

- type: entity
  parent: RMCVehicleTankTowLauncher
  id: RMCVehicleSPPAPCHJ35Launcher
  name: HJ35 APC launcher
  description: A missile launcher fitted to the secondary mount of an SPP APC.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: hj35launcher
  - type: RMCHardpointItem
    hardpointType: Cannon
    vehicleFamily: APC
    slotType: Cannon
    damageMultiplier: 0.11
  - type: RMCHardpointIntegrity
    maxIntegrity: 350
  - type: RMCHardpointVisual
    vehicleState: apc_hj35_0

- type: entity
  parent: RMCAPCFlareLauncher
  id: RMCVehicleSPPAPCFlareLauncher
  name: SPP APC flare launcher
  description: A flare launcher hardpoint for SPP APC support slots.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: spp_flare_launcher
  - type: RMCHardpointVisual
    vehicleState: spp_flare_launcher_0
