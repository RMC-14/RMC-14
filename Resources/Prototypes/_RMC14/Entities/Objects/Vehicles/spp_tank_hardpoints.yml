- type: entity
  parent: BaseItem
  id: RMCVehicleSPPTankHardpointBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/spptank.rsi
  - type: Item
    size: Large

- type: entity
  parent: RMCVehicleTankTurret
  id: RMCVehicleSPPTankTurret
  name: SPP tank turret
  description: A tank turret configured for SPP armor.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/spptank.rsi
    state: tank_turret_0
  - type: VehicleTurret
    rotateToCursor: true
    stabilizedRotation: false
    rotationSpeed: 60
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/spptank.rsi
    overlayState: tank_turret_0
    useDirectionalOffsets: false
    pixelOffsetNorth: "0,-10"
    pixelOffsetEast: "-10,0"
    pixelOffsetSouth: "0,10"
    pixelOffsetWest: "10,0"

- type: entity
  parent: RMCVehicleTankLTAAAPMinigun
  id: RMCVehicleSPPTankP17702
  name: P-17702 rotary cannon
  description: An SPP rotary cannon tank hardpoint.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/spptank.rsi
    state: p17702
  - type: VehicleTurret
    fireWhileRotatingGraceDegrees: 180
    useBarrelDirectionForShots: true
    maxShotCurvatureDegrees: 10
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,40"
    pixelOffsetEast: "33,0"
    pixelOffsetSouth: "0,-50"
    pixelOffsetWest: "-33,0"
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/spptank.rsi
    overlayState: p17702_0
  - type: RMCHardpointVisual
    vehicleState: p17702_0

- type: entity
  parent: RMCVehicleTankLTBCannon
  id: RMCVehicleSPPTankRailgun
  name: SPP railgun
  description: A railgun hardpoint for SPP tank turrets.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/spptank.rsi
    state: railgun
  - type: VehicleTurret
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,30"
    pixelOffsetEast: "30,0"
    pixelOffsetSouth: "0,-50"
    pixelOffsetWest: "-30,0"
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/spptank.rsi
    overlayState: railgun_0
  - type: RMCHardpointVisual
    vehicleState: railgun_0

