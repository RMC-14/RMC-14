- type: entity
  parent: BaseCigar
  id: RMCBaseCigar
  components:
  - type: Flammable
    intensity: 10
    fireSpread: true
    canResistFire: false
    alwaysCombustible: true
    canExtinguish: true 
    damage:
      types:
        Heat: 1
  - type: FireVisuals
    sprite: Effects/fire.rsi
    normalState: fire
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Ash:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
