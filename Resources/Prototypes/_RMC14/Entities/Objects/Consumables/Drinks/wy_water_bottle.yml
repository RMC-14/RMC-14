- type: entity
  parent: DrinkBottlePlasticBaseFull
  id: CMDrinkWEYAWaterBottle30
  name: We-Ya bottled spring water
  description: Overpriced 'Spring' water. Bottled by the We-Ya Corporation.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 50
        reagents:
        - ReagentId: Water
          Quantity: 30
  - type: Drink
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/WEYADrinks/weya_water_bottle.rsi
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: {state: "icon_open"}
          False: {state: "icon"}
  - type: Item
    size: Small
  - type: DamageOnLand
    damage: {}
  - type: DamageOtherOnHit
    damage: {}
  - type: Appearance
  - type: Sealable
  - type: MREItem
  - type: Destructible
    thresholds: [] # TODO RMC14 destroy on explosion unless inside a container
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 5

- type: entity
  parent: CMDrinkWEYAWaterBottle30
  id: RMCDrinkWEYABugJuice
  name: Weston-Yamada Bug Juice Protein Drink
  description: We-Ya brand plastic bottle full of toxic looking green goo, tastes like kiwi, but you are more than sure that there is none of it here.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: RMCJuiceBug
          Quantity: 30
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/WEYADrinks/weya_bug_juice.rsi
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-bug-juice

