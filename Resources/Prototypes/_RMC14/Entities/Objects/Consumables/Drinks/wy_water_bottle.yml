- type: entity
  parent: CMDrinkWEYAWaterBottle30
  id: RMCDrinkWEYASoylent
  name: Weston-Yamada Premium Choco Soylent
  description: A plastic bottle full of gooey goodness, choco flavor. One bottle has enough calories for a lunch - don't drink it all in one sitting, better not risk getting a stomachache.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: RMCSoyMilk
          Quantity: 10
        - ReagentId: RMCChocolateDrink
          Quantity: 10
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/WEYADrinks/weya_soylent.rsi
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-soylent
