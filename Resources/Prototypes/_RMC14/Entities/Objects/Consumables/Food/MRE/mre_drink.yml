# Instant drink powders
- type: entity
  abstract: true
  parent: DrinkBase
  id: RMCMREInstantPowderBase
  components:
  - type: Drink
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 5
  - type: Item
    size: Tiny
  - type: Openable
    sound:
      collection: CMFoodRip
  - type: SolutionTransfer
    transferAmount: 5
    canChangeTransferAmount: false
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Food/mre_contents.rsi
  - type: MREItem

- type: entity
  parent: RMCMREInstantPowderBase
  id: RMCMREInstantPowderOrange
  name: orange juice packet
  description: A small packet of orange flavored drink mix, sweetened with sugar alcohols. For best results, mix with water instead of consuming standalone.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 5
        reagents:
        - ReagentId: RMCInstantJuicePowderOrange
          Quantity: 5
  - type: Sprite
    state: ojpowder

