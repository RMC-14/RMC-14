- type: entity
  parent: CMFoodBase
  id: RMCFoodMeatFish
  name: fish meat
  description: Meat from a fish.
  components:
  - type: FlavorProfile
    flavors:
    - fishy
  - type: Tag
    tags:
    - Raw
    - Meat
  - type: Food
    transferAmount: 3 # 3 bites
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Food/misc.rsi
    state: rawfish
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: Nutriment
          Quantity: 3
        - ReagentId: UncookedAnimalProteins
          Quantity: 1
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Consumable/Food/misc.rsi
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food
  - type: DrawableSolution
    solution: food

