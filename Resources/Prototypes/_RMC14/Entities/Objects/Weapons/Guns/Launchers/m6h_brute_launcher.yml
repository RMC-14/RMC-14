- type: entity
  parent: [BaseWeaponLauncher, CMBaseWeaponGun, RMCBaseAttachableHolder]
  name: M6H-BRUTE
  id: RMCWeaponLauncherM6HBrute
  description: A laser-guided breaching launcher designed to rip open walls and hardened structures with focused shockwaves.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m6h/m6h_inhands.rsi
    layers:
    - state: base
      sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m6h/m6h_icon.rsi
      map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    quickEquip: true
    slots:
    - suitStorage
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m6h/m6h_inhands.rsi
  - type: Gun
    fireRate: 0.83
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_rocketlauncher.ogg
    resetOnHandSelected: false
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - RMCRocketAmmoM5510Brute
    capacity: 1
    cycleable: true
    mayTransfer: false
    insertDelay: 6.0
    cycleDelay: 6.0
    proto: RMCRocketM5510Brute
    soundInsert:
      path: /Audio/_RMC14/Weapons/Guns/Cock/m5_ammo.ogg
  - type: Corrodible
    isCorrodible: false
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: Wieldable
  - type: GunRequiresWield
  - type: GunRequiresSkills
    skills:
      RMCSkillEngineer: 3
  - type: RMCNameItemOnVend
    item: PrimaryGun
  - type: ShootAtFixedPoint
    shootArcProj: false
  - type: GunIFF
    enabled: true
  - type: RMCBruteLauncher
  - type: RMCBackblastOnShoot
  - type: TargetingLaser
    laserState: laser_beam_guided
    laserAlpha: 0.5
    gradualAlpha: true
  - type: WieldableSpeedModifiers
    base: 0.5
    light: 0.69
    medium: 0.75
    heavy: 0.806
  - type: WieldDelay
    baseDelay: 1.2
    preventFiring: true
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 15
  - type: IgnorePredictionHide
  - type: GunIgnorePrediction
  - type: AssistedReloadWeapon
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/explosive_mouse.rsi
      state: all
  - type: Item
    size: Huge
    storedSprite:
      sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m6h/m6h_icon.rsi
      state: icon
  - type: Tag
    tags:
    - RMCWeaponLauncherM6HBrute
  - type: RMCMagneticItem

- type: entity
  id: RMCRocketM5510Brute
  name: M5510 laser-guided rocket
  parent: BaseItem
  description: A breaching rocket tube compatible with the M6H-BRUTE launcher.
  components:
  - type: Tag
    tags:
    - RMCRocketAmmoM5510Brute
  - type: CartridgeAmmo
    proto: RMCProjectileM5510Brute
    deleteOnSpawn: true
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Explosives/m5510_brute.rsi
    layers:
    - state: brute_rocket
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Item
    size: Normal
  - type: Appearance
  - type: IgnorePredictionHide
  - type: AssistedReloadAmmo

- type: entity
  parent: RMCBaseProjectileRocket84mm
  id: RMCProjectileM5510Brute
  name: M5510 laser-guided rocket
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    deleteOnCollide: false
    impactEffect: BulletImpactEffect
    damage:
      types:
        Blunt: 15
    maxFixedRange: 6 # 7 tiles
    queueDeletion: true
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/m5510_brute.rsi
    layers:
    - state: brute
  - type: RMCProjectileAccuracy
    accuracy: 95
    thresholds:
    - range: 7
      falloff: 10
  - type: RMCBruteProjectile
  - type: RMCProjectileSkipXenos
  - type: IgnorePredictionHide

- type: Tag
  id: RMCWeaponLauncherM6HBrute

- type: Tag
  id: RMCRocketAmmoM5510Brute
