- type: entity
  parent: RMCWeaponSMGPDW90
  id: RMCWeaponSMGP90
  name: FN P90 submachinegun
  description: The FN P90 submachine gun. An archaic design, but still widely used by corporate and mercenary groups, sometimes seen in the hands of civilian populations. This weapon only accepts 5.7x28mm rounds.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/p90.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/p90.rsi
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilWielded: 0.1
    recoilUnwielded: 1
    scatterWielded: 14
    scatterUnwielded: 16
    baseFireRate: 10
    burstScatterMult: 4
    modifiers:
      Burst:
        fireDelay: 0.0980
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
      FullAuto:
        maxScatterModifier: 3
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 4
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RMCMagazineSMGP90
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineSMGP90
  - type: Tag
    tags:
    - RMCWeaponSMG
    - RMCWeaponSMGP90

- type: entity
  parent: RMCMagazineSMGPDW90
  id: RMCMagazineSMGP90
  name: FN P90 magazine (5.7x28mm)
  description: A 5.7x28mm magazine for the FN P90.
  components:
  - type: Tag
    tags:
    - CMMagazineSmg
    - RMCMagazineSMGP90
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridge57x28mmP90
    proto: RMCCartridge57x28mmP90
    capacity: 50
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/p90.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  parent: CMCartridge10x20mm
  id: RMCCartridge57x28mmP90
  name: cartridge (5.7x28mm SMG)
  description: A 5.7x28mm cartridge for the FN P90.
  components:
  - type: Tag
    tags:
    - Cartridge
    - RMCCartridge57x28mmP90
  - type: CartridgeAmmo
    proto: RMCBullet57x28mmP90

- type: entity
  parent: Bullet10x20mm
  id: RMCBullet57x28mmP90
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 22
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 22
      falloff: 9999
      ignoreModifiers: true
    - range: 8
      falloff: 5
  - type: CMArmorPiercing
    amount: 10

- type: Tag
  id: RMCWeaponSMGP90

- type: Tag
  id: RMCMagazineSMGP90

- type: Tag
  id: RMCCartridge57x28mmP90
