- type: entity
  parent: CMBaseWeaponSMG
  id: RMCWeaponSMGPCAC5A4
  name: PCAC5A4 submachine gun
  description: A Pistol-Caliber Automatic Carbine, Model 5 - a timeless classic. The A4 variant features a solid stock, and can be occasionally found in the hands of collectors and gun fanatics.
  suffix: Filled
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/pcac5.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/pcac5.rsi
  - type: Gun
    shotsPerBurst: 3
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/smg_light.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilWielded: 1
    recoilUnwielded: 1
    scatterWielded: 6
    scatterUnwielded: 12
    baseFireRate: 4
    burstScatterMult: 3
    modifiers:
      Burst:
        fireDelay: 0.0999
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
      FullAuto:
        maxScatterModifier: 3
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 4
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.2
    accuracyMultiplierUnwielded: 0.8
  - type: MagazineAmmoProvider
    autoEject: false
    soundAutoEject: null
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RMCMagazineSMGPCAC5
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineSMGPCAC5
          - RMCMagazineSMGPCAC5AP
          - RMCMagazineSMGPCAC5Rubber
  - type: AttachableHolder
    randomAttachmentChance: 0.1
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentExtendedCompensator
          - RMCAttachmentSuppressor
          - RMCAttachmentSuppressorCompact
          - RMCM5Bayonet
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS42xTelescopicMiniscope
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentGyroscopicStabilizer
          - RMCAttachmentLaserSight
          - RMCAttachmentBipod
          - RMCAttachmentM203GrenadeLauncher
          - RMCAttachmentExtinguisher
        random:
        - RMCAttachmentM203GrenadeLauncher
      rmc-aslot-stock:
        locked: true
        startingAttachable: RMCAttachmentStockPCAC5Solid
        whitelist:
          tags:
          - RMCAttachmentStockPCAC5Solid
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.715, 0
      rmc-aslot-rail: -0.16, 0.09
      rmc-aslot-underbarrel: 0.25, -0.34
      rmc-aslot-stock: -0.53, 0
  - type: GunDamageModifier
    multiplier: 1.2

- type: entity
  parent: RMCWeaponSMGPCAC5A4
