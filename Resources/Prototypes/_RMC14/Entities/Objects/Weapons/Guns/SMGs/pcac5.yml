  name: PCAC5A5 submachine gun
  description: A Pistol-Caliber Automatic Carbine, Model 5 - a timeless classic. The A5 variant features a collapsible stock, and can be found in limited use by local security forces or the Colony Marshal Bureau.
  suffix: Filled
  components:
  - type: AttachableHolder
    randomAttachmentChance: 0.1
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentExtendedCompensator
          - RMCAttachmentSuppressor
          - RMCAttachmentSuppressorCompact
          - RMCM5Bayonet
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS42xTelescopicMiniscope
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentGyroscopicStabilizer
          - RMCAttachmentLaserSight
          - RMCAttachmentBipod
          - RMCAttachmentM203GrenadeLauncher
          - RMCAttachmentExtinguisher
        random:
        - RMCAttachmentM203GrenadeLauncher
      rmc-aslot-stock:
        locked: true
        startingAttachable: RMCAttachmentStockPCAC5Collapsible
        whitelist:
          tags:
          - RMCAttachmentStockPCAC5Collapsible

# MAGAZINES

- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineSMGPCAC5
  name: "PCAC5 magazine (9mm SMG)"
  description: "A 9mm SMG magazine for the PCAC5."
  components:
  - type: Tag
    tags:
    - CMMagazineSmg
    - RMCMagazineSMGPCAC5
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - CMCartridge9mmSMG
    proto: CMCartridge9mmSMG
    capacity: 30
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/pcac5.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
  - type: Appearance

- type: entity
  parent: RMCMagazineSMGPCAC5
  id: RMCMagazineSMGPCAC5AP
  name: "PCAC5 AP magazine (9mm SMG)"
  suffix: PVE # TODO RMC14: Remove PVE suffix when the 9mm cartridge situation is fixed.
  description: "A 9mm SMG magazine for the PCAC5, loaded with armor-piercing rounds."
  components:
  - type: Tag
    tags:
    - CMMagazineSmg
    - RMCMagazineSMGPCAC5AP
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridge9mmSMGAP
    proto: RMCCartridge9mmSMGAP
    capacity: 30
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/pcac5.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: ammo_band
      color: "#1F951F"

- type: entity
  parent: RMCMagazineSMGPCAC5
  id: RMCMagazineSMGPCAC5Rubber
  name: "PCAC5 rubber magazine (9mm SMG)"
  suffix: PVE # TODO RMC14: Remove PVE suffix when the 9mm cartridge situation is fixed.
  description: "A 9mm SMG magazine for the PCAC5, loaded with less-lethal rubber rounds."
