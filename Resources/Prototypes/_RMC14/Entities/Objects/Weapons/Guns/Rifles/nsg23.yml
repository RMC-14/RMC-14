- type: entity
  parent: [ CMBaseWeaponRifle, RMCBaseWeaponMagazineVisuals ]
  id: RMCWeaponRifleNSG23NoLock
  name: NSG 23 assault rifle
  description: A rare sight, this rifle is seen most commonly in the hands of Weyland-Yutani PMCs. Compared to the M41A MK2, it has noticeably improved handling and vastly improved performance at long and medium range, but compares similarly up close.
  suffix: No ID Lock, Filled
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Rifles/nsg23.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Rifles/nsg23.rsi
  - type: Gun
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      collection: RMCNSG23Shoot
    shotsPerBurst: 3
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilWielded: 2
    recoilUnwielded: 4
    scatterWielded: 3
    scatterUnwielded: 20
    baseFireRate: 4.4
    burstScatterMult: 1
    modifiers:
      Burst:
        fireDelay: 0.1665
        maxScatterModifier: 5
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
      FullAuto:
        fireDelay: 0
        maxScatterModifier: 5
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 4
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.5
    accuracyMultiplierUnwielded: 0.8
  - type: GunDamageModifier
    multiplier: 1.25
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/nsg23_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/nsg23_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineRifleNSG23
          - RMCMagazineRifleNSG23AP
          - RMCMagazineRifleNSG23Extended
          - RMCMagazineRifleNSG23HEAP
          - RMCMagazineRifleNSG23Incendiary
          - RMCMagazineRifleNSG23Rubber
        startingItem: RMCMagazineRifleNSG23
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentExtendedCompensator
          - RMCAttachmentSuppressor
          - RMCM5Bayonet
      rmc-aslot-rail:
        startingAttachable: RMCAttachmentS42xAdvancedTelescopicMiniscope
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS84xTelescopicScope
          - RMCAttachmentS42xTelescopicMiniscope
          - RMCAttachmentS42xAdvancedTelescopicMiniscope
      rmc-aslot-underbarrel:
        startingAttachable: RMCAttachmentMiniFlamethrower
        whitelist:
          tags:
          - RMCAttachmentAngledGrip
          - RMCAttachmentBipod
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentGyroscopicStabilizer
          - RMCAttachmentLaserSight
          - RMCAttachmentU1GrenadeLauncher
          - RMCAttachmentU7UnderbarrelShotgun
          - RMCAttachmentVerticalGrip
          - RMCAttachmentExtinguisher
          - RMCAttachmentFlamer
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.655, 0
      rmc-aslot-rail: -0.125, 0.188
      rmc-aslot-underbarrel: 0.312, -0.188
  - type: Tag
    tags:
    - RMCWeaponRifleNSG23

