- type: entity
  parent: RMCBaseWeaponLMG
  name: QYJ-72 General Purpose Machine Gun
  id: RMCWeaponLMGQYJ72
  description: The QYJ-72 is the standard GPMG of the Socialists Progressive Peoples, chambered in 7.62x54mmR, it fires a hard-hitting cartridge with a high rate of fire. With an extremely large box at 250 rounds, the QYJ-72 is designed with suppressing fire and accuracy by volume of fire at its forefront.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/LMGs/qyj_72/qyj_72_inhands.rsi
    layers:
    - state: base
      sprite: _RMC14/Objects/Weapons/Guns/LMGs/qyj_72/qyj_72_icon.rsi
    - state: bolt-open
      sprite: _RMC14/Objects/Weapons/Guns/LMGs/qyj_72/qyj_72_icon.rsi
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      sprite: _RMC14/Objects/Weapons/Guns/LMGs/qyj_72/qyj_72_icon.rsi
      map: [ "enum.GunVisualLayers.Mag" ]
    - state: cover-closed
      sprite: _RMC14/Objects/Weapons/Guns/LMGs/qyj_72/qyj_72_icon.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/LMGs/qyj_72/qyj_72_inhands.rsi
  - type: Tag
    tags:
    - RMCWeaponLMGQYJ72
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    shotsPerBurst: 6
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_m60.ogg
      params:
        volume: -4
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - Burst
    - FullAuto
    recoilWielded: 1
    scatterWielded: 1
    baseFireRate: 3.33
    burstScatterMult: 3
    modifiers:
      Burst:
        fireDelay: 0.233
        maxScatterModifier: 10
        useBurstScatterMult: true
      FullAuto:
        maxScatterModifier: 6
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.2
    accuracyMultiplierUnwielded: 0.65
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RMCMagazineLMGQYJ72
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineLMGQYJ72
  - type: GunDamageModifier
    multiplier: 1
  # - type: UniqueAction
  # - type: BreechLoaded
  #   needOpenClose: false
  # - type: Appearance
  # - type: GenericVisualizer
  #   visuals:
  #     enum.BreechVisuals.Open:
  #       enum.BreechVisuals.Open:
  #         True: { state: cover-open }
  #         False: { state: cover-closed }
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 40 # im not kidding, this is correct, bipod brings it down to 30
  - type: AttachableHolder
    slots:
      rmc-aslot-underbarrel:
        locked: true
        startingAttachable: RMCAttachmentBipodQYJ
        whitelist:
          tags:
          - RMCAttachmentBipodQYJ
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-underbarrel: 0.27, -0.09
  - type: Wieldable
  - type: GunRequiresWield
  - type: RMCMagneticItem
  - type: GunUserWhitelist
    whitelist:
      components:
      - QYJWhitelist

- type: entity
  parent: RMCMagazineLMGBase
  id: RMCMagazineLMGQYJ72
  name: "QYJ-72 Ammo Box (7.62x54mmR)"
  components:
  - type: Tag
    tags:
    - RMCMagazineLMG
    - RMCMagazineLMGQYJ72
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeLMGQYJ72
    proto: RMCCartridgeLMGQYJ72
    capacity: 250
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/qyj_72.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Appearance

- type: entity
  parent: RMCCartridgeRifleAR10
  id: RMCCartridgeLMGQYJ72
  name: cartridge (7.62x54mmR)
  description: A 7.62x54mmR cartridge
  components:
  - type: Tag
    tags:
    - Cartridge
    - RMCCartridgeLMGQYJ72
  - type: CartridgeAmmo
    proto: RMCBulletLMGQYJ72

- type: entity
  parent: RMCBaseBullet
  id: RMCBulletLMGQYJ72
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 35
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 22
      falloff: 9999
      ignoreModifiers: true
  - type: CMArmorPiercing
    amount: 30
  - type: RMCProjectileAccuracy
    accuracy: 95
    thresholds:
    - range: 14
      falloff: 10

- type: Tag
  id: RMCWeaponLMGQYJ72

- type: Tag
  id: RMCMagazineLMGQYJ72

- type: Tag
  id: RMCCartridgeLMGQYJ72
