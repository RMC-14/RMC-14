- type: entity
  abstract: true
  id: RMCPlantedFlagBase
  name: JIMA planted flag
  description: A planted flag with the iconic UNMC flag plastered all over it, you feel a burst of energy by its mere sight
  components:
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: Clickable
  - type: InteractionOutline
  - type: Actions
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.25
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
      deploy:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 20
        layer:
        - MidImpassable
        - BulletImpassable
        mask:
        - MidImpassable
        - BulletImpassable
        hard: false
  - type: CollisionWake
    enabled: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Sentries/flag.rsi
    drawdepth: Mobs
    noRot: true
    layers:
    - map: [ "base" ]
      state: defense_base_off
    - map: [ "flag" ]
      state: normal_planted_flag_off
  - type: Icon
    sprite: _RMC14/Objects/Weapons/Sentries/flag.rsi
    state: normal_planted_flag_handheld
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.FlagLayers.Layer:
        base:
          Item: { state: "", visible: false }
          Off: { state: defense_base_off, visible: true }
          On: { state: defense_base, visible: true }
        flag:
          Item: { state: normal_planted_flag_handheld }
          Off: { state: normal_planted_flag_off }
          On: { state: normal_planted_flag }
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: UserInterface
    interfaces:
      enum.SentryUiKey.Key:
        type: SentryUpgradeBui
  - type: HealthExaminable
    locPrefix: sentry
    examinableTypes:
    - Blunt
    - Slash
    - Piercing
    - Heat
    - Shock
  - type: ShortExamine
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: RMCRepairable
  - type: RMCNameItemOnVend
    item: Sentry
  - type: RequireProjectileTarget
  - type: Eye
  - type: GuideHelp
    guides:
    - RMCGuideRoleCombatTechnician
  - type: PointLight
  - type: PlantedFlag
  - type: XenoCrusherChargable
    setDamage:
      types:
        Blunt: 40

- type: entity
  parent: [RMCPlantedFlagBase, BaseItem]
  id: RMCPlantedFlag
  components:
  - type: PlantedFlag
  - type: Item
    size: Normal
  - type: RMCDeployableEquipment
    placeableBlacklist:
      components:
      - WeaponMount
      - RMCDeployableEquipment
    deployDelay: 1
    undeployDelay: 1
  - type: UserIFF
    factions:
    - FactionMarine
  - type: Tag
    tags:
    - RMCSentry

