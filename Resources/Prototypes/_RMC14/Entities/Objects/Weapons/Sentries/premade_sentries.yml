- type: entity
  abstract: true
  id: RMCSentryPremade
  name: turret
  description: A deployable, semi-automated turret with AI targeting capabilities. Armed with an M30 Autocannon and a 500-round drum magazine.
  components:
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: Clickable
  - type: InteractionOutline
  - type: Actions
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.25
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
      sentry:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 20
        layer:
        - MidImpassable
        - BulletImpassable
        mask:
        - MidImpassable
        - BulletImpassable
        hard: false
  - type: CollisionWake
    enabled: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Sentries/sentry.rsi
    drawdepth: Mobs
    noRot: true
    layers:
    - map: [ "base" ]
      state: defense_base_off
    - map: [ "sentry" ]
      state: normal_uac_sentry_handheld
  - type: Icon
    sprite: _RMC14/Objects/Weapons/Sentries/sentry.rsi
    state: normal_uac_sentry_handheld
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SentryLayers.Layer:
        base:
          Item: { state: "", visible: false }
          Off: { state: defense_base_off, visible: true }
          On: { state: defense_base, visible: true }
        sentry:
          Item: { state: normal_uac_sentry_handheld }
          Off: { state: normal_uac_sentry_noammo }
          On: { state: normal_uac_sentry_on }
  - type: CombatMode
    toggleMouseRotator: false
  - type: Gun
    fireRate: 2.5
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/gun_sentry.ogg
  - type: MagazineAmmoProvider
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  - type: HTN
    rootTask:
      task: RMCSentryCompound
    blackboard:
      SoundTargetInLOS: !type:SoundPathSpecifier
        path: /Audio/Effects/double_beep.ogg
      VisionRadius: !type:Single
        6.0
      AggroVisionRadius: !type:Single
        6.0
  - type: MouseRotator
    angleTolerance: 5
    rotationSpeed: 180
    simple4DirMode: false
  - type: NoRotateOnInteract
  - type: NoRotateOnMove
  - type: GunIFF
    enabled: true
    intrinsic: true
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: UserInterface
    interfaces:
      enum.SentryUiKey.Key:
        type: SentryUpgradeBui
  - type: RMCHealthExaminable
    speciesType: Mechanical
  - type: ShortExamine
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: RMCRepairable
  - type: RMCNameItemOnVend
    item: Sentry
  - type: RequireProjectileTarget
  - type: RMCWeaponAccuracy
  - type: HomingShots
  - type: Turret

- type: entity
  parent: RMCBaseTurret
  id: RMCSentryDropship
  name: UN 571-D omnidirectional sentry gun
  description: A deployable, semi-automated turret with 360 degree range AI targeting capabilities. Armed with an M30 Autocannon and a 500-round drum magazine.
  suffix: Deployed
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Sentries/sentry.rsi
    drawdepth: Mobs
    noRot: true
    layers:
    - state: defense_base
    - state: omni_uad_sentry_on
  - type: Gun
    fireRate: 2.5
  - type: BallisticAmmoProvider
    cycleable: false
    proto: RMCCartridgeSentry
    capacity: 600
  - type: HTN
    rootTask:
      task: RMCSentryCompound
    blackboard:
      SoundTargetInLOS: !type:SoundPathSpecifier
        path: /Audio/Effects/double_beep.ogg
      VisionRadius: !type:Single
        5.5
      AggroVisionRadius: !type:Single
        5.5
  - type: NpcFactionMember
    factions:
    - UNMC
  - type: MarineIFF
  - type: UserIFF
    factions:
    - FactionMarine
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: MouseRotator
    angleTolerance: 5
    rotationSpeed: 180
    simple4DirMode: false
  - type: Turret

- type: entity
  parent: RMCBaseTurret
  id: RMCTurretColony
  name: UN-635 static gauss turret
  description: A fully-automated defence turret with mid-range targeting capabilities. Armed with a modified M32-S Autocannon and an internal belt feed.
  components:
  - type: InteractionPopup
    interactDelay: 0.2
    successChance: 0.8
    interactSuccessString: petting-success-generic
    interactFailureString: petting-failure-generic
    interactSuccessSound:
      path: /Audio/Effects/double_beep.ogg
  - type: Corrodible
    isCorrodible: false
  - type: Gun
    fireRate: 2.5
  - type: BallisticAmmoProvider
    cycleable: false
    proto: RMCCartridgeSentry
    capacity: 99999
  - type: NpcFactionMember
    factions:
    - UNMC
  - type: MarineIFF
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: HTN
    rootTask:
      task: RMCTurretCompound
    blackboard:
      SoundTargetInLOS: !type:SoundPathSpecifier
        path: /Audio/Effects/double_beep.ogg
      VisionRadius: !type:Single
        5.5
      AggroVisionRadius: !type:Single
        5.5
  - type: UserIFF
    factions:
    - FactionMarine
  - type: RMCHealthExaminable
    speciesType: Mechanical

- type: entity
  parent: BaseStructure
  id: RMCDeployerSentryCheckpoint
  name: checkpoint sentry deployment system
  description: A box that deploys a sentry turret.
  components:
  - type: Transform
    anchored: true
  - type: Appearance
  - type: Sprite
    sprite: _RMC14/Structures/Machines/sentry_deployer.rsi
    layers:
    - state: floor_sentry_installed
      map: [ "enum.EquipmentDeployState.UnDeployed" ]
    - state: floor_sentry_deployed
      map: [ "enum.EquipmentDeployState.Deployed" ]
      visible: false
  - type: ApcPowerReceiver
    powerLoad: 5000
    needsPower: true
  - type: WallMount
    arc: 360
  - type: RMCPowerReceiver
    idleLoad: 0
    activeLoad: 0
    channel: Equipment
  - type: RMCEquipmentDeployer
    deployPrototype: RMCTurretColony
    isDeployableByHand: true
    isDeployable: true
    powerTogglesDeployable: true
    deployOffset: 0, -1
    blacklist:
      components:
      - Xeno
  - type: InteractionOutline