# Point Man
- type: entity
  parent: RMCKitBase
  id: RMCSupplyKitPursuit
  name: M63 Point Man Kit
  components:
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,9,1
  - type: Sprite
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
    layers:
    - state: closed
      map: [ base ]
    - state: pursuit
      map: [ label ]
  - type: Icon
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
  - type: StorageFill
    contents:
    - id: RMCWeaponSMGM63ExtendedFilled
    - id: RMCAttachmentM63ArmBrace
    - id: RMCAttachmentMagneticHarness
    - id: RMCScabbardMacheteFilled
    - id: CMMagazineSMGM63Ext

