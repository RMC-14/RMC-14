- type: entity
  abstract: true
  parent: BaseItem
  id: CMPacketPills
  name: pill packet
  description: Contains pills. Once you take them out, they don't go back in.
  components:
  - type: CMItemSlots
    count: 4
    slot:
      name: Pill
      whitelist:
        tags: []
  - type: RemoveOnlyStorage
  - type: Sprite
    sprite: _RMC14/Objects/Medical/pill_packets.rsi
    layers:
    - state: pill_packet
    - state: pill_packet_4
      map: [ "enum.CMItemSlotsLayers.Fill" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMItemSlotsLayers.Fill:
        enum.CMItemSlotsLayers.Fill:
          Empty: { state: pill_packet_4, visible: false }
          Low: { state: pill_packet_1, visible: true }
          Medium: { state: pill_packet_2, visible: true }
          High: { state: pill_packet_3, visible: true }
          Full: { state: pill_packet_4, visible: true }
  - type: Item
    size: Small
  - type: Tag
    tags:
    - PillPacket
  - type: IconLabel
    textColor: White
    storedOffset: -12, 12
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage

- type: Tag
  id: PillPacket

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsTricordrazine
  name: tricordazine pill packet
  description: This packet contains tricordazine pills. Heals all types of damage slightly. Once you take them out, they don't go back in. Don't take more than 2 pills in a short period.
  components:
  - type: Sprite
    layers:
    - state: pill_packet
    - state: pill_packet_4
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      color: "#d87f2b"
  - type: CMItemSlots
    startingItem: CMPillTricordrazine
  - type: IconLabel
    labelTextLocId: rmc-tricordazine-container-label-text

