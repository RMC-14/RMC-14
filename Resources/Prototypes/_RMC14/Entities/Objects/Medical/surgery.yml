    size: Small
  - type: RMCSurgeryTool
    openSurgeryMenu: true
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage
  - type: StaticPrice
    price: 24
  - type: Tag
    tags:
    - RMCSurgeryTool

# Retractor
- type: entity
  parent: CMBaseToolSurgery
  id: CMRetractor
