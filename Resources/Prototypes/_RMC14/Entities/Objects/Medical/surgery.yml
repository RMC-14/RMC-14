# Scalpel
- type: entity
  parent: CMBaseToolSurgery
  id: CMScalpel
  name: scalpel
  description: Cut, cut, and once more cut.
  components:
  - type: RMCSurgeryTool
    toolTypes:
    - kind: Scalpel
      quality: Ideal
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
  - type: Sharp
    butcherDelayModifier: 1.5
  - type: Utensil
    types:
    - Knife
  - type: MeleeWeapon
    wideAnimationRotation: 90
    swingLeft: true
    attackRate: 1.5
    damage:
      types:
        Slash: 8
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Tag
    tags:
    - RMCScalpel
    - RMCSurgeryTool

  - type: PhysicalComposition
    materialComposition:
      CMSteel: 10000
      CMGlass: 5000

# - Predator
- type: entity
  parent: CMScalpel
  id: CMScalpelPredator
  name: cutter
  components:
  - type: Sprite
    state: predator_scalpel

# - Laser
- type: entity
  parent: CMScalpel
  id: CMScalpelLaser
  name: prototype laser scalpel
  description: A scalpel augmented with a directed laser, for controlling bleeding as the incision is made. Also functions as a cautery. This one looks like an unreliable early model.
  components:
  - type: RMCSurgeryTool
    toolTypes:
    - kind: Scalpel
      quality: Ideal
    - kind: LaserScalpel
      quality: Ideal
      stepOverrides:
      - step: RMCSurgeryStepOpenIncisionWithLaserScalpel
        clampBleedersChance: 0.6
    - kind: Cautery
      quality: Awful
  - type: Sprite
    layers:
    - state: scalpel_laser
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: MeleeWeapon
    damage:
      types:
        Slash: 0
  - type: ItemToggle
    predictable: false
  - type: ItemToggleHot
  - type: UseDelay
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Slash: 14
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: scalpel_laser_on }
          False: { state: scalpel_laser }

# - - Improved
- type: entity
  parent: CMScalpelLaser
  id: CMScalpelLaserImproved
  name: laser scalpel
  description: A scalpel augmented with a directed laser, for controlling bleeding as the incision is made. Also functions as a cautery. This one looks trustworthy, though it could be better.
  components:
  - type: RMCSurgeryTool
    toolTypes:
    - kind: Scalpel
      quality: Ideal
    - kind: LaserScalpel
      quality: Ideal
      stepOverrides:
      - step: RMCSurgeryStepOpenIncisionWithLaserScalpel
        clampBleedersChance: 0.8
    - kind: Cautery
      quality: Awful
  - type: Sprite
    layers:
    - state: scalpel_laser_2
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: scalpel_laser_2_on }
          False: { state: scalpel_laser_2 }

# - - Advanced
- type: entity
  parent: CMScalpelLaser
  id: CMScalpelLaserAdvanced
  name: advanced laser scalpel
  description: A scalpel augmented with a directed laser, for controlling bleeding as the incision is made. Also functions as a cautery. This one looks to be the pinnacle of precision energy cutlery!
  components:
  - type: RMCSurgeryTool
    toolTypes:
    - kind: Scalpel
      quality: Ideal
    - kind: LaserScalpel
      quality: Ideal
      stepOverrides:
      - step: RMCSurgeryStepOpenIncisionWithLaserScalpel
        clampBleedersChance: 1.0
    - kind: Cautery
      quality: Awful
  - type: Sprite
    layers:
    - state: scalpel_laser_3
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
