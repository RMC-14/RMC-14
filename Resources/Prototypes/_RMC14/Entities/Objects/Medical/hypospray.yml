- type: entity
  parent: BaseItem
  id: CMHypospray
  name: hypospray
  description: The Avant Biomedical hypospray is a sterile, air-needle auto-injector for rapid administration of drugs to patients.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/hypospray.rsi
    layers:
      - state: empty
        map: [ "emptyLayer" ]
      - state: hypospray
        map: [ "fullLayer" ]
      - state: hypospray1
        map: [ "enum.SolutionContainerLayers.Fill" ]
        visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: hypospray
    emptySpriteName: hypospray
    changeColor: true
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Medical/hypospray.rsi
  - type: Appearance
  - type: UseDelay
    delay: 0.333
  - type: Tag
    tags:
    - Hypospray
  - type: MedicallyUnskilledDoAfter
    min: 1
    doAfter: 3
  - type: ItemSlots
    slots:
      vial:
        name: Vial
        insertSound: /Audio/_RMC14/Weapons/safety_toggle.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        whitelist:
          components:
          - Vial
  - type: ContainerContainer
    containers:
      vial: !type:ContainerSlot
  - type: RMCConnectedContainer
    containerId: vial
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage
# for the vial
  - type: MixableSolution
    solution: beaker
  - type: RefillableSolution
    solution: beaker
  - type: DrainableSolution
    solution: beaker
  - type: ExaminableSolution
    solution: beaker
  - type: DrawableSolution
    solution: beaker
  - type: InjectableSolution
    solution: beaker
  - type: Hypospray
    solutionName: beaker
    injectOnly: true
    onlyAffectsMobs: true
    canContainerDraw: false
    injectSound:
      path: /Audio/_RMC14/Medical/hypospray.ogg
  - type: CMItemSlots
  - type: GenericVisualizer
    visuals:
      enum.CMItemSlotsLayers.Fill:
        fullLayer:
          Empty: { visible: false }
          Full: { visible: true }
        emptyLayer:
          Empty: { visible: true }
          Full: { visible: false }
  - type: RMCHypoTransferAmounts
  - type: RMCTacticalReloadSlot
    slotId: vial
    tacticalSkills:
      all:
        RMCSkillMedical: 1
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 1250

- type: Tag
  id: Hypospray

- type: entity
  parent: CMHypospray
  id: CMHyposprayWithVial
  suffix: Vial
  components:
  - type: ContainerFill
    containers:
      vial:
      - RMCVial
  - type: PhysicalComposition
    materialComposition:
      CMGlass: 250
      RMCPlastic: 1250

- type: entity
  parent: CMHyposprayWithVial
  id: CMHyposprayFilledTricord
  name: tricordrazine hypospray
  suffix: Filled, Tricordrazine
  components:
  - type: ContainerFill
    containers:
      vial:
      - RMCVialTricordrazine
  - type: CMRefillableSolution
    solution: beaker
    reagents:
      CMTricordrazine: 30

- type: entity
  parent: CMHypospray
  id: RMCHyposprayFilledEpi
  name: epinephrine hypospray
  suffix: Filled, Epinephrine
  components:
  - type: ContainerFill
    containers:
      vial:
      - RMCVialEpinephrine
  - type: CMRefillableSolution
    solution: beaker
    reagents:
      CMEpinephrine: 30
