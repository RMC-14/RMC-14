- type: entity
  parent: BaseItem
  id: RMCSnowPile
  name: snow pile
  description: A loose pile of snow.
  components:
  - type: Item
    sprite: _RMC14/Objects/Misc/snow.rsi
    size: Small
  - type: Sprite
    sprite: _RMC14/Objects/Misc/snow.rsi
    layers:
    - state: snow_stack
  - type: SnowPile
  - type: FullSandbag
    stackRequired: 3
    builds: RMCBarricadeSnow
  - type: Stack
    stackType: RMCSnowPile
    count: 1

- type: entity
  parent: BaseItem
  id: RMCSnowball
  name: snowball
  description: A compact ball of snow.
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _RMC14/Objects/Misc/snow.rsi
    layers:
    - state: snowball
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 0
    hidden: true
  - type: Snowball
  - type: LandAtCursor

- type: stack
  id: RMCSnowPile
  name: snow pile
  spawn: RMCSnowPile
  maxCount: 25
