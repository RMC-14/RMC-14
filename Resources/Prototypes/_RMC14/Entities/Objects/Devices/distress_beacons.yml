- type: entity
  parent: BaseItem
  id: RMCHandheldDistressBeaconBase
  name: rmc-ert-entity-handheld-distress-beacon-name
  description: rmc-ert-entity-handheld-distress-beacon-description
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/handheld_distress_beacon.rsi
    layers:
    - state: beacon_inactive
      map: [ "base" ]
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Devices/handheld_distress_beacon.rsi
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RMCERTDistressBeaconVisuals.Active:
        base:
          "True": { state: beacon_active }
          "False": { state: beacon_inactive }
  - type: UserInterface
    interfaces:
      enum.DialogUiKey.Key:
        type: DialogBui
  - type: RMCERTDistressBeacon

- type: entity
  parent: RMCHandheldDistressBeaconBase
  id: RMCHandheldDistressBeaconCMB
  name: rmc-ert-entity-cmb-distress-beacon-name
  suffix: CMB
  components:
  - type: RMCERTDistressBeacon
    recipient: rmc-ert-recipient-anchorpoint
    requestTitle: rmc-ert-beacon-request-title-cmb
    allowedCalls:
    - RMCERTCallCMB

