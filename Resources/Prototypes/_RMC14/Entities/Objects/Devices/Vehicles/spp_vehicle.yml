- type: entity
  parent: RMCVehicleVan
  id: RMCVehicleSPPVan
  name: SPP van
  description: A rugged transport van painted in SPP colors.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/sppvan.rsi
    layers:
    - map: [ base ]
      state: sppvan_base
    - map: [ damaged_frame ]
      state: damaged_frame
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/van_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 8
    maxXenos: 2
    entryPoints:
    - offset: 1,-1
      radius: 0.6
      interiorCoords: 3.5,-0.34
    - offset: -1,-1
      radius: 0.6
      interiorCoords: 3.25,-1
    - offset: 0,2
      radius: 0.75
      interiorCoords: 0.25,-1

- type: entity
  parent: RMCVehicleSPPVan
  id: RMCVehicleSPPVanArmed
  name: SPP van (armed)
  description: An SPP van fitted with a roof-mounted weapon.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/sppvan.rsi
    layers:
    - map: [ base ]
      state: sppvant_base
    - map: [ damaged_frame ]
      state: damaged_frame
      visible: false
    - map: [ secondary ]
      state: SECONDARY
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: RMCVehicleHardpointVisuals
  - type: ItemSlots
    slots:
      secondary:
        startingItem: RMCVehicleSPPVanTurret
        whitelist:
          components:
          - RMCHardpointItem
  - type: RMCHardpointSlots
    vehicleFamily: Van
    slots:
    - id: secondary
      hardpointType: Secondary
      slotType: Launcher
      visualLayer: secondary
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: Wheel
      slotType: Wheel
      insertDelay: 1.5
      whitelist:
        components:
        - RMCVehicleWheelItem
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/van_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 8
    maxXenos: 2
    entryPoints:
    - offset: 1,-1
      radius: 0.6
      interiorCoords: 3.5,-0.34
    - offset: -1,-1
      radius: 0.6
      interiorCoords: 3.25,-1
    - offset: 0,2
      radius: 0.75
      interiorCoords: 0.25,-1

