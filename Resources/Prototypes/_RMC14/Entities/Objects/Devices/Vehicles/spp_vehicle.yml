- type: entity
  parent: RMCVehicleTank
  id: RMCVehicleSPPTank
  name: SPP tank
  description: A heavy SPP battle tank.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/spptank.rsi
    layers:
    - map: [ base ]
      state: tank_base
    - map: [ armor ]
      state: ARMOR
      visible: false
    - map: [ primary ]
      state: tank_turret_0
    - map: [ secondary ]
      state: SECONDARY
      visible: false
    - map: [ support ]
      state: SUPPORT
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: SpriteMovement
    movementLayers:
      rmc-wheels:
        state: wheels_0
    noMovementLayers:
      rmc-wheels:
        state: wheels_1
  - type: ItemSlots
    slots:
      primary:
        startingItem: RMCVehicleSPPTankTurret
        whitelist:
          components:
          - RMCHardpointItem
      wheel-1:
        startingItem: RMCVehicleTankTreads
        whitelist:
          components:
          - RMCVehicleWheelItem
      wheel-2:
        startingItem: RMCVehicleTankTires
        whitelist:
          components:
          - RMCVehicleWheelItem
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/tank_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 4
    maxXenos: 2
    entryPoints:
    - offset: 0,2
      radius: 1
      interiorCoords: 0.5,-1
