- type: entity
  parent: BaseItem
  id: RMCWhistle
  name: whistle
  description: A metal pea-whistle. Can be blown while held, or worn in the mouth
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/whistle.rsi
    state: whistle
  - type: Item
    size: Tiny
  - type: Clothing
    slots:
      - mask
      - neck
  - type: EmitSoundOnUse
    sound:
      collection: TrenchWhistle
  - type: EmitSoundOnAction
    sound:
      collection: TrenchWhistle
  - type: UseDelay
    delay: 10
  - type: Whistle
    distance: 15 # Let your enemies hear the sound of death approaching
  - type: RMCWhistle

- type: entity
  parent: RMCWhistle
  id: RMCWhistleTrench
  name: trench whistle
  description: A metallic field whistle, popularized back in the early 20th century. Can be blown while held, or worn in the mouth.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/whistle.rsi
    state: trench_whistle
  - type: EmitSoundOnUse
    sound:
      collection: RMCTrenchWhistle
  - type: EmitSoundOnAction
    sound:
      collection: RMCTrenchWhistle
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-trench-whistle 