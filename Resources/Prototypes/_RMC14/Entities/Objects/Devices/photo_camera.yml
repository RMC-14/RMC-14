- type: entity
  parent: BaseItem
  id: RMCPhotoCamera
  name: camera
  description: A polaroid camera.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/photo_camera.rsi
    state: icon
  - type: Item
    size: Small
  - type: Wieldable
  - type: Clothing
    quickEquip: false
    slots:
    - Belt
  - type: RMCPhotoCamera

- type: entity
  parent: RMCPhotoCamera
  id: RMCPhotoCameraOld
  name: old camera
  description: An old, slightly beat-up retro-esque polaroid camera, it's antiquated enough to be marked as a collectors item, probably. It's a nice shade of blue.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/photo_camera.rsi
    state: old
  - type: Item
    size: Tiny
  - type: RMCPhotoCamera
    remainingCharges: 30
    canBeRecharged: false

- type: entity
  parent: BaseItem
  id: RMCPhotoCameraFilmCartridge
  name: film cartridge
  description: A camera film cartridge. Insert it into a camera to reload it.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/photo_camera.rsi
    state: film
  - type: Item
    size: Tiny
  - type: RMCPhotoCameraFilm

- type: entity
  parent: BaseItem
  id: RMCPhotoCameraPicture
  name: photo
  description: A picture taken by a polaroid camera.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: photo_item
  - type: Item
    size: Tiny
  - type: RMCPhoto
  - type: ActivatableUI
    key: enum.RMCPhotoUi.Key
  - type: UserInterface
    interfaces:
      enum.RMCPhotoUi.Key:
        type: PhotoBui
