# Shiva Base
- type: entity
  abstract: true
  parent: RMCMapInsertBase
  id: RMCMapInsertShivaBase
  suffix: Insert Shiva
  components:
  - type: MapInsert
    clearEntities: true
    clearDecals: true
    replaceAreas: true


# Standalones
- type: entity
  parent: RMCMapInsertShivaBase
  id: RMCMapInsertShivaSouthCaves
  name: LZ2 South Caves
  suffix: Insert Shiva
  components:
  - type: MapInsert
    variations:
    - spawn: "/Maps/_RMC14/Inserts/Shiva/builtup_lz2-south-caves.yml"
      probability: 0.30
    - spawn: "/Maps/_RMC14/Inserts/Shiva/destroyed_lz2-south-caves.yml"
      probability: 0.20


# Survivor Scenario Inserts
- type: entity
  abstract: true
  parent: RMCMapInsertShivaBase
  id: RMCMapInsertShivaBaseScenario
  suffix: Insert Shiva
  components:
  - type: MapInsert
    replaceAreas: false

# Panic Room
- type: entity
  parent: RMCMapInsertShivaBaseScenario
  id: RMCMapInsertShivaPanicRoomHold
  name: Panic Room Hold
  suffix: Insert Shiva
  components:
  - type: MapInsert
    variations:
    - spawn: "/Maps/_RMC14/Inserts/Shiva/panic_room_hold.yml"
      probability: 1
      nightmareScenario: panic_room_hold
      offset: 0,2

