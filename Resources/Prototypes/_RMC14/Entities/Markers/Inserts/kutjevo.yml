# Kutjevo Base
- type: entity
  abstract: true
  parent: RMCMapInsertBase
  id: RMCMapInsertKutjevoBase
  suffix: Insert Kutjevo
  components:
  - type: MapInsert
    clearEntities: true
    clearDecals: true
    replaceAreas: true

