- type: entity
  parent: MarkerBase
  id: RMCERTSpawnMarker
  name: ERT spawn marker
  suffix: ERT
  description: Fallback spawn marker for emergency response team members on ERT shuttles.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: green
  - type: RMCERTSpawnPoint
    roleTags: [ rifleman ]
    seatTags: [ troop ]

- type: entity
  parent: RMCERTSpawnMarker
  id: RMCERTSpawnMarkerCommand
  suffix: ERT, Command
  components:
  - type: Sprite
    state: blue
  - type: RMCERTSpawnPoint
    roleTags: [ leader, command ]
    seatTags: [ command ]
    priority: 100

- type: entity
