# RMCERTSpawnPoint field guide:
# - roleTags: responder role tags this marker is intended to spawn.
# - seatTags: preferred shuttle seat tags copied into seat assignment.
# - priority: higher values are considered before lower-priority markers.
#
# RMCERTSeat field guide:
# - seatTags: tags describing which roster roles prefer this seat.
# - reservedRoleTags: role tags that should reserve this seat before generic assignment.
# - priority: higher values are assigned before lower-priority seats.
# - occupiedBy: runtime responder assigned to this seat; normally not set in prototypes.
# - reservationExpires: runtime round time when a temporary reservation expires.

- type: entity
  parent: MarkerBase
  id: RMCERTSpawnMarker
  name: ERT spawn marker
  suffix: ERT
  description: Fallback spawn marker for emergency response team members on ERT shuttles.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: green
  - type: RMCERTSpawnPoint
    roleTags: [ rifleman ]
    seatTags: [ troop ]

- type: entity
  parent: RMCERTSpawnMarker
  id: RMCERTSpawnMarkerCommand
  suffix: ERT, Command
  components:
  - type: Sprite
    state: blue
  - type: RMCERTSpawnPoint
    roleTags: [ leader, command ]
    seatTags: [ command ]
    priority: 100

