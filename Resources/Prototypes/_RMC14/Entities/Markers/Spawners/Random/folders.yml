- type: entity
  parent: MarkerBase
  id: RMCSpawnerRandomFolder
  name: random folder spawner
  components:
    - type: Sprite
      layers:
        - sprite: _RMC14/Objects/Misc/folders.rsi
          state: folder
    - type: RandomSpawner
      prototypes:
        - CMFolderBlue
        - CMFolderRed
        - CMFolderYellow
        - CMFolderWhite
        - CMFolderBlack
        - CMFolderGreen
        - CMFolderBlackYellow
        - CMFolderBlackWhite
        - CMFolderBlackRed
        - CMFolderBlackGreen
        - CMFolderBlackBlue
      offset: 0

