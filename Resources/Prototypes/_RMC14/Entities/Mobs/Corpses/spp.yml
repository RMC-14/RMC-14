# CMB Deputy
- type: randomHumanoidSettings
  parent: RMCCorpse
  id: RMCCorpseSPPSoldier
  components:
  - type: Loadout
    prototypes: [ RMCGearCorpseSPPSoldier ]
  - type: Rank
    rank: RMCRankSPPEfreitor
  - type: Marine
    icon:
      sprite: _RMC14/Interface/job_icons/SPP/standard.rsi
      state: spp_pvt
  - type: NpcFactionMember
    factions:
    - SPP
    - Civilian

- type: startingGear
  id: RMCGearCorpseSPPSoldier
  equipment:
    jumpsuit: CMJumpsuitSPP
    back: RMCSatchelSPPRifleman
    outerClothing: RMCArmorSPP
    gloves: RMCHandsVeteranSPP
    shoes: RMCBootsSPPFilled
    head: ArmorHelmetSPP
    id: RMCIDSPPRifleman
    ears: RMCHeadsetSPP
  storage:
    outerClothing:
    - RMCBinoculars

