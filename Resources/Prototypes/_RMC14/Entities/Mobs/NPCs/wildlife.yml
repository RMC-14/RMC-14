- type: entity
  id: RMCMobGiantLizard
  parent: RMCSimpleMob
  name: giant lizard
  description: A huge territorial reptile with a heavy jaw and patient eyes.
  suffix: RMC
  components:
  - type: RMCGiantLizard
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RMCGiantLizardVisuals.Body:
        enum.RMCGiantLizardVisualLayers.Base:
          Running: { state: running }
          Sleeping: { state: sleeping }
          KnockedDown: { state: knocked-down }
          Dead: { state: dead }
      enum.RMCGiantLizardVisuals.Wounds:
        enum.RMCGiantLizardVisualLayers.Wounds:
          None: { visible: false }
          Small: { state: wounds-small, visible: true }
          Big: { state: wounds-big, visible: true }
          SmallRest: { state: wounds-small-rest, visible: true }
          BigRest: { state: wounds-big-rest, visible: true }
          SmallStun: { state: wounds-small-stun, visible: true }
          BigStun: { state: wounds-big-stun, visible: true }
      enum.RMCGiantLizardVisuals.Tongue:
        enum.RMCGiantLizardVisualLayers.Tongue:
          True: { visible: true }
          False: { visible: false }
  - type: Sprite
    drawdepth: Mobs
    sprite: _RMC14/Mobs/Animals/giant_lizard.rsi
    layers:
    - map: ["enum.RMCGiantLizardVisualLayers.Base"]
      state: running
    - map: ["enum.RMCGiantLizardVisualLayers.Wounds"]
      state: wounds-small
      visible: false
    - map: ["enum.RMCGiantLizardVisualLayers.Tongue"]
      state: tongue
      visible: false
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.6
        density: 250
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      350: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.7
    baseSprintSpeed: 4.5
  - type: NpcFactionMember
    factions:
    - SimpleNeutral
  - type: FactionException
  - type: NPCRetaliation
    attackMemoryLength: 30
  - type: HTN
    rootTask:
      task: RMCGiantLizardCompound
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Effects/bite.ogg
    angle: 0
    animation: WeaponArcBite
    damage:
      groups:
        Brute: 22
  - type: Butcherable
    spawned:
    - id: FoodMeatLizard
      amount: 8
    - id: FoodMeat
      amount: 4
  - type: SoundOnDeath
    sound:
      path: /Audio/_RMC14/Animals/GiantLizard/giant_lizard_death.ogg
  - type: Flammable
  - type: CanBeFirePatted
  - type: Tag
    tags:
    - FootstepSound
    - Meat

