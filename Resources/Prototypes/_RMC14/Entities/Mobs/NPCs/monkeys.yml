# THE SHIT I NEED TO DO JUST SO WE DONT HAVE TO FUCKING SPECIFY A GHOST ROLE CHANCE OF 0
- type: entity
  parent: [RMCSmallHost]
  id: CMMobSmallHostMonkey
  name: monkey
  suffix: RMC
  components:
  - type: NameIdentifier
    group: Monkey
  - type: Speech
    speechSounds: Monkey
    speechVerb: Monkey
  - type: MonkeyAccent

- type: entity
  parent: [RMCSmallHost]
  id: CMMobSmallHostKobold
  name: kobold
  suffix: RMC
  components:
  - type: NameIdentifier
    group: Kobold
  - type: LizardAccent
  - type: ReplacementAccent
    accent: kobold
  - type: Speech
    speechSounds: Lizard
    speechVerb: Reptilian
    allowedEmotes: ['Thump']
  - type: Vocal
    sounds:
      Male: MaleReptilian
      Female: FemaleReptilian
      Unsexed: MaleReptilian
  - type: BodyEmotes
    soundsId: ReptilianBodyEmotes
  - type: TypingIndicator
    proto: lizard
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    animation: WeaponArcClaw
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      sprite: _RMC14/Mobs/Animals/monkeys/kobold.rsi
      state: kobold
    - map: [ "horns" ]
      sprite: Mobs/Customization/reptilian_parts.rsi
      state: horns_short
    - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
      color: "#ffffff"
      sprite: Objects/Misc/handcuffs.rsi
      state: body-overlay-2
      visible: false
    - map: [ "ears" ]
    - map: [ "id" ]
    - map: [ "mask" ]
    - map: [ "head" ]
    - map: [ "clownedon" ]
      sprite: "Effects/creampie.rsi"
      state: "creampie_human"
      visible: false
  - type: RandomSprite
    getAllGroups: true
    available:
      - enum.DamageStateVisualLayers.Base:
          kobold: KoboldColors
      - horns:
          horns_curled: KoboldHornColors
          horns_ram: KoboldHornColors
          horns_short: KoboldHornColors
          horns_myrsore: KoboldHornColors
          horns_bighorn: KoboldHornColors
          horns_argali: KoboldHornColors
          horns_ayrshire: KoboldHornColors
          horns_floppy_kobold_ears: Inherit
          horns_double: Inherit
          horns_kobold_ears: Inherit

