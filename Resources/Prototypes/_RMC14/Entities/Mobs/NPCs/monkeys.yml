# TODO: Obfuscate name for xeno to refer to them as Fuzzys or pests

- type: entity
  parent: [RMCSmallHost]
  id: CMMobMonkey
  name: monkey
  suffix: RMC
  components:
  - type: NameIdentifier
    group: Monkey
  - type: Speech
    speechSounds: Monkey
    speechVerb: Monkey
  - type: MonkeyAccent

- type: entity
  parent: [RMCSmallHost]
  id: CMMobKobold
  name: kobold
  suffix: RMC
  components:
  - type: NameIdentifier
    group: Kobold
  - type: LizardAccent
  - type: ReplacementAccent
    accent: kobold
  - type: Speech
    speechSounds: Lizard
    speechVerb: Reptilian
    allowedEmotes: ['Thump']
  - type: Vocal
    sounds:
      Male: MaleReptilian
      Female: FemaleReptilian
      Unsexed: MaleReptilian
  - type: BodyEmotes
    soundsId: ReptilianBodyEmotes
  - type: TypingIndicator
    proto: lizard
  - type: InteractionPopup
    successChance: 0.9
    interactSuccessString: petting-success-monkey
    interactFailureString: petting-failure-monkey
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/lizard_happy.ogg
    interactFailureSound:
      path: /Audio/Items/wirecutter.ogg
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    animation: WeaponArcClaw
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      sprite: Mobs/Animals/kobold.rsi
      state: kobold
    - map: [ "outline" ]
      sprite: Mobs/Animals/kobold.rsi
      state: outline
    - map: [ "horns" ]
      sprite: Mobs/Customization/reptilian_parts.rsi
      state: horns_short
    - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
      color: "#ffffff"
      sprite: Objects/Misc/handcuffs.rsi
      state: body-overlay-2
      visible: false
    - map: [ "ears" ]
    - map: [ "id" ]
    - map: [ "mask" ]
    - map: [ "head" ]
    - map: [ "clownedon" ]
      sprite: "Effects/creampie.rsi"
      state: "creampie_human"
      visible: false
  - type: RandomSprite
    getAllGroups: true
    available:
      - enum.DamageStateVisualLayers.Base:
          kobold: KoboldColors
      - horns:
          horns_curled: KoboldHornColors
          horns_ram: KoboldHornColors
          horns_short: KoboldHornColors
          horns_myrsore: KoboldHornColors
          horns_bighorn: KoboldHornColors
          horns_argali: KoboldHornColors
          horns_ayrshire: KoboldHornColors
          horns_floppy_kobold_ears: Inherit
          horns_double: Inherit
          horns_kobold_ears: Inherit
#TODO: port other monkey vars; "Farwa" dog/cat monkey "Neaera" Skrell-key "Stok" Parrot monkey "Yiren" Wierd cartoon esq Alien looking monkey, Dont take cold damage

# Spawners

- type: entity
  parent: MarkerBase
  id: CMSpawnMobMonkey
  name: monkey spawner
  suffix: RMC
  components:
  - type: Sprite
    layers:
    - state: monkey_spawn
      sprite: _RMC14/Markers/landmarks.rsi
  - type: ProportionalSpawner
    id: CMSpawnMobMonkey
    prototypes:
    - CMMobMonkey

- type: entity
  parent: MarkerBase
  id: CMSpawnMobKobold
  name: kobold spawner
  suffix: RMC
  components:
  - type: Sprite
    layers:
    - state: green
    - state: kobold
      sprite: Mobs/Animals/kobold.rsi
  - type: ProportionalSpawner
    id: CMSpawnMobMonkey
    prototypes:
    - CMMobKobold
