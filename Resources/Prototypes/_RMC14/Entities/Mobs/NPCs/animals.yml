- type: entity
  parent: RMCMobCatCalico
  id: CMMobJones
  name: Jones
  description: A tough, old stray whose origin no one seems to know.
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      45: Critical
      50: Dead # A TOUGH old stray, yes this is parity reasoning
  - type: Grammar
    attributes:
      proper: true
      gender: male
  - type: WarpPoint
    follow: true
    location: Jones

- type: entity
