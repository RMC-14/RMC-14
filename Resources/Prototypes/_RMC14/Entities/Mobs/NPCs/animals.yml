#-- Pets --
# TODO: Fill pets with tungston cubes to prevent animal abuse, add way to pat and pickup. Obfuscate name for xeno to refer to them as Fuzzys/Pet
- type: entity
  parent: RMCSimpleMob
  id: RMCMobCorgi
  name: corgi
  description: It's a corgi.
  abstract: true
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 2
  - type: ReplacementAccent
    accent: dog
  - type: Speech
    speechVerb: Canine
    speechSounds: Dog
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 150
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      15: Critical
      20: Dead
  - type: Grammar
    attributes:
      gender: epicene
  - type: FixedIdentity
    name: cm-chatsan-replacement-dog

- type: entity
  parent: RMCMobCorgi
  id: CMMobWiggles
  name: Mister Wiggles
  description: It's a corgi puppy. MISTER WIGGLES!! HE IS THE GREATEST!
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: Mobs/Pets/corgi.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: puppy
  - type: DamageStateVisuals
    states:
      Alive:
        Base: puppy
      Critical:
        Base: puppy_dead
      Dead:
        Base: puppy_dead
  - type: WarpPoint
    follow: true
    location: Mister Wiggles


