# TODO: Fill pets with tungston cubes to prevent animal abuse, add way to pat and pickup. Obfuscate name for xeno to refer to them as Fuzzys/Pet
- type: entity
  parent: RMCSimpleMob
  id: RMCMobCorgi
  name: corgi
  description: It's a corgi.
  abstract: true
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 2
  - type: ReplacementAccent
    accent: dog
  - type: Speech
    speechVerb: Canine
    speechSounds: Dog
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 150
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      15: Critical
      20: Dead
  - type: Grammar
    attributes:
      gender: epicene
  - type: FixedIdentity
    name: cm-chatsan-replacement-dog
  - type: InteractionPopup
    interactSuccessString: petting-success-dog
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/small_dog_bark_happy.ogg

