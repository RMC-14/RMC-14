- type: entity
  id: CMSurgeryStepBase
  categories: [ HideSpawnMenu ]
  components:
  - type: CMSurgeryStep

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepOpenIncisionScalpel
  name: Cut with a scalpel
  components:
  - type: CMSurgeryStep
    tool:
    - Scalpel
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel2.ogg
    add:
    - type: CMIncisionOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: RMCSurgeryComplicationEffects
    successBleedDamage: 10
    failureDirectDamage:
      types:
        Blunt: 10
  - type: CMSurgeryStepEmoteEffect

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepClampBleeders
  name: Clamp the bleeders
  components:
  - type: CMSurgeryStep
    tool:
    - Hemostat
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/hemostat1.ogg
    add:
    - type: CMBleedersClamped
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: RMCSurgeryComplicationEffects
    failureBleedDamage: 15
    failureDirectDamage:
      types:
        Blunt: 4
  - type: CMSurgeryClampBleedEffect

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepRetractSkin
  name: Retract the skin
  components:
  - type: CMSurgeryStep
    tool:
    - Retractor
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor2.ogg
    add:
    - type: CMSkinRetracted
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Blunt: 15

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepSawBones
  name: Saw through bones
  components:
  - type: CMSurgeryStep
    tool:
    - BoneSaw
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/saw.ogg
    add:
    - type: CMRibcageSawed
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
    state: saw
  - type: CMSurgeryStepEmoteEffect
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Blunt: 20

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepPriseOpenBones
  name: Prise the bones open
  components:
  - type: CMSurgeryStep
    tool:
    - Retractor
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor2.ogg
    add:
    - type: CMRibcageOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Blunt: 15

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepCutLarvaRoots
  name: Cut larva roots
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - Scalpel
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel2.ogg
  - type: CMSurgeryCutLarvaRootsStep
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: CMSurgeryOperatingTableCondition
  - type: RMCSurgeryComplicationEffects
    successSplashEnabled: true
    failureSplashEnabled: true
    splashAffectsBody: true
    splashDamage:
      types:
        Heat: 12
    splashSound:
      collection: XenoAcidSizzle
    splashDecalSpawner: RMCDecalSpawnerAcidBloodSplash
    failureDirectDamage:
      types:
        Heat: 15

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepRemoveLarva
  name: Remove larva
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - Hemostat
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/hemostat1.ogg
    bodyRemove:
    - type: VictimInfected
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: CMSurgeryOperatingTableCondition
  - type: RMCSurgeryStepLarvaEffect
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Heat: 15

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepCloseBones
  name: Close bones
  components:
  - type: CMSurgeryStep
    tool:
    - Retractor
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor2.ogg
    remove:
    - type: CMRibcageOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Blunt: 15

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepMendRibcage
  name: Mend ribcage
  components:
  - type: CMSurgeryStep
    tool:
    - BoneGel
    remove:
    - type: CMRibcageSawed
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Blunt: 10

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepCloseIncision
  name: Close incision
  components:
  - type: CMSurgeryStep
    tool:
    - Cautery
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/cautery1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/cautery2.ogg
    remove:
    - type: CMSkinRetracted
    - type: CMBleedersClamped
    - type: CMIncisionOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/cautery.rsi
    state: cautery
  - type: CMSurgeryStepEmoteEffect
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Heat: 3

## Damage from xeno surgeries is suppose to be depenedt on wearing a biosuit, and inflicted on the doctor, but im unsure how to handle this at this time.
- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryCutExoskeleton
  name: Cut exoskeleton carapace
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - BoneSaw
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/saw.ogg
    add:
    - type: RMCXenoOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
    state: saw

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryOpenExoskeleton
  name: Pry exoskeleton open
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - Retractor
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor2.ogg
    add:
    - type: RMCXenoPryed
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgerySevereXenoConnections
  name: Sever organ connections
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - Scalpel
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel2.ogg
    add:
    - type: RMCXenoCut
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryRemoveXenoOrgan
  name: Remove xenonid organ
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - Hemostat
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/hemostat1.ogg
    add:
    - type: RMCXenoRemoved
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: RMCSurgeryStepXenoHeartEffect

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryStepOpenIncisionWithIMS
  name: Open incision with an Incision Management System
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - ScalpelManager
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel2.ogg
    add:
    - type: CMIncisionOpen
    - type: CMBleedersClamped
    - type: CMSkinRetracted
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel_manager
  - type: CMSurgeryStepEmoteEffect
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Blunt: 15
        Heat: 15

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryStepOpenIncisionWithLaserScalpel
  name: Open incision with a Laser Scalpel
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - LaserScalpel
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/cautery1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/cautery2.ogg
    add:
    - type: CMIncisionOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel_laser
  - type: RMCSurgeryLaserScalpelClampChanceEffect
  - type: CMSurgeryStepEmoteEffect
  - type: RMCSurgeryComplicationEffects
    failureDirectDamage:
      types:
        Blunt: 7.5
        Heat: 12.5

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryStepCutLarvaRootsWithPict
