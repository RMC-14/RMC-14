      - id: CMBeltMedicalFilled
      - id: CMSatchelMarine
      - id: CMScrubsGreen
      - id: RMCPouchMedical
      - id: RMCPouchMedical
      - id: RMCPouchSyringe
      - id: RMCPouchMedkit
      - id: RMCPouchMedkit
      - id: RMCPouchChem
      - id: RMCPouchChem
      - id: RMCPouchVialFill
      - id: RMCPouchVialFill
      - id: RMCPouchReagentCanister
      - id: RMCPouchReagentCanister
