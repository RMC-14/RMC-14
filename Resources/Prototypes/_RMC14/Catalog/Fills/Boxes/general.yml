- type: entity
  name: box
  parent: BoxBase
  id: RMCBoxCardboard
  description: It's just an ordinary box.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/boxes.rsi
    state: box
  - type: Item
    sprite: _RMC14/Objects/Storage/boxes.rsi
    size: Large
    shape: null
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,13,1 # 14 slots
  - type: Tag
    tags:
    - RMCBoxStorage
  - type: PhysicalComposition
    materialComposition:
      RMCSheetCardboard: 3750
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: Tag
  id: RMCBoxStorage

- type: entity
  parent: RMCBoxCardboard
  id: RMCBoxAttachmentsFilled
  name: attachment package
  description: A package containing some random attachments. Why not see what's inside?
  components:
  - type: Sprite
    state: circuit
  - type: Item
    size: Small
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots
  - type: StorageFill
    contents:
    # Common
    - id: RMCAttachmentSuppressor
      orGroup: Common
    - id: RMCM5Bayonet
      orGroup: Common
    - id: RMCAttachmentRailFlashlight
      orGroup: Common
    # Set 1
    - id: RMCAttachmentS5RedDotSight
      orGroup: SetOne
    - id: RMCAttachmentBurstFireAssembly
      orGroup: SetOne
    - id: RMCAttachmentLaserSight
      orGroup: SetOne
    - id: RMCAttachmentExtendedBarrel
      orGroup: SetOne
    - id: RMCAttachmentVerticalGrip
      orGroup: SetOne
    - id: RMCAttachmentAngledGrip
      orGroup: SetOne
    - id: RMCAttachmentGyroscopicStabilizer
      orGroup: SetOne
    - id: RMCAttachmentBipod
      orGroup: SetOne
    # Set 2
    - id: RMCAttachmentM63Stock
      orGroup: SetTwo
    - id: RMCAttachmentM42A1WoodenStock
      orGroup: SetTwo
    - id: RMCAttachmentM54CStockSolid
      orGroup: SetTwo
    - id: RMCAttachmentMagneticHarness
      orGroup: SetTwo
    - id: RMCAttachmentBarrelCharger
      orGroup: SetTwo
    - id: RMCAttachmentS84xTelescopicScope
      orGroup: SetTwo
    - id: RMCAttachmentS42xTelescopicMiniscope
      orGroup: SetTwo

- type: entity
  parent: RMCBoxCardboard
  id: RMCBoxPrescriptionGlasses
  name: box of prescription glasses
  description: This box contains nerd glasses.
  components:
  - type: Storage
    whitelist:
      tags:
      - RMCPrescriptionGlasses
  - type: StorageFill
    contents:
    - id: RMCGlassesMarineRpg
      amount: 7
  - type: Sprite
    state: glasses

- type: entity
  parent: RMCBoxCardboard
  id: RMCBoxCompanyCaps
  name: box of Company baseball caps
  description: This box contains seven Weston-Yamada brand baseball caps. Give them away at your leisure.
  components:
  - type: Storage
    whitelist:
      tags:
      - ClothMade
  - type: StorageFill
    contents:
    - id: RMCHeadCapWestonYamadaDark
      amount: 6

- type: entity
  parent: RMCBoxCardboard
  id: RMCBoxDrinkingGlasses
  name: box of drinking glasses
  description: It has a picture of drinking glasses on it.
  components:
  - type: Storage
    whitelist:
      tags:
      - DrinkGlass
  - type: StorageFill
    contents:
    - id: RMCDrinkGlass
      amount: 6

- type: entity
  parent: RMCBoxCardboard
  id: RMCBoxPaperCups
  name: box of paper cups
  description: It has pictures of paper cups on it.
  components:
  - type: Storage
    whitelist:
      tags:
      - DrinkGlass
  - type: StorageFill
    contents:
    - id: RMCPaperCup
      amount: 7

- type: entity
  parent: RMCBoxCardboard
  id: RMCBoxMousetraps
  name: Pest-B-Gon mousetraps
  description: "WARNING: Keep out of reach of children."
  components:
  - type: Storage
    whitelist:
      components:
      - Mousetrap
  - type: StorageFill
    contents:
    - id: Mousetrap
      amount: 6

- type: entity
  parent: RMCBoxCardboard
  id: RMCBoxInflatableWallsSmall
  name: inflatable barrier box
  description: Contains inflatable walls and doors.
  suffix: Small
  components:
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,1 # 2 slots
    whitelist:
      tags:
      - RMCInflatableBarrier
  - type: FixedItemSizeStorage
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCInflatableBarrier
  - type: StorageFill
    contents:
    - id: RMCInflatableDoorFolded1
      amount: 3
    - id: RMCInflatableWallFolded1
      amount: 4
  - type: Sprite
    state: inf_box
  - type: Item
    size: Normal

- type: entity
  parent: RMCBoxInflatableWallsSmall
  id: RMCBoxInflatableWallsNormal
  suffix: Normal
  components:
  - type: Item
    size: Large
