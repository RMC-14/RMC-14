- type: entity
  id: RMCCrateFoodDonuts
  parent: RMCCratePlastic
  name: donuts crate
  components:
  - type: StorageFill
    contents:
      - id: RMCBoxDonut
        amount: 5

- type: entity
  id: RMCCrateFoodMRE
  parent: RMCCratePlastic
  name: UNMC MRE crate
  components:
  - type: StorageFill
    contents:
      - id: CMMRE
        amount: 2

- type: entity
  id: RMCCrateFoodPizza
  parent: RMCCratePlastic
  name: pizza ready-to-eat crate
  components:
  - type: StorageFill
    contents:
      - id: CMMarinePreparedMealPizza
        amount: 3

- type: entity
  id: RMCCrateFoodIngredients
  parent: RMCCrateFreezer
  name: surplus boxes of ingredients (x6 boxes)
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: RMCRandomIngredientsTable
        rolls: !type:ConstantNumberSelector
          value: 6

- type: entityTable
  id: RMCRandomIngredientsTable
  table: !type:GroupSelector
    children:
    - id: FoodContainerEgg
    - id: RMCBoxFish
    - id: RMCBoxMeat
    - id: RMCBoxMilk
    - id: RMCBoxSoyMilk
    - id: RMCBoxEnzyme
    - id: RMCBoxFlour
    - id: RMCBoxSugar
    - id: RMCBoxApple
    - id: RMCBoxBanana
    - id: RMCBoxChanterelle
    - id: RMCBoxCherries
    - id: RMCBoxChili
    - id: RMCBoxCabbage
    - id: RMCBoxCarrot
    - id: RMCBoxCorn
    - id: RMCBoxEggplant
    - id: RMCBoxLemon
    - id: RMCBoxLime
    - id: RMCBoxOrange
    - id: RMCBoxPotato
    - id: RMCBoxTomato
    - id: RMCBoxWhiteBeet
    - id: RMCCondimentHotsauceCholula
    - id: RMCCondimentHotsauceFranks
    - id: RMCCondimentHotsauceSriracha
    - id: RMCCondimentHotsauceTabasco
    - id: RMCDrinkAlcoholWhiskey
    - id: RMCDrinkAlcoholTequila
    - id: RMCDrinkAlcoholRum
    - id: RMCDrinkAlcoholPurpleWine
