    group: CMJobsMedical
    time: 10800 # 3 hours
  ranks:
    RMCRankTSELanceCorporal: [ ]
  startingGear: RMCGearRoyalMedicPVE
  icon: "RMCJobIconRoyalMedicPVE"
  joinNotifyCrew: false
  supervisors: cm-job-supervisors-royal-tl
  accessGroups:
  - HospitalCorpsman
  spawnMenuRoleName: RCM Medical Technician (PVE)
  special:
