        RMCSkillJtac: 1
        RMCSkillMedical: 2
        RMCSkillMeleeWeapons: 1
        RMCSkillPilot: 1
        RMCSkillSurgery: 2
    - type: JobPrefix
      prefix: rmc-job-prefix-rcm-pve-medical-technician
    - type: AssignSquad
      squad: SquadRoyalMarinesPVE
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: rmc_medic_pve
      background:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: background_twe
    - type: CMVendorUser
      extraPoints:
