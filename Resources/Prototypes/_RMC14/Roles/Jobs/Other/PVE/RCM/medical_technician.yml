  - type: SpawnPoint
    job_id: CMRoyalMarinesMedicPVE
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/ballistic.rsi
    state: icon

- type: playTimeTracker
  id: RMCJobRoyalMedicPVE

- type: jobIcon
  parent: CMJobIconBase
  id: RMCJobIconRoyalMedicPVE
  icon:
    sprite: _RMC14/Interface/job_icons/TSE/RCM/pve.rsi
    state: rcm_medic_pve
