  playTimeTracker: RMCJobCBRNFireteamLeader
  ranks:
    RMCRankSergeant: []
  startingGear: RMCGearCBRNFireteamLeader
  icon: "CMJobIconFireteamLeader"
  joinNotifyCrew: false
  marineAuthorityLevel: 1
  supervisors: cm-job-supervisors-sl
  accessGroups:
  - ShipMasterAccess
  spawnMenuRoleName: CBRN Fireteam Leader
  overwatchRoleName: Fire Team Leaders
  roleWeight: 1
  displayWeight: 5
  special:
