# Freelancer Medic
- type: job
  parent: CMJobBase
  id: CMFreelancerMedic
  name: rmc-job-name-freelancer-medic
  description: rmc-ghost-role-information-freelancer-friendly-description
  playTimeTracker: RMCJobFreelancerMedic
  ranks:
    RMCRankFLMedic: []
  startingGear: RMCGearFreelancerMedic
  icon: RMCJobIconFreelancerMedic
  joinNotifyCrew: false
  accessGroups:
  - Colony
  - RMCWeYa
  spawnMenuRoleName: Freelancer (Medic)
  special:
  - !type:AddComponentSpecial
    components:
    - type: EquipSurvivorPreset
      preset: RMCPresetFreelancerMedic
    - type: NpcFactionMember
      factions:
      - WeYa
    - type: Skills
      preset: RMCSkillPresetFreelancerMedic
    - type: SquadArmorWearer
    - type: JobPrefix
      prefix: rmc-job-prefix-freelancer-medic
  hidden: true

- type: entity
  id: RMCRandomHumanoidFreelancerMedicHostile
  name: freelancer ghost role medic
  suffix: Spawner, Player, Hostile
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Hats/beret_freelancer.rsi
    state: icon
  - type: RandomHumanoidSpawner
    settings: RMCFreelancerMedic

- type: entity
  id: RMCRandomHumanoidFreelancerMedicFriendly
  name: freelancer ghost role medic
  suffix: Spawner, Player, Friendly
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Hats/beret_freelancer.rsi
    state: icon
  - type: RandomHumanoidSpawner
    settings: RMCFreelancerMedicFriendly

- type: randomHumanoidSettings
  parent: RMCEventHumanoid
  id: RMCFreelancerMedic
  components:
  - type: GhostRole
    name: rmc-ghost-name-freelancer-hostile-medic
    description: rmc-ghost-role-information-freelancer-hostile-description
    rules: rmc-ghost-role-information-freelancer-rules
    reregister: false
    job: CMFreelancerMedic
    raffle:
      settings: short
    requirements:
    - !type:RoleTimeRequirement
      role: CMJobHospitalCorpsman
      time: 18000 # 5 Hours
  - type: GhostRoleApplySpecial
    squad: SquadFreelancer

- type: randomHumanoidSettings
  parent: EventHumanoid
  id: RMCFreelancerMedicFriendly
  components:
  - type: GhostRole
    name: rmc-ghost-name-freelancer-friendly-medic
    description: rmc-ghost-role-information-freelancer-friendly-description
    rules: rmc-ghost-role-information-freelancer-rules
    reregister: false
    job: CMFreelancerMedic
    raffle:
      settings: short
    requirements:
    - !type:RoleTimeRequirement
      role: CMJobHospitalCorpsman
      time: 18000 # 5 Hours
  - type: GhostRoleApplySpecial
    squad: SquadFreelancer

- type: startingGear
  id: RMCGearFreelancerMedic
  equipment:
    eyes: RMCGlassesMedicalHUDGlasses
    gloves: RMCHandsVeteran
    jumpsuit: RMCJumpsuitFreelancerMedic
    outerClothing: CMArmorFreelancer
    shoes: RMCBootsSPPFilled
    id: RMCIDCardFreelancer
    ears: RMCHeadsetDistressDukes
    pocket2: RMCPouchMedkitFillAdvanced

- type: playTimeTracker
  id: RMCJobFreelancerMedic

- type: jobIcon
  parent: CMJobIconBase
  id: RMCJobIconFreelancerMedic
  icon:
    sprite: _RMC14/Interface/cm_job_icons.rsi
    state: free_med

- type: entity
  id: RMCPresetFreelancerMedic
  name: freelancer medic preset
  categories: [ HideSpawnMenu ]
  components:
  - type: SurvivorPreset
    randomOutfits:
    - [ RMCSatchelLightpackFreelancerMedicShotgunner, CMBeltMedicalFilledFreelancer, RMCPouchShotgunLargeBuckshotAlt, RMCWeaponShotgunHG3712 ] # TODO RMC14: randomize shotgun shell types
    - [ RMCSatchelLightpackFreelancerMedicShotgunner, CMBeltMedicalFilledFreelancer, RMCPouchShotgunLargeBuckshotAlt, WeaponShotgunCustomBuilt ]
    - [ RMCSatchelLightpackFreelancerMedicShotgunner, CMBeltMedicalFilledFreelancer, RMCPouchShotgunLargeBuckshotAlt, WeaponShotgunM357 ]
    - [ RMCSatchelLightpackFreelancerMedicShotgunner, CMBeltMedicalFilledFreelancer, RMCPouchShotgunLargeBuckshotAlt, WeaponShotgunM890 ]
    - [ RMCSatchelLightpackFreelancerMedic, RMCBeltMedicBagSPPFilled, RMCPouchMagazineLargeMAR40, WeaponRifleMAR40 ]
    - [ RMCSatchelLightpackFreelancerMedic, RMCBeltMedicBagSPPFilled, RMCPouchMagazineLargeMAR40, RMCWeaponRifleMAR30 ]
    - [ RMCSatchelLightpackFreelancerMedic, RMCBeltMedicBagSPPFilled, RMCPouchMagazineLargeMAR50, RMCWeaponMar50LMG ]
    - [ RMCSatchelLightpackFreelancerMedic, RMCBeltMedicBagSPPFilled, RMCPouchMagazineLargeM54CMK1, RMCWeaponRifleM54CMK1 ]
    - [ RMCSatchelLightpackFreelancerMedic, RMCBeltMedicBagSPPFilled, RMCPouchMagazineLargeFP9000, RMCWeaponSMGFP9000 ]
    - [ RMCSatchelLightpackFreelancerMedic, RMCBeltMedicBagSPPFilled, RMCPouchMagazineLargeM16, WeaponRifleM16 ]
