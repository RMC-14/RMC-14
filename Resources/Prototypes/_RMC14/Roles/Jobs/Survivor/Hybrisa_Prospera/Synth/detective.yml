- type: job
  parent: RMCSyntheticColony
  id: RMCSyntheticColonyHybrisaDetective
  startingGear: RMCGearSyntheticColonistHybrisaDetective
  spawnMenuRoleName: Detective Synth (Hybrisa Survivor)
  special:
  - !type:AddComponentSpecial
    components:
    - type: Language
      preset: RMCLanguagePresetSynthColonist
    - type: LanguageLearning
      preset: RMCLanguageLearningPresetSynthColonist
    - type: RMCAllowSuitStorage
    - type: DemoSpecWhitelist
    - type: GrenadeSpecWhitelist
    - type: ScoutWhitelist
    - type: SniperWhitelist
    - type: PyroWhitelist
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: NpcFactionMember
      factions:
      - Civilian
    - type: IntelRescueSurvivorObjective
    - type: RMCSurvivor
    - type: MotionDetectorTracked
    - type: MeleeWeapon
      soundHit:
        path: /Audio/_RMC14/Weapons/synthpunch1.ogg
        params:
          variation: 0.15
          volume: -1
      angle: 30
      animation: WeaponArcFist
      attackRate: 1
      damage:
        types:
          Blunt: 35
    - type: EquipSurvivorPreset
      preset: RMCSurvivorPresetHybrisaSynthDetective
    - type: Synth
  useLoadoutOfJob: RMCSyntheticColony # for inheritance

- type: startingGear
  parent: RMCGearSyntheticColonistHybrisaCivilian
  id: RMCGearSyntheticColonistHybrisaDetective
  equipment: # Todo Telebaton, camera
    back: CMSatchelSecurity
    shoes: CMBootsBlackFilled
    gloves: RMCHandsBlack
    belt: RMCBeltSecurityWeYaFilled
  storage:
    back:
    - RMCUniversalRecorder

- type: entity
  id: RMCSurvivorPresetHybrisaSynthDetective
  name: survivor synth hybrisa detective colonist preset
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityPreset
    randomOutfits:
    - [ RMCGlassesSecurityBlue, RMCCoatBureauTrenchCoatBrown, RMCHeadCapFedoraBrown, ClothingUniformJumpsuitDetective ]
    - [ CMGlassesSecurity, RMCCoatBureauTrenchCoatGrey, RMCHeadCapFedoraGrey, ClothingUniformJumpsuitDetectiveGrey ]
