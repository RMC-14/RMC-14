- type: job
  parent: RMCSyntheticColony
  id: RMCSyntheticColonyHybrisaEngineer
  startingGear: RMCGearSyntheticColonistHybrisaEngineer
  spawnMenuRoleName: Engineer Synth (Hybrisa Survivor)
  special:
  - !type:AddComponentSpecial
    components:
    - type: Language
      preset: RMCLanguagePresetSynthColonist
    - type: LanguageLearning
      preset: RMCLanguageLearningPresetSynthColonist
    - type: RMCAllowSuitStorage
    - type: DemoSpecWhitelist
    - type: GrenadeSpecWhitelist
    - type: ScoutWhitelist
    - type: SniperWhitelist
    - type: PyroWhitelist
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: NpcFactionMember
      factions:
      - Civilian
    - type: IntelRescueSurvivorObjective
    - type: RMCSurvivor
    - type: MotionDetectorTracked
    - type: MeleeWeapon
      soundHit:
        path: /Audio/_RMC14/Weapons/synthpunch1.ogg
        params:
          variation: 0.15
          volume: -1
      angle: 30
      animation: WeaponArcFist
      attackRate: 1
      damage:
        types:
          Blunt: 35
    - type: EquipSurvivorPreset
      preset: RMCSurvivorPresetHybrisaSynthEngineer
    - type: Synth
  useLoadoutOfJob: RMCSyntheticColony # for inheritance

- type: startingGear
  parent: RMCGearSyntheticColonistHybrisaCivilian
  id: RMCGearSyntheticColonistHybrisaEngineer
  equipment:
    back: RMCSatchelLightpack
    shoes: CMBootsBlackFilled
  storage:
    back:
    - WeaponNailgun
    - CMSheetMetal20
    - CMSheetPlasteel10

- type: entity
  id: RMCSurvivorPresetHybrisaSynthEngineer
  name: survivor synth hybrisa engineer colonist preset
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityPreset
    randomOutfits:
    - [ RMCHardhatOrange, RMCJumpsuitCivilianEngineerWorker, RMCHazardVest ]
    - [ RMCOuterEngineeringUtilityOversuit, RMCJumpsuitCivilianEngineerWorker, CMSheetPlasteel10 ]
    - [ RMCJumpsuitCivilianEngineerWorkerAlt, RMCHardhatBlue, RMCHazardVestGreen ]
    - [ RMCJumpsuitCivilianEngineerWorkerAlt, RMCHardhatBlue, RMCHazardVestBlue ]
    - [ RMCJumpsuitCivilianEngineerWorkerAlt, RMCOuterEngineeringUtilityOversuitAlt, CMSheetPlasteel10 ]
