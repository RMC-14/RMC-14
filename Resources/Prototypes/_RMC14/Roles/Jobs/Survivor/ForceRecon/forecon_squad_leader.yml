- type: job
  parent: RMCSurvivorForeconBase
  id: RMCSurvivorForeconSquadLeader
  name: cm-job-name-squad-leader
  ranks:
    RMCRankSecondLT: []
  icon: "CMJobIconSquadLeader"
  roleWeight: 1
  requirements:
  - !type:RoleTimeRequirement
    role: CMJobSquadLeader
    time: 18000  # 5 hours
  - !type:TotalJobsTimeRequirement
    group: RMCJobsSurvivor
    time: 3600 # 1 hour
  spawnMenuRoleName: FORECON Squad Leader (Survivor)
  startingGear: RMCGearForeconSL
  special:
  - !type:AddComponentSpecial
    components:
    - type: RMCAllowSuitStorage
    - type: Skills
      preset: RMCSkillPresetReconSquadLeader
    - type: MarineOrders
    - type: SquadLeader
    - type: RMCPointing
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: leader
    - type: IntelRescueSurvivorObjective
    - type: AssignSquad
      whitelist:
        tags:
        - RMCSquadFORECON
    - type: JobPrefix
      prefix: cm-job-prefix-squad-leader
    - type: EquipSurvivorPreset
      preset: RMCSurvivorPresetForeconSquadLead
    - type: SpotterWhitelist
    - type: RMCTrackable
    - type: RMCAwardRecommendation
  hidden: true

- type: startingGear
  parent: RMCGearForeconBase
  id: RMCGearForeconSL
  equipment:
    ears: RMCHeadsetForeconSL

- type: entity
  parent: CMSpawnPointJobBase
  id: CMSpawnPointForeconSquadLeader
  name: forecon squad leader spawn point
  components:
  - type: SpawnPoint
    job_id: RMCSurvivorForeconSquadLeader
  - type: Sprite
    state: leader_spawn

- type: entity
  parent: RMCSurvivorPresetForecon
  id: RMCSurvivorPresetForeconSquadLead
  name: forecon squad leader survivor preset
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityPreset
    primaryWeapons:
    - [ WeaponShotgunM42A2, RMCBoxShotgunSlugs ]
