- type: job
  parent: RMCSurvivorSunRidersBase
  id: RMCSurvivorSunRidersPlatCo
  name: rmc-job-name-sr-platco
  icon: "RMCJobIconPVEPlatoonCommander"
  spawnMenuRoleName: Sun Riders Platoon Commander (Survivor)
  ranks:
    RMCRankSecondLT: []
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      preset: RMCSkillPresetSunRidersRifleman
    - type: MarineOrders
    - type: RMCPointing
    - type: InnateCommandSpeech
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: co_wo
    - type: IntelRescueSurvivorObjective
    - type: AssignSquad
      whitelist:
        tags:
        - RMCSquadSunRidersPVP
    - type: EquipSurvivorPreset
      preset: RMCSurvivorPresetSunRidersPlatCo
    - type: RMCTrackable
    - type: RMCAwardRecommendation
  startingGear: RMCGearSunRidersPlatCo
  hidden: true

- type: startingGear
  id: RMCGearSunRidersPlatCo
  equipment:
    jumpsuit: CMJumpsuitBOWebbingPouchSurvivorSunRiders
    back: RMCSatchelMarineForeconSurvivorFill
    shoes: CMBootsBlackFilled
    belt: RMCM1984BeltFilledSurvivorSunRiders # todo m1984 CO variant
    outerClothing: RMCJacketWindbreakerBrownFilledSurvivor
    id: CMIDCardStandardDogtag
    ears: RMCHeadsetSunRidersPVP
    gloves: CMHandsBrown
    pocket1: RMCRangefinder
    pocket2: RMCPouchFirstAidSplintsGauzeOintment
    suitstorage: RMCFlashlight

- type: entity
  id: RMCSurvivorPresetSunRidersPlatCo
  name: sun riders platoon commander survivor preset
  categories: [ HideSpawnMenu ]
  components:
  - type: SurvivorPreset
    randomOutfits:
    - [ CMHeadCapOfficerGasmask, RMCMaskTornScarfDesert ]
    - [ CMHeadCapOfficerGasmask, RMCMaskScarfTan ]
    randomWeapon:
    - [ RMCM1984BeltFilledSurvivorSunRiders ]
    - [ RMCM1984BeltFilledSurvivorSunRiders ]
    - [ RMCM1984BeltFilledSurvivorSunRiders ]
    - [ RMCMotionDetector ]
    tryEquipRandomWeapon: true

- type: entity
  parent: CMSpawnPointJobBase
  id: CMSpawnPointSunRidersPlatCo
  name: sun riders platoon commander spawn point
  components:
  - type: SpawnPoint
    job_id: RMCSurvivorSunRidersPlatCo
  - type: Sprite
    state: marine_spawn
