- type: randomHumanoidSettings
  parent: RMCEventHumanoid
  id: RMCRandomHumanoidBase
  components:
  - type: GhostRolePreventCryoSleep
  - type: GhostRoleApplySpecial

- type: entity
  parent: MarkerBase
  id: RMCNewGhostBase
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: red
  - type: RMCGhostRole
    addComponents:
    - type: RandomizeName
    remaining: 1

# alpha
- type: randomHumanoidSettings
  parent: RMCRandomHumanoidBase
  id: RMCAlphaBase
  components:
  - type: GhostRoleApplySpecial
    squad: SquadAlpha

- type: entity
  parent: RMCNewGhostBase
  id: RMCNewAlphaBase
  abstract: true
  components:
  - type: RMCGhostRole
    addComponents:
    - type: AssignSquad
      squad: SquadAlpha

