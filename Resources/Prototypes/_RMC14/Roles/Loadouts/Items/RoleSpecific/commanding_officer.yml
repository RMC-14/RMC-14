# Commanding Officer
- type: loadout
  id: ColBeretRMC
  cost: 0 # Shouldn't cost anything as it is a rank reward.
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: CMJobCommandingOfficer
      time: 630000 # 175 hrs
  storage:
    back:
    - CMHeadBeretCOCol

