- type: reaction
  id: RMCCreateWater
  reactants:
    RMCHydrogen:
      amount: 2
    RMCOxygen:
      amount: 1
  products:
    Water: 1

- type: reaction
  id: RMCEthanoloxidation
  reactants:
    CMEthylredoxrazine:
      amount: 1
    RMCEthanol:
      amount: 1
  products:
    Water: 2

- type: reaction
  id: RMCEthanoloxidationV2 # Upstream Ethanol
  reactants:
    CMEthylredoxrazine:
      amount: 1
    Ethanol:
      amount: 1
  products:
    Water: 2

- type: reaction
  id: RMCVirusFood
  reactants:
    Water:
      amount: 1
    Milk:
      amount: 1
    RMCOxygen:
      amount: 1
  products:
    RMCVirusFood: 3

- type: reaction
  id: CreateMeatProteinPropagation
  impact: Low
  quantized: true
  conserveEnergy: false
  reactants:
    RMCProteinPropagator:
      amount: 3
    UncookedAnimalProteins:
      amount: 3
  effects:
  - !type:CreateEntityReactionEffect
    entity: FoodMeat

- type: reaction
  id: RMCTriplePMix
  reactants:
    Water:
      amount: 1
    RMCCarbon:
      amount: 1
    Nutriment:
      amount: 1
  products:
    RMCProteinPropagator: 3
