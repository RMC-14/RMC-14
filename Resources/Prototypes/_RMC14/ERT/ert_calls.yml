- type: rmcERTCall
  id: RMCERTCallCBRN
  name: UNMC CBRN Response Team
  organization: UNMC
  npcFactions: [ UNMC ]
  iffFaction: FactionMarine
  category: Military
  enabled: true
  adminSelectable: true
  randomWeight: 35
  allowedSources: [ Console, Admin ]
  shuttleMap: /Maps/_RMC14/Shuttles/ert_response_shuttle.yml
  shuttleSpawner: RMCSpawnerERTShuttle
  autoLaunch: true
  landingTags: [ mainship ]
  roles:
  - id: leader
    name: CBRN Squad Leader
    job: RMCCBRNSquadLeader
    ghostRoleEntity: RMCRandomHumanoidCBRNSquadLeader
    min: 1
    max: 1
    leader: true
    roleTags: [ leader, command ]
    seatTags: [ command ]
    priority: 100
  - id: rifleman
    name: CBRN Rifleman
    job: RMCCBRNRifleman
    ghostRoleEntity: RMCRandomHumanoidCBRNRifleman
    min: 2
    max: 4
    roleTags: [ rifleman ]
    seatTags: [ troop ]
  - id: medic
    name: CBRN Hospital Corpsman
    job: RMCCBRNMedic
    ghostRoleEntity: RMCRandomHumanoidCBRNMedic
    min: 1
    max: 1
    roleTags: [ medic ]
    seatTags: [ medic, troop ]
    priority: 50
  - id: engineer
    name: CBRN Combat Technician
    job: RMCCBRNCombatTech
    ghostRoleEntity: RMCRandomHumanoidCBRNCombatTech
    min: 1
    max: 1
    roleTags: [ engineer ]
    seatTags: [ engineer, troop ]
    priority: 40
  announcements:
    requestSound: /Audio/_RMC14/AI/distressbeacon.ogg
    dispatch: "High Command has approved a distress response. {team} is being mustered."
    dispatchSound: /Audio/_RMC14/AI/distressreceived.ogg
    recruiting: "{team} is accepting volunteers for immediate deployment."
    recruitingSound: /Audio/_RMC14/AI/commandreport.ogg
    launch: "{team} has launched."
    launchSound: /Audio/_RMC14/Dropship/dropship_emergency.ogg
    arrival: "{team} has docked aboard the warship and is awaiting tasking."
    arrivalSound: /Audio/_RMC14/AI/commandreport.ogg
    failed: "High Command reports that {team} deployment failed: {reason}"
    denied: "High Command has denied the distress request."
  requirements:
    cooldown: 10m
    recruitmentDuration: 30s
    maxCallsPerRound: 1
    minRequiredSlots: 1

