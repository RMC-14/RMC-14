# RMC ERT call prototypes.
# Shuttle placement notes:
# - To stage a shuttle on a mapped pad, set shuttleMap plus shuttleSpawnMarker
#   or shuttleSpawner, and place that marker/spawner on the map.
# - To stage a shuttle immediately on the hidden fallback ERT space map, set
#   shuttleMap directly and leave shuttleSpawner/shuttleSpawnMarker unset.
# - If shuttleMap is also omitted, no shuttle is loaded; roster spawn positions
#   fall back to the request source coordinates instead.

- type: rmcERTCall
  id: RMCERTCallCBRN
  name: rmc-ert-call-cbrn-name
  organization: rmc-ert-organization-unmc
  npcFactions: [ UNMC ]
  iffFaction: FactionMarine
  category: rmc-ert-category-military
  enabled: true
  adminSelectable: true
  adminButtonLabel: rmc-ert-admin-button-cbrn
  randomWeight: 35
  allowedSources: [ Console, Admin ]
  shuttleMap: /Maps/_RMC14/Shuttles/ert_response_shuttle.yml
  shuttleSpawner: RMCSpawnerERTShuttle
  shuttleSpawnMarker: RMCERTShuttleStartPadUNMC
  autoLaunch: true
  shuttleTravelTime: 40s
  landingTags: [ mainship ]
  roles:
  - id: leader
    name: rmc-ert-role-cbrn-leader
    job: RMCCBRNSquadLeader
    ghostRoleEntity: RMCRandomHumanoidCBRNSquadLeader
    min: 1
    max: 1
    leader: true
    roleTags: [ leader, command ]
    seatTags: [ command ]
    priority: 100
  - id: rifleman
    name: rmc-ert-role-cbrn-rifleman
    job: RMCCBRNRifleman
    ghostRoleEntity: RMCRandomHumanoidCBRNRifleman
    min: 2
    max: 4
    roleTags: [ rifleman ]
    seatTags: [ troop ]
  - id: medic
    name: rmc-ert-role-cbrn-medic
    job: RMCCBRNMedic
    ghostRoleEntity: RMCRandomHumanoidCBRNMedic
    min: 1
    max: 1
    roleTags: [ medic ]
    seatTags: [ medic, troop ]
    priority: 50
  - id: engineer
    name: rmc-ert-role-cbrn-engineer
    job: RMCCBRNCombatTech
    ghostRoleEntity: RMCRandomHumanoidCBRNCombatTech
    min: 1
    max: 1
    roleTags: [ engineer ]
    seatTags: [ engineer, troop ]
    priority: 40
  announcements:
    requestSound: /Audio/_RMC14/AI/distressbeacon.ogg
    dispatch: rmc-ert-announcement-cbrn-dispatch
    dispatchSound: /Audio/_RMC14/AI/distressreceived.ogg
    recruiting: rmc-ert-announcement-recruiting-immediate
    recruitingSound: /Audio/_RMC14/AI/commandreport.ogg
    launch: rmc-ert-announcement-launch
    launchSound: /Audio/_RMC14/Dropship/dropship_emergency.ogg
    arrival: rmc-ert-announcement-cbrn-arrival
    arrivalSound: /Audio/_RMC14/AI/commandreport.ogg
    failed: rmc-ert-announcement-cbrn-failed
    denied: rmc-ert-announcement-cbrn-denied
  requirements:
    cooldown: 10m
    recruitmentDuration: 30s
    maxCallsPerRound: 1
    minRequiredSlots: 3

