- type: rmcERTCall
  id: RMCERTCallCMB
  name: rmc-ert-call-cmb-name
  organization: rmc-ert-organization-cmb
  npcFactions: [ Bureau ]
  category: rmc-ert-category-law
  enabled: true
  adminSelectable: true
  adminButtonLabel: rmc-ert-admin-button-cmb
  randomWeight: 10
  allowedSources: [ Console, Handheld, Admin ]
  # TODO RMC14 replace with an exact /Maps/_RMC14/Shuttles/ERT/ert_cmb_shuttle.yml once ported.
  shuttleMap: /Maps/_RMC14/Shuttles/ERT/ert_cmb_shuttle.yml
  shuttleSpawner: RMCSpawnerERTShuttleCMB
  shuttleSpawnMarker: RMCERTShuttleStartPadLaw
  autoLaunch: true
  shuttleTravelTime: 40s
  landingTags: [ mainship ]
  roles:
  - id: marshal
    name: rmc-ert-role-cmb-marshal
    job: CMBureauMarshal
    ghostRoleEntityPool:
    - entity: RMCRandomHumanoidBureauMarshal
      weight: 100
    min: 1
    max: 1
    leader: true
    roleTags: [ leader, police ]
    seatTags: [ command ]
    priority: 100
  - id: deputy
    name: rmc-ert-role-cmb-deputy
    job: CMBureauDeputy
    ghostRoleEntityPool:
    - entity: RMCRandomHumanoidBureauDeputy
      weight: 100
    min: 2
    max: 4
    roleTags: [ police ]
    seatTags: [ troop ]
  - id: liaison
    name: rmc-ert-role-cmb-liaison
    job: CMICBLiaison
    ghostRoleEntityPool:
    - entity: RMCRandomHumanoidICBLiaison
      weight: 100
    min: 0
    max: 1
    required: false
    roleTags: [ support ]
    seatTags: [ troop ]
  - id: observer
    name: rmc-ert-role-cmb-observer
    job: CMBureauObserver
    ghostRoleEntityPool:
    - entity: RMCRandomHumanoidBureauObserver
      weight: 100
    min: 0
    max: 1
    required: false
    roleTags: [ support, medic ]
    seatTags: [ troop, medic ]
  announcements:
    request:
      title: rmc-ert-announcement-title-priority-alert
      message: rmc-ert-announcement-cmb-inspection-request
    arrival:
      title: rmc-ert-announcement-title-intercepted-transmission
      message: rmc-ert-announcement-cmb-inspection-arrival
  requirements:
    cooldown: 10m
    recruitmentDuration: 30s
    maxCallsPerRound: 1
    minRequiredSlots: 3
    maxSlots: 5

