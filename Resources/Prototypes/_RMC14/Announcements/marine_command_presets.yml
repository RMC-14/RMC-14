- type: announcementPreset
  id: MarineCommand
  name: "Marine Command"
  description: "Official announcements from Marine Command"
  target: Marines
  defaultVariant: MarineCommandDefault
  simplifiedVariant: MarineCommandSimplified
  style:
    animation:
      animation: Typewriter
      printSpeed: 0.025
      holdDuration: 10
      flickerChance: 0
      glitchChance: 0.01
      animationEnhancements:
        slideDuration: 1.0
        slideDirection: Top
        zoomStartScale: 0.1
        zoomDuration: 1.0
        bounceCount: 3
        bounceHeight: 15
        enableCRT: true
        crtSettings:
          enabled: true
          showScanlines: true
          scanlineSpacing: 6
          scanlineThickness: 10
          scanlineAlpha: 0.95
          scanlineSpeed: 60
          scanlineColor: "#1c99ff"
          showNoise: true
          noiseIntensity: 4
          noiseAlpha: 0.6
          showVignette: true
          vignetteIntensity: 3
          vignetteColor: "#000000"
          glowColor: "#4a9eff"
          showChromaticAberration: true
          chromaticAmount: 1
    layout:
      position: TopLeft
      speakerNamePosition: Below
      spritePosition: Left
      spriteSpacing: 0
      spriteDisplayMode: TopHalf
      uiScale: 3
      titlePosition: Above
    background:
      showBackground: false
      backgroundAlpha: 0.7
      backgroundColor: "#0a1a2d"
    text:
      primaryColor: "#a8d6ff"
      font: "Cozette"
      fontSize: 20
      lineHeight: 48
      showSpeakerName: true
      speakerNameColor: "#ffffff"
      speakerNameFontSize: 14
    sprite:
      showSpriteBox: true
      spriteBoxColor: "#0a1a2d"
      spriteBoxBorderColor: "#4a9eff"
      spriteBoxBorderThickness: 2
      spriteBoxPadding: 18
      spriteGlow: true
      spriteGlowColor: "#4a9eff"
      spriteGlowIntensity: 0.6
      spriteScale: 1
    title:
      showTitle: true
      title: ">> COMMAND <<"
      titleColor: "#4a9eff"
      titleFontSize: 40
      titleFont: "CozetteBold"
      titleUnderline: true
      titleUnderlineThickness: 2
    scaling:
      responsiveScaleFactor: 1.15
  sound:
    path: "/Audio/_RMC14/Announcements/Marine/notice2.ogg"
  soundVolume: 1.0
  priority: 8
  canInterrupt: true
  canBeInterrupted: false
  aliases: ["command", "cmd", "hc", "marine_command"]

