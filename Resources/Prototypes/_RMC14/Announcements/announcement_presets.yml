- type: announcementPreset
  id: MarineCommand
  name: "Marine Command"
  description: "Official announcements from Marine Command"
  target: Marines
  defaultVariant: MarineCommandDefault
  simplifiedVariant: MarineCommandSimplified
  style:
    animation: Typewriter
    position: TopLeft
    showBackground: false
    backgroundAlpha: 0.7
    backgroundColor: "#0a1a2d"
    primaryColor: "#a8d6ff"
    secondaryColor: "#c7d2e5"
    accentColor: "#6ba3ff"
    font: "Cozette"
    fontSize: 20
    lineHeight: 48
    printSpeed: 0.025
    responsiveScaleFactor: 3
    holdDuration: 10
    shakeIntensity: 0.8
    flickerChance: 0
    glitchChance: 0.01
    showSpriteBox: true
    spriteBoxColor: "#0a1a2d"
    spriteBoxBorderColor: "#4a9eff"
    spriteBoxBorderThickness: 2
    spriteBoxPadding: 18
    spriteGlow: true
    spriteGlowColor: "#4a9eff"
    spriteGlowIntensity: 0.6
    showSpeakerName: true
    speakerNameColor: "#ffffff"
    speakerNameFontSize: 14
    speakerNamePosition: Below
    spritePosition: Left
    spriteSpacing: 0
    spriteDisplayMode: TopHalf
    spriteScale: 1
    uiScale: 3
    showTitle: true
    title: ">> COMMAND <<"
    titleColor: "#4a9eff"
    titleFontSize: 40
    titleFont: "CozetteBold"
    titleUnderline: true
    titleUnderlineThickness: 2
    titlePosition: Above
    animationEnhancements:
      typewriterMode: Linear
      randomizeSpeed: false
      speedVariation: 0.2
      enableSlide: false
      slideDuration: 1.0
      slideDirection: Top
      enableZoom: false
      zoomStartScale: 0.1
      zoomDuration: 1.0
      enableBounce: false
      bounceCount: 3
      bounceHeight: 15
      easingIn: EaseInOut
      easingOut: EaseInOut
      enableCRT: true
      crtSettings:
        enabled: true
        showScanlines: true
        scanlineSpacing: 6
        scanlineThickness: 10
        scanlineAlpha: 0.95
        scanlineSpeed: 60
        scanlineColor: "#1c99ff"
        showNoise: true
        noiseIntensity: 4
        noiseAlpha: 0.6
        showVignette: true
        vignetteIntensity: 3
        vignetteColor: "#000000"
        showGlow: true
        glowIntensity: 1.4
        glowSpeed: 1
        glowColor: "#4a9eff"
        showCurvature: true
        curvatureAmount: 0.3
        showChromaticAberration: true
        chromaticAmount: 1
    textEnhancements:
      showOutline: true
      outlineColor: "#000000"
      outlineThickness: 2
    backgroundStyle:
      type: Gradient
      showGradient: true
      gradientStart: "#0a1a2d"
      gradientEnd: "#051122"
      direction: Vertical
    enableScreenShake: false
    shakeDuration: 1
    enableFlash: false
    flashColor: "#ffffff"
    flashDuration: 0.05
    flashCount: 1
  sound:
    path: "/Audio/_RMC14/Announcements/Marine/notice2.ogg"
  soundVolume: 1.0
  priority: 8
  canInterrupt: true
  canBeInterrupted: false
  aliases: ["command", "cmd", "hc", "marine_command"]
  incognitoMask: false

