- type: announcementPreset
  id: MarineCommand
  name: "Marine Command"
  description: "Official announcements from Marine Command"
  target: Marines
  style:
    animation: Typewriter
    position: TopLeft
    showBackground: true
    backgroundAlpha: 0.7
    backgroundColor: "#0a1a2d"
    primaryColor: "#4a9eff"
    secondaryColor: "#87ceeb"
    accentColor: "#ffffff"
    fontSize: 20
    lineHeight: 48
    printSpeed: 0.025
    holdDuration: 10
    shakeIntensity: 0.8
    flickerChance: 0
    glitchChance: 0.01
    showSpriteBox: true
    spriteBoxColor: "#0a1a2d"
    spriteBoxBorderColor: "#4a9eff"
    spriteBoxBorderThickness: 2
    spriteBoxPadding: 18
    spriteGlow: true
    spriteGlowColor: "#4a9eff"
    spriteGlowIntensity: 0.6
    showSpeakerName: true
    speakerNameColor: "#ffffff"
    speakerNameFontSize: 14
    speakerNamePosition: Below
    spritePosition: Left
    spriteSpacing: 0
    spriteDisplayMode: TopHalf
    spriteScale: 1
    uiScale: 3
    showTitle: true
    title: ">> HIGH COMMAND <<"
    titleColor: "#4a9eff"
    titleFontSize: 40
    titleFont: "DefaultBold"
    titlePosition: Above
    animationEnhancements:
      typewriterMode: Linear
      randomizeSpeed: false
      speedVariation: 0.2
      enableSlide: false
      slideDuration: 1.0
      slideDirection: Top
      enableZoom: false
      zoomStartScale: 0.1
      zoomDuration: 1.0
      enableBounce: false
      bounceCount: 3
      bounceHeight: 15
      easingIn: EaseInOut
      easingOut: EaseInOut
      enableCRT: true
      crtSettings:
        enabled: true
        showScanlines: true
        scanlineSpacing: 3
        scanlineThickness: 3
        scanlineAlpha: 0.7
        scanlineSpeed: 60
        scanlineColor: "#000000"
        showNoise: true
        noiseIntensity: 4
        noiseAlpha: 0.6
        showVignette: true
        vignetteIntensity: 3
        vignetteColor: "#000000"
        showGlow: true
        glowIntensity: 1.4
        glowSpeed: 1
        glowColor: "#4a9eff"
        showCurvature: true
        curvatureAmount: 0.3
        showChromaticAberration: true
        chromaticAmount: 1
    textEnhancements:
      showOutline: true
      outlineColor: "#000000"
      outlineThickness: 2
    backgroundStyle:
      type: Gradient
      showGradient: true
      gradientStart: "#0a1a2d"
      gradientEnd: "#051122"
      direction: Vertical
    enableScreenShake: false
    shakeDuration: 1
    enableFlash: false
    flashColor: "#ffffff"
    flashDuration: 0.05
    flashCount: 1
  sound:
    path: "/Audio/_RMC14/Announcements/Marine/notice2.ogg"
  soundVolume: 1.0
  priority: 8
  canInterrupt: true
  canBeInterrupted: false
  aliases: ["command", "cmd", "hc", "marine_command"]
  decalRsi: "/Textures/_RMC14/Structures/Wallmounts/banners.rsi"
  decalState: "unmcflag"
  decalPlacement: BehindSprite
  incognitoMask: false

