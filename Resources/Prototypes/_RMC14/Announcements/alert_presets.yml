- type: announcementPreset
  id: MarineAlertLevel
  name: "Evacuation Alert"
  description: "Alert level announcement styling"
  target: All
  visibleInSettings: false
  showSprite: false
  style:
    animation:
      animation: Typewriter
      printSpeed: 0.025
      holdDuration: 10
      flickerChance: 0
      glitchChance: 0
      animationEnhancements:
        enableCRT: false
    layout:
      position: TopLeft
      spritePosition: Left
      spriteDisplayMode: FullSprite
      uIScale: 3
      titlePosition: Above
    background:
      showBackground: false
      backgroundAlpha: 0.7
      backgroundColor: "#0a1a2d"
    text:
      primaryColor: "#a8d6ff"
      font: "Cozette"
      fontSize: 20
      lineHeight: 48
      showSpeakerName: false
    sprite:
      showSpriteBox: false
      spriteScale: 1
    title:
      showTitle: true
      title: "ALERT LEVEL"
      titleColor: "#4a9eff"
      titleFontSize: 40
      titleFont: "CozetteBold"
      titleUnderline: true
      titleUnderlineThickness: 2
    scaling:
      responsiveScaleFactor: 1.15
  priority: 8
  canInterrupt: true
  canBeInterrupted: true

- type: announcementPreset
  id: RedAlertAnimated
  name: "Red Alert"
  description: "Animated red alert display"
  target: All
  visibleInSettings: false
  showSprite: false
  style:
    animation:
      animation: Fade
      printSpeed: 0.015
      holdDuration: 8
      flickerChance: 0.02
      glitchChance: 0
      animationEnhancements:
        enableCRT: false
    layout:
      position: TopLeft
      spritePosition: Left
      spriteDisplayMode: FullSprite
      uIScale: 2
      titlePosition: Above
    background:
      showBackground: true
      backgroundAlpha: 0.6
      backgroundColor: "#1a0a0a"
    text:
      primaryColor: "#ff4d4d"
      fontSize: 24
      lineHeight: 46
      showSpeakerName: false
    sprite:
      showSpriteBox: false
      spriteScale: 1
    title:
      title: "RED ALERT"
      titleColor: "#ff4d4d"
      titleFontSize: 28
      titleFont: "DefaultBold"
  sound:
    path: "/Audio/Misc/redalert.ogg"
    params:
      volume: -2
  soundVolume: 1.0
  priority: 9
  canInterrupt: true
  canBeInterrupted: true
  decalRsi: "/Textures/_RMC14/Structures/Machines/status_display.rsi"
  decalState: "redalert_framed"
  decalPlacement: Above
  decalScale: 3.5
  decalAlpha: 1.0
  decalOffset: "0,-12"

