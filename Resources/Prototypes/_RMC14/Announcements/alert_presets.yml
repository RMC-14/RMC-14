  target: All
  showSprite: false
  style:
    animation: Typewriter
    position: TopLeft
    showBackground: false
    backgroundAlpha: 0.7
    backgroundColor: "#0a1a2d"
    primaryColor: "#a8d6ff"
    font: "Cozette"
    fontSize: 20
    lineHeight: 48
    printSpeed: 0.025
