    holdDuration: 10
    shakeIntensity: 0.0
    flickerChance: 0
    glitchChance: 0
    showSpriteBox: false
    showSpeakerName: false
    spritePosition: Left
    spriteDisplayMode: FullSprite
    spriteScale: 1
    uiScale: 3
    showTitle: true
    title: "ALERT LEVEL"
    titleColor: "#4a9eff"
    titleFontSize: 40
    titleFont: "CozetteBold"
