- type: announcementPreset
  id: RedAlertAnimated
  name: "Red Alert"
  description: "Animated red alert display"
  target: All
  visibleInSettings: false
  sound:
    path: "/Audio/Misc/redalert.ogg"
    params:
      volume: -2
  priority: 9
  canInterrupt: true
  canBeInterrupted: true
  presentations:
    stylized:
      showSprite: false
      decalRsi: "/Textures/_RMC14/Structures/Machines/status_display.rsi"
      decalState: "redalert_framed"
      decalPlacement: Above
      decalScale: 3.5
      decalAlpha: 1.0
      decalOffset: "0,-12"
      style:
        animation:
          animation: Fade
          printSpeed: 0.015
          holdDuration: 8
          flickerChance: 0.02
          glitchChance: 0
          animationEnhancements:
            enableCRT: false
        layout:
          position: TopLeft
          spritePosition: Left
          spriteDisplayMode: FullSprite
          uIScale: 2
          titlePosition: Above
        background:
          showBackground: true
          backgroundAlpha: 0.6
          backgroundColor: "#1a0a0a"
        text:
          primaryColor: "#ff4d4d"
          fontSize: 24
          lineHeight: 46
          showSpeakerName: false
        sprite:
          showSpriteBox: false
          spriteScale: 1
        title:
          title: "RED ALERT"
          titleColor: "#ff4d4d"
          titleFontSize: 28
          titleFont: "DefaultBold"
