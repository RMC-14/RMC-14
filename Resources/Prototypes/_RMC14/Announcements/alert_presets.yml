- type: announcementPreset
  id: MarineAlertLevel
  name: "Evacuation Alert"
  description: "Alert level announcement styling"
  target: All
  visibleInSettings: false
  priority: 8
  canInterrupt: true
  canBeInterrupted: true
  presentations:
    stylized:
      showSprite: false
      style:
        animation:
          animation: Typewriter
          printSpeed: 0.025
          holdDuration: 10
          flickerChance: 0
          glitchChance: 0
          animationEnhancements:
            enableCRT: false
        layout:
          position: TopLeft
          spritePosition: Left
          spriteDisplayMode: FullSprite
          uIScale: 3
          titlePosition: Above
        background:
          showBackground: false
          backgroundAlpha: 0.7
          backgroundColor: "#0a1a2d"
        text:
          primaryColor: "#a8d6ff"
          font: "Cozette"
          fontSize: 20
          lineHeight: 48
          showSpeakerName: false
        sprite:
          showSpriteBox: false
          spriteScale: 1
        title:
          showTitle: true
          title: "ALERT LEVEL"
          titleColor: "#4a9eff"
          titleFontSize: 40
          titleFont: "CozetteBold"
          titleUnderline: true
          titleUnderlineThickness: 2
        scaling:
          responsiveScaleFactor: 1.15

