  incognitoMask: false

- type: announcementPreset
  id: RedAlertAnimated
  name: "Red Alert"
  description: "Animated red alert display"
  target: All
  showSprite: false
  style:
    animation: Fade
    position: TopLeft
    showBackground: true
    backgroundAlpha: 0.6
    backgroundColor: "#1a0a0a"
    primaryColor: "#ff4d4d"
    fontSize: 24
    lineHeight: 46
    printSpeed: 0.015
    holdDuration: 8
    shakeIntensity: 0.1
    flickerChance: 0.02
    glitchChance: 0
    showSpriteBox: false
    showSpeakerName: false
    spritePosition: Left
    spriteDisplayMode: FullSprite
    spriteScale: 1
    uiScale: 2
    title: "RED ALERT"
    titleColor: "#ff4d4d"
    titleFontSize: 28
    titleFont: "DefaultBold"
    titlePosition: Above
    animationEnhancements:
      enableCRT: false
  sound:
    path: "/Audio/Misc/redalert.ogg"
