- type: announcementPreset
  id: MarineCommand
  name: "Marine Command"
  description: "Official announcements from Marine Command"
  target: Marines
  defaultPreference: Stylized
  sound:
    path: "/Audio/_RMC14/Announcements/Marine/notice2.ogg"
  priority: 8
  canInterrupt: true
  canBeInterrupted: false
  aliases:
  - "command"
  presentations:
    stylized:
      style:
        animation:
          animation: Typewriter
          printSpeed: 0.025
          holdDuration: 10
          flickerChance: 0
          glitchChance: 0.01
          animationEnhancements:
            slideDuration: 1.0
            slideFrom: Top
            zoomStartScale: 0.1
            zoomDuration: 1.0
            bounceCount: 3
            bounceHeight: 15
            enableCRT: true
            cRTSettings:
        layout:
          position: TopLeft
          speakerNamePosition: Below
          spritePosition: Left
          spriteSpacing: 0
          spriteDisplayMode: TopHalf
          uIScale: 3
          titlePosition: Above
        background:
          showBackground: false
          backgroundAlpha: 0.7
          backgroundColor: "#0a1a2d"
        text:
          primaryColor: "#a8d6ff"
          font: "Cozette"
          fontSize: 20
          lineHeight: 48
          showSpeakerName: true
          speakerNameColor: "#ffffff"
          speakerNameFontSize: 14
        sprite:
          showSpriteBox: true
          spriteBoxColor: "#0a1a2d"
          spriteBoxBorderColor: "#4a9eff"
          spriteBoxBorderThickness: 2
          spriteBoxPadding: 18
          spriteGlow: true
          spriteGlowColor: "#4a9eff"
          spriteGlowIntensity: 0.6
          spriteScale: 1
        title:
          showTitle: true
          title: ">> COMMAND <<"
          titleColor: "#4a9eff"
          titleFontSize: 15
          titleFont: "CozetteBold"
          titleUnderline: true
          titleUnderlineThickness: 2
        scaling:
          responsiveScaleFactor: 1.15
    default:
      style:
        animation:
          animation: Typewriter
          printSpeed: 0.025
          holdDuration: 10
          flickerChance: 0
          glitchChance: 0.01
          animationEnhancements:
            slideDuration: 1.0
            slideFrom: Top
            zoomStartScale: 0.1
            zoomDuration: 1.0
            bounceCount: 3
            bounceHeight: 15
            enableCRT: false
        layout:
          position: TopLeft
          speakerNamePosition: Below
          spritePosition: Left
          spriteSpacing: 0
          spriteDisplayMode: TopHalf
          uIScale: 3
          titlePosition: Above
        background:
          showBackground: false
          backgroundAlpha: 0.7
          backgroundColor: "#0a1a2d"
        text:
          primaryColor: "#a8d6ff"
          font: "Cozette"
          fontSize: 20
          lineHeight: 48
          showSpeakerName: true
          speakerNameColor: "#ffffff"
          speakerNameFontSize: 14
        sprite:
          showSpriteBox: true
          spriteBoxColor: "#0a1a2d"
          spriteBoxBorderColor: "#4a9eff"
          spriteBoxBorderThickness: 2
          spriteBoxPadding: 18
          spriteBoxShader: RMCMarineAnnouncementGrid
          spriteGlow: false
          spriteGlowColor: "#4a9eff"
          spriteGlowIntensity: 0.6
          spriteScale: 1
        title:
          showTitle: true
          title: ">> COMMAND <<"
          titleColor: "#4a9eff"
          titleFontSize: 10
          titleFont: "CozetteBold"
          titleUnderline: true
          titleUnderlineThickness: 2
        scaling:
          responsiveScaleFactor: 1.15
    simplified:
      showSprite: false
      style:
        animation:
          animation: None
          printSpeed: 0.02
          holdDuration: 8
          flickerChance: 0
          glitchChance: 0
          animationEnhancements:
            enableCRT: false
        layout:
          position: TopLeft
