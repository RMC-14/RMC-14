- type: entity
  abstract: true
  parent: RMCExtinguisherCabinet
  id: VehicleInteriorExtinguisherCabinetBase
  name: interior extinguisher cabinet
  description: A wall-mounted fire extinguisher cabinet for vehicle interiors.
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/general.rsi
    drawdepth: Overdoors
    layers:
    - state: extinguisher
    - state: extinguisher_full
      map: ["enum.ItemCabinetVisuals.Layer"]
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.ItemCabinetVisuals.ContainsItem:
        enum.ItemCabinetVisuals.Layer:
          True: { state: extinguisher_full }
          False: { state: extinguisher_empty }
      enum.OpenableVisuals.Opened:
        enum.ItemCabinetVisuals.Layer:
          True: { visible: true }
          False: { visible: false }

- type: entity
  parent: VehicleInteriorExtinguisherCabinetBase
  id: VehicleInteriorExtinguisher
  name: interior extinguisher
  components:
  - type: ContainerFill
    containers:
      ItemCabinet:
      - CMFireExtinguisher

- type: entity
  parent: VehicleInteriorExtinguisherCabinetBase
  id: VehicleInteriorExtinguisherClosed
  name: interior extinguisher (closed)
  components:
  - type: ContainerFill
    containers:
      ItemCabinet:
      - CMFireExtinguisher

- type: entity
  parent: VehicleInteriorExtinguisherCabinetBase
  id: VehicleInteriorExtinguisherFull
  name: interior extinguisher (full)
  components:
  - type: Openable
    opened: true
  - type: ContainerFill
    containers:
      ItemCabinet:
      - CMFireExtinguisher

- type: entity
  parent: VehicleInteriorExtinguisherCabinetBase
  id: VehicleInteriorExtinguisherMini
  name: interior extinguisher (mini)
  components:
  - type: Openable
    opened: true
  - type: ContainerFill
    containers:
      ItemCabinet:
      - CMFireExtinguisherPortable
  - type: Sprite
    layers:
    - state: extinguisher
    - state: extinguisher_mini
      map: ["enum.ItemCabinetVisuals.Layer"]
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.ItemCabinetVisuals.ContainsItem:
        enum.ItemCabinetVisuals.Layer:
          True: { state: extinguisher_mini }
          False: { state: extinguisher_empty }
      enum.OpenableVisuals.Opened:
        enum.ItemCabinetVisuals.Layer:
          True: { visible: true }
          False: { visible: false }

- type: entity
  parent: VehicleInteriorExtinguisherCabinetBase
  id: VehicleInteriorExtinguisherEmpty
  name: interior extinguisher (empty)
  components:
  - type: Openable
    opened: true

