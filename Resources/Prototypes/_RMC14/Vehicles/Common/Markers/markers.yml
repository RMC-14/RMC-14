- type: entity
  id: VehicleExitArea
  name: vehicle exit marker
  description: A clickable marker used for vehicle exits.
  placement:
    mode: PlaceFree
  components:
  - type: Icon
    sprite: _RMC14/Markers/landmarks.rsi
    state: invisible_wall
  - type: Sprite
    drawdepth: LowFloors
    texture: /Textures/_RMC14/Tiles/floors/void.png
  - type: VehicleExit
  - type: Vehicle
  - type: Clickable
    bounds:
      all: "-0.45,-0.45,0.45,0.45"
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      marker:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - Opaque
