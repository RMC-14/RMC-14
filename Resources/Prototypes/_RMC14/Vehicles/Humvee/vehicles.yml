- type: entity
  id: VehicleHumveeBase
  abstract: true
  name: humvee
  description: A fast armored utility vehicle outfitted for patrols and support.
  components:
  - type: Vehicle
    movementKind: Grid
  - type: Clickable
  - type: GridVehicleMover
    maxSpeed: 9
    acceleration: 6
    deceleration: 12
    pushCooldown: 2
    xenoBlockMinimumSize: Immobile
    xenoPushMinimumSize: Immobile
  - type: VehicleOvercharge
    speedMultiplier: 1.5
    duration: 3
    cooldown: 15
    overchargeSound: /Audio/_RMC14/Vehicle/overdrive_activate.ogg
  - type: VehicleSound
    runningSound: /Audio/Effects/Vehicle/vehicleengineidle.ogg
    runningSoundCooldown: 2
    hornSound: /Audio/_RMC14/Vehicle/sound_vehicles_humvee_horn.ogg
    hornCooldown: 1
#    collisionSound: /Audio/_RMC14/Structures/metalhit.ogg
#    collisionSoundCooldown: 0.4
    mobCollisionSound: /Audio/_RMC14/Xeno/alien_claw_block.ogg
  - type: VehicleSpotlight
    radius: 6
    energy: 2.5
    softness: 2
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      world:
        shape:
          !type:PhysShapeAabb
          bounds: -0.65,-1.2,0.65,1.2
        density: 1000
        mask:
        - Impassable
        - HighImpassable
        - LowImpassable
        - LargeMobLayer
        layer:
        - LargeMobLayer
      mob:
        shape:
          !type:PhysShapeAabb
          bounds: -0.65,-1.2,0.65,1.2
        density: 1000
        mask:
        - MidImpassable
        - BarricadeImpassable
        - LargeMobLayer
        layer:
        - LargeMobLayer
  - type: InteractionOutline
  - type: Sprite
    drawdepth: Mobs
    sprite: _RMC14/Structures/Vehicles/humvee.rsi
    layers:
    - map: [ base ]
      state: humvee_base
    - map: [ damaged_frame ]
      state: damaged_frame
      visible: false
    - map: [ primary ]
      state: PRIMARY
      visible: false
    - map: [ secondary ]
      state: SECONDARY
      visible: false
    - map: [ support ]
      state: ATTACH
      visible: false
    - map: [ support-2 ]
      state: ATTACH
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: SpriteMovement
    movementLayers:
      rmc-wheels:
        state: wheels_0
    noMovementLayers:
      rmc-wheels:
        state: wheels_1
  - type: PointLight
    enabled: false
    radius: 12
    energy: 2.5
    softness: 2
    autoRot: true
    offset: "0,0.9"
  - type: Corrodible
    isCorrodible: false
  - type: DoAfter
  - type: UserInterface
    interfaces:
      enum.HardpointUiKey.Key:
        type: HardpointBoundUserInterface
      enum.VehicleWeaponsUiKey.Key:
        type: VehicleWeaponsBoundUserInterface
  - type: VehicleWeapons
  - type: VehicleHardpointVisuals
  - type: InputMover
  - type: ItemSlots
    slots:
      wheel-1:
        startingItem: VehicleHumveeWheel
        whitelist:
          components:
          - VehicleWheelItem
  - type: HardpointSlots
    vehicleFamily: Humvee
    slots:
    - id: turret
      hardpointType: Turret
      slotType: Turret
      visualLayer: primary
      insertDelay: 2.0
      required: false
    - id: roof
      hardpointType: RoofAttachment
      slotType: RoofAttachment
      visualLayer: support
      insertDelay: 1.5
      required: false
    - id: front
      hardpointType: FrontAttachment
      slotType: FrontAttachment
      visualLayer: support-2
      insertDelay: 1.5
      required: false
    - id: wheel-1
      hardpointType: Wheel
      slotType: Wheel
      insertDelay: 1.5
  - type: VehicleWheelSlots
    slotCount: 1
  - type: Appearance
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/humvee_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 4
    maxXenos: 2
    entryPoints:
    - offset: -1,0.8
      radius: 0.45
      interiorCoords: 1.61, -2.15
    - offset: -1,-0.1
      radius: 0.45
      interiorCoords: 2.47, -2.15
    - offset: 1,0.8
      radius: 0.45
      interiorCoords: 1.6, -1.35
    - offset: 1,-0.1
      radius: 0.45
      interiorCoords: 2.41,-1.35

- type: entity
  parent: VehicleHumveeBase
  id: VehicleHumvee
  components:
  - type: ItemSlots
    slots:
      turret:
        startingItem: VehicleHumveeTurretArmed
        whitelist:
          components:
          - HardpointItem
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: HardpointIntegrity
    maxIntegrity: 1000
    repairFuelCost: 12
    bypassEntryOnZero: true

