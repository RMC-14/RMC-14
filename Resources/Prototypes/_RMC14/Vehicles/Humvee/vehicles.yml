- type: entity
  parent: VehicleHumveeBase
  id: VehicleHumveeARC
  name: humvee (arc)
  description: A humvee configured for ARC interior layout.
  components:
  - type: ItemSlots
    slots:
      turret:
        startingItem: VehicleHumveeARCTurret
        whitelist:
          components:
          - HardpointItem
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: VehicleFrameARC
  - type: HardpointIntegrity
    maxIntegrity: 800
    repairFuelCost: 12
    bypassEntryOnZero: true
  - type: VehicleDeployable
    deployTime: 5
    undeployTime: 5
    autoTargetRange: 20
    autoTargetCooldown: 0.2
    autoTurretEnabled: true
  - type: VehicleDeployGatedHardpoints
    blockedHardpoints:
    - Cannon
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/humvee_arc_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 4
    maxXenos: 2
    entryPoints:
    - offset: -1,-0.1
      radius: 0.5
      interiorCoords: 3.56,-1.42
    - offset: 1,-0.1
      radius: 0.5
      interiorCoords: 3.56, -0.42
