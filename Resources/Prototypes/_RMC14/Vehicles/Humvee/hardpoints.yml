- type: entity
  parent: BaseItem
  id: VehicleHumveeHardpointBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/humvee.rsi
  - type: Item
    size: Large

- type: entity
  parent: VehicleHumveeHardpointBase
  id: VehicleHumveeWheel
  name: humvee wheel
  description: A reinforced humvee wheel.
  components:
  - type: Sprite
    state: tires
  - type: HardpointItem
    hardpointType: Wheel
    vehicleFamily: Humvee
    slotType: Wheel
    damageMultiplier: 0.15
    repairRate: 0.0165
  - type: HardpointIntegrity
    maxIntegrity: 500
  - type: VehicleWheelItem

- type: entity
  parent: VehicleHumveeHardpointBase
  id: VehicleHumveeTurret
  name: humvee turret
  description: A roof-mounted humvee turret.
  components:
  - type: Sprite
    state: humveeturret
  - type: HardpointItem
    hardpointType: Turret
    vehicleFamily: Humvee
    slotType: Turret
    damageMultiplier: 0.15
    repairRate: 0.008
  - type: HardpointIntegrity
    maxIntegrity: 100
  - type: VehicleTurret
    rotateToCursor: true
    stabilizedRotation: false
    rotationSpeed: 180
    showOverlay: true
    useDirectionalOffsets: true
    overlayRsi: _RMC14/Structures/Vehicles/humvee.rsi
    overlayState: humveeturret_0
    pixelOffsetNorth: "0,4"
    pixelOffsetEast: "-6,16"
    pixelOffsetSouth: "0,15"
    pixelOffsetWest: "6,16"
  - type: ItemSlots
    slots:
      turret-cannon:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      turret-launcher:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
  - type: HardpointSlots
    vehicleFamily: Humvee
    slots:
    - id: turret-cannon
      hardpointType: Cannon
      slotType: Cannon
      required: false
      insertDelay: 2.0
    - id: turret-launcher
      hardpointType: Launcher
      slotType: Launcher
      required: false
      insertDelay: 2.0

- type: entity
  parent: VehicleHumveeTurret
  id: VehicleHumveeTurretArmed
  name: humvee turret
  description: A roof-mounted humvee turret pre-fitted with its cannon.
  components:
  - type: ItemSlots
    slots:
      turret-cannon:
        startingItem: VehicleHumveeCannon
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      turret-launcher:
        disableEject: true
        whitelist:
          components:
          - HardpointItem

- type: entity
  parent: VehicleHumveeTurret
  id: VehicleHumveeARCTurret
  name: humvee turret
  description: A roof-mounted humvee turret pre-fitted with its ARC cannon.
  components:
  - type: ItemSlots
    slots:
      turret-cannon:
        startingItem: VehicleHumveeARCCannon
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      turret-launcher:
        disableEject: true
        whitelist:
          components:
          - HardpointItem

- type: entity
  parent: VehicleHumveeHardpointBase
  id: VehicleHumveeCannon
  name: humvee cannon
  description: A fixed forward cannon for a humvee hardpoint.
  components:
  - type: Sprite
    state: humveecannon
  - type: HardpointItem
    hardpointType: Cannon
    vehicleFamily: Humvee
    slotType: Cannon
    damageMultiplier: 0.1
    repairRate: 0.01
  - type: HardpointIntegrity
    maxIntegrity: 125
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/humvee.rsi
    overlayState: humveecannon_0
    fireWhileRotatingGraceDegrees: 20
    useBarrelDirectionForShots: true
    maxShotCurvatureDegrees: 10
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: Gun
    fireRate: 5 # 0.2 seconds between shots
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot: /Audio/_RMC14/Vehicle/weapons/sound_weapons_humvee_cannon.ogg
    cameraRecoilScalar: 0
  - type: GunIFF
    enabled: true
    intrinsic: true
  - type: UserIFF
    factions:
    - FactionMarine
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 5
    accuracyMultiplierUnwielded: 5
  - type: BallisticAmmoProvider
    cycleable: false
    proto: VehicleCartridgeRERotaryCannon10x50mm
    capacity: 500
  - type: VehicleHardpointAmmo
    magazineSize: 500
    maxStoredMagazines: 2
  - type: GunFireArc
    arc: 180
  - type: RefillableByBulletBox
    bulletType: VehicleAmmoBoxRERotaryCannon
  - type: GunMuzzleOffset
    offset: "0,-0.8"
    muzzleOffset: "0,0"
    useAimDirection: false
    useContainerOwner: false
  - type: HardpointVisual
    vehicleState: humveecannon_0

- type: entity
  parent: VehicleHumveeCannon
  id: VehicleHumveeARCCannon
  name: ARC cannon
  description: A burst-fire cannon configured for an ARC humvee turret.
  components:
  - type: Gun
    fireRate: 5 # 0.2 seconds between shots
    burstFireRate: 5
    shotsPerBurst: 3
    selectedMode: Burst
    availableModes:
    - Burst

- type: entity
  parent: VehicleHumveeHardpointBase
  id: VehicleHumveeLauncher
  name: humvee launcher
  description: A launcher hardpoint for a humvee.
  components:
  - type: Sprite
    state: humveelauncher
  - type: HardpointItem
    hardpointType: Launcher
    vehicleFamily: Humvee
    slotType: Launcher
    damageMultiplier: 0.0
    repairRate: 0.0125
  - type: HardpointIntegrity
    maxIntegrity: 100
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/humvee.rsi
    overlayState: humveelauncher_0
  - type: HardpointVisual
    vehicleState: humveelauncher_0
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: GunIgnorePrediction
  - type: Gun
    fireRate: 0.7
    projectileSpeed: 18
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
    cameraRecoilScalar: 0
  - type: ShootAtFixedPoint
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 5
    accuracyMultiplierUnwielded: 5
  - type: OnShootTriggerAmmoTimer
    delay: 0.2
  - type: BallisticAmmoProvider
    cycleable: false
    proto: RMC40MMGrenadeM74AGMSVehicle
    capacity: 6
  - type: VehicleHardpointAmmo
    magazineSize: 6
    maxStoredMagazines: 2
  - type: GunFireArc
    arc: 120
  - type: RefillableByBulletBox
    bulletType: VehicleAmmoBoxGrenadeLauncher

- type: entity
  parent: VehicleHumveeHardpointBase
  id: VehicleHumveeSnowplow
  name: humvee snowplow
  description: A reinforced plow attachment for a humvee.
  components:
  - type: Sprite
    state: snowplow
  - type: HardpointItem
    hardpointType: FrontAttachment
    vehicleFamily: Humvee
    slotType: FrontAttachment
    damageMultiplier: 0.075
    repairRate: 0.0125
  - type: HardpointIntegrity
    maxIntegrity: 100
  - type: HardpointVisual
    vehicleState: snowplow_0

- type: entity
  parent: VehicleHumveeHardpointBase
  id: VehicleHumveeOverlight
  name: humvee overlight
  description: An overlight array for a humvee.
  components:
  - type: Sprite
    state: overlight
  - type: HardpointItem
    hardpointType: RoofAttachment
    vehicleFamily: Humvee
    slotType: RoofAttachment
    damageMultiplier: 0.1
    repairRate: 0.0125
  - type: HardpointIntegrity
    maxIntegrity: 500
  - type: VehicleSpotlightModifier
    radiusMultiplier: 2.0
  - type: HardpointVisual
    vehicleState: overlight_0

- type: entity
  parent: VehicleHumveeHardpointBase
  id: VehicleHumveeHatch
  name: humvee hatch
  description: A hatch assembly for a humvee.
  components:
  - type: Sprite
    state: humveehatch
  - type: HardpointItem
    hardpointType: RoofAttachment
    vehicleFamily: Humvee
    slotType: RoofAttachment
    damageMultiplier: 0.075
    repairRate: 0.0125
  - type: HardpointIntegrity
    maxIntegrity: 100
  - type: HardpointVisual
    vehicleState: humveehatch_0

