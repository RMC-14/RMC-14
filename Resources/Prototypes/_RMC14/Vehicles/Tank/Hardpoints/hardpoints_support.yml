  - type: VehicleTurret
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,-10"
    pixelOffsetEast: "-10,0"
    pixelOffsetSouth: "0,10"
    pixelOffsetWest: "10,0"
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: GunIgnorePrediction
  - type: Gun
    fireRate: 0.5
    projectileSpeed: 20
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/flaregun.ogg
    cameraRecoilScalar: 0
  - type: ShootAtFixedPoint
  - type: BallisticAmmoProvider
    cycleable: false
    capacity: 10
    whitelist:
      tags:
      - Flare
      - RMCFlare
      - RMCFlareCAS
    proto: CMFlare
  - type: RMCVehicleHardpointAmmo
    magazineSize: 10
    maxStoredMagazines: 3
  - type: GunFireArc
    arc: 360
  - type: RefillableByBulletBox
    bulletType: RMCVehicleAmmoBoxFlareLauncher
  - type: GunMuzzleOffset
    offset: "0,0"
    useDirectionalOffsets: true
    offsetEast: "0,0.2"
    muzzleOffset: "0,-1"
    useAimDirection: true
    useContainerOwner: false
  - type: RMCHardpointVisual
    vehicleState: slauncher_1

