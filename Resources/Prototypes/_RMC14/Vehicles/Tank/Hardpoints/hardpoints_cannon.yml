- type: entity
  parent: VehicleTankHardpointBase
  id: VehicleTankLTBCannon
  name: LTB cannon
  description: A light tank cannon hardpoint.
  components:
  - type: Sprite
    state: ltb_cannon
  - type: HardpointItem
    hardpointType: Cannon
    vehicleFamily: Tank
    slotType: Cannon
    damageMultiplier: 0.125
    repairRate: 0.01
  - type: HardpointIntegrity
    maxIntegrity: 500
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,30"
    pixelOffsetEast: "30,0"
    pixelOffsetSouth: "0,-50"
    pixelOffsetWest: "-30,0"
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/tank.rsi
    overlayState: ltb_cannon_0
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: ShootAtFixedPoint
  - type: Gun
    fireRate: 0.0625
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/_RMC14/Vehicle/weapons/cannon_fire1.ogg
    cameraRecoilScalar: 0
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 5
    accuracyMultiplierUnwielded: 5
  - type: BallisticAmmoProvider
    cycleable: false
    proto: VehicleCartridgeLTBCannon
    capacity: 4
  - type: VehicleHardpointAmmo
    magazineSize: 4
    maxStoredMagazines: 3
  - type: GunFireArc
    arc: 120
  - type: RefillableByBulletBox
    bulletType: VehicleAmmoBoxLTBCannon
  - type: GunMuzzleOffset
    useDirectionalOffsets: true
    rotateDirectionalOffsets: true
    offsetNorth: "0,-1.5"
    offsetEast: "0.4,-1.9"
    offsetSouth: "0,-1"
    offsetWest: "-0.4,-1.9"
    useAimDirection: true
  - type: HardpointVisual
    vehicleState: ltb_cannon_0

- type: entity
  parent: VehicleTankHardpointBase
  id: VehicleTankLTAAAPMinigun
  name: LTAAAP minigun
  description: A light anti-air minigun hardpoint.
  components:
  - type: Sprite
    state: ltaaap_minigun
  - type: HardpointItem
    hardpointType: Cannon
    vehicleFamily: Tank
    slotType: Cannon
    damageMultiplier: 0.125
    repairRate: 0.01
  - type: HardpointIntegrity
    maxIntegrity: 350
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    fireWhileRotatingGraceDegrees: 180
    useBarrelDirectionForShots: true
    maxShotCurvatureDegrees: 10
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,40"
    pixelOffsetEast: "33,0"
    pixelOffsetSouth: "0,-50"
    pixelOffsetWest: "-33,0"
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/tank.rsi
    overlayState: ltaaap_minigun_0
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: Gun
    fireRate: 1.5
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    cameraRecoilScalar: 0
  - type: GunSpinup
    baseShotDelay: 0.7
    baseScatter: 10
    initialWindupDelay: 0.7
    spinUpTime: 6
    graceAfterStop: 2
    spinDownTime: 3
    minSpinLevel: 1
    maxSpinLevel: 11
    rateTiers: [1, 1, 2, 2, 3, 3, 3, 4, 4, 4, 5]
    startSound:
      path: /Audio/_RMC14/Vehicle/weapons/minigun_start.ogg
    loopSound:
      path: /Audio/Weapons/Guns/Gunshots/minigun.ogg
    stopSound:
      path: /Audio/_RMC14/Vehicle/weapons/minigun_stop.ogg
    selectSound:
      path: /Audio/_RMC14/Vehicle/weapons/minigun_select.ogg
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 4
    accuracyMultiplierUnwielded: 4
  - type: BallisticAmmoProvider
    cycleable: false
    proto: VehicleCartridgeLTAAAP
    capacity: 500
  - type: VehicleHardpointAmmo
    magazineSize: 500
    maxStoredMagazines: 1
  - type: GunFireArc
    arc: 140
  - type: RefillableByBulletBox
    bulletType: VehicleAmmoBoxLTAA
  - type: GunMuzzleOffset
    applyToMuzzleFlash: true
    useDirectionalOffsets: true
    rotateDirectionalOffsets: true
    offsetEast: "0.45,-1.3"
    offsetWest: "-0.45, -1.3"
    offsetSouth: "0, -0.55"
    offsetNorth: "0, -1.3"
    useAimDirection: true
    useContainerOwner: false
  - type: HardpointVisual
    vehicleState: ltaaap_minigun_0

