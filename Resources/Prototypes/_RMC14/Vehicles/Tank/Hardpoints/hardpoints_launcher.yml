    overlayRsi: _RMC14/Structures/Vehicles/tank.rsi
    overlayState: glauncher_0
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: GunIgnorePrediction
  - type: Gun
    fireRate: 0.3333
    projectileSpeed: 18
    minAngle: 10
    maxAngle: 10
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
    cameraRecoilScalar: 0
  - type: ShootAtFixedPoint
    shootArcProj: true
    maxFixedRange: 10
  - type: OnShootTriggerAmmoTimer
    delay: 1.5
