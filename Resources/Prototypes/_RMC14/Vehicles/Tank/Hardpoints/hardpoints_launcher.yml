- type: entity
  parent: VehicleTankHardpointBase
  id: VehicleTankFlamer
  name: LZR-N flame unit
  description: A tank-mounted flamethrower hardpoint.
  components:
  - type: Sprite
    state: flamer
  - type: HardpointItem
    hardpointType: HardpointTypeLauncher
    vehicleFamily: HardpointVehicleFamilyTank
    slotType: HardpointSlotTypeLauncher
    damageMultiplier: 0.125
    repairRate: 0.0125
  - type: HardpointIntegrity
    maxIntegrity: 300
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    fireWhileRotatingGraceDegrees: 180
    useBarrelDirectionForShots: true
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,-10"
    pixelOffsetEast: "-10,0"
    pixelOffsetSouth: "0,10"
    pixelOffsetWest: "10,0"
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/tank.rsi
    overlayState: flamer_0
    overlayDamagedState: flamer_1
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: Gun
    fireRate: 0.3333
    projectileSpeed: 20
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/_RMC14/Vehicle/weapons/flamethrower.ogg
    cameraRecoilScalar: 0
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 4
    accuracyMultiplierUnwielded: 4
  - type: VehicleFlamerTankSlots
    maxTanks: 2
    startingItem: VehicleFlamerTankLZRN
  - type: RMCFlamerAmmoProvider
  - type: GunFireArc
    arc: 120
  - type: GunMuzzleOffset
    offset: "0,0"
    useDirectionalOffsets: true
    offsetEast: "0,0.2"
    muzzleOffset: "0,-1"
    useAimDirection: true
    useContainerOwner: false
  - type: HardpointVisual
    vehicleState: flamer_0
    damagedVehicleState: flamer_1

- type: entity
  parent: VehicleTankHardpointBase
  id: VehicleTankGrenadeLauncher
  name: tank grenade launcher
  description: A tank-mounted grenade launcher hardpoint.
  components:
  - type: Sprite
    state: glauncher
  - type: HardpointItem
    hardpointType: HardpointTypeLauncher
    vehicleFamily: HardpointVehicleFamilyTank
    slotType: HardpointSlotTypeLauncher
    damageMultiplier: 0.125
    repairRate: 0.0125
  - type: HardpointIntegrity
    maxIntegrity: 500
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    fireWhileRotatingGraceDegrees: 180
    useBarrelDirectionForShots: true
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,-10"
    pixelOffsetEast: "-10,0"
    pixelOffsetSouth: "0,10"
    pixelOffsetWest: "10,0"
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/tank.rsi
    overlayState: glauncher_0
    overlayDamagedState: glauncher_1
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: Gun
    fireRate: 0.3333
    projectileSpeed: 18
    minAngle: 10
    maxAngle: 10
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
    cameraRecoilScalar: 0
  - type: ShootAtFixedPoint
    shootArcProj: true
    maxFixedRange: 10
  - type: OnShootTriggerAmmoTimer
    delay: 1.5
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 5
    accuracyMultiplierUnwielded: 5
  - type: BallisticAmmoProvider
    cycleable: false
    proto: CMGrenadeHighExplosive
    capacity: 10
  - type: VehicleHardpointAmmo
    magazineSize: 10
    maxStoredMagazines: 3
  - type: GunFireArc
    arc: 120
  - type: RefillableByBulletBox
    bulletType: VehicleAmmoBoxGrenadeLauncher
  - type: GunMuzzleOffset
    offset: "0,0"
    useDirectionalOffsets: true
    offsetEast: "0,0.2"
    muzzleOffset: "0,-1"
    useAimDirection: true
    useContainerOwner: false
  - type: HardpointVisual
    vehicleState: glauncher_0
    damagedVehicleState: glauncher_1

