- type: entity
  parent: VehicleTankHardpointBase
  id: VehicleTankFlamer
  name: tank flamer
  description: A tank-mounted flamethrower hardpoint.
  components:
  - type: Sprite
    state: flamer
  - type: HardpointItem
    hardpointType: Launcher
    vehicleFamily: Tank
    slotType: Launcher
    damageMultiplier: 0.0
    repairRate: 0.0125
  - type: HardpointIntegrity
    maxIntegrity: 300
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,-10"
    pixelOffsetEast: "-10,0"
    pixelOffsetSouth: "0,10"
    pixelOffsetWest: "10,0"
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/tank.rsi
    overlayState: flamer_0
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: GunIgnorePrediction
  - type: Gun
    fireRate: 1.0
    projectileSpeed: 20
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/_RMC14/Vehicle/weapons/flamethrower.ogg
    cameraRecoilScalar: 0
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 4
    accuracyMultiplierUnwielded: 4
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 60
        reagents:
        - ReagentId: RMCNapalmUTTank
          Quantity: 60
  - type: RMCFlamerAmmoProvider
  - type: RMCFlamerTank
    maxIntensity: 30
    maxDuration: 20
    maxRange: 7
    reagentWhitelist:
    - RMCNapalmUTTank
  - type: RMCFlushableSolution
    solution: rmc_flamer_tank
    flushTime: 1.5
  - type: NoMixingReagents
  - type: GunFireArc
    arc: 120
  - type: GunMuzzleOffset
    offset: "0,0"
    useDirectionalOffsets: true
    offsetEast: "0,0.2"
    muzzleOffset: "0,-1"
    useAimDirection: true
    useContainerOwner: false
  - type: HardpointVisual
    vehicleState: flamer_0

- type: entity
  parent: VehicleTankHardpointBase
  id: VehicleTankGrenadeLauncher
  name: tank grenade launcher
  description: A tank-mounted grenade launcher hardpoint.
  components:
