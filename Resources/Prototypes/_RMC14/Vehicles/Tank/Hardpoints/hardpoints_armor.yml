- type: entity
  parent: VehicleTankHardpointBase
  id: VehicleTankArmorBallistic
  name: ballistic armor plating
  description: Ballistic armor plating for a tank.
  components:
  - type: Sprite
    state: ballistic_armor
  - type: HardpointItem
    hardpointType: HardpointTypeArmor
    vehicleFamily: HardpointVehicleFamilyTank
    slotType: HardpointSlotTypeArmor
    damageMultiplier: 0.5
    repairRate: 0.007
  - type: HardpointIntegrity
    maxIntegrity: 1000
  - type: VehicleArmorHardpoint
    modifierSets:
    - VehicleArmorBallistic
  - type: HardpointVisual
    vehicleState: ballistic_armor_0
    damagedVehicleState: ballistic_armor_1

