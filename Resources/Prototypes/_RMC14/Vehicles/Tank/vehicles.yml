- type: entity
  id: VehicleTankBase
  abstract: true
  name: tank
  description: A heavy armored tank built for battlefield dominance.
  components:
  - type: Vehicle
    movementKind: Grid
  - type: LagCompensation
  - type: Clickable
  - type: WarpPoint
    follow: true
    location: Tank
  - type: RMCIgnoreGhostInteractionLimits
  - type: RequireProjectileTarget
  - type: GridVehicleMover
    maxSpeed: 3
    acceleration: 1.154
    deceleration: 8
    maxReverseSpeed: 2
    reverseAcceleration: 1.154
    turnDelay: 1
    turnInPlace: true
    turnInPlaceMaxSpeed: 0.5
    pushCooldown: 2
    canPushVehicles: true
    blockingMobBypassNudgeLimit: 2
    xenoBlockMinimumSize: Immobile
    canXenosPush: false
  - type: VehicleRideSurface
    bounds:
    - -1.3,-1.9,1.3,1.9
    climbBounds:
    - -1.8,1.8,1.8,2.8
  - type: VehicleOvercharge
    speedMultiplier: 1.3
    duration: 3
    cooldown: 20
    overchargeSound: /Audio/_RMC14/Vehicle/overdrive_activate.ogg
  - type: VehicleSound
    runningSound: /Audio/Effects/Vehicle/vehicleengineidle.ogg
    runningSoundCooldown: 2
    hornSound: /Audio/Effects/Vehicle/carhorn.ogg
    hornCooldown: 1
    collisionSoundCooldown: 0.5
    mobCollisionSound: /Audio/_RMC14/Xeno/alien_claw_block.ogg
  - type: VehicleSpotlight
    radius: 8
    energy: 3
    softness: 2
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      world:
        shape:
          !type:PhysShapeAabb
          bounds: -1.2,-1.6,1.2,1.6
        density: 1500
        mask:
        - Impassable
        - HighImpassable
        - LowImpassable
        - LargeMobLayer
        - Vehicle
        layer:
        - LargeMobLayer
        - Vehicle
      mob:
        shape:
          !type:PhysShapeAabb
          bounds: -1.2,-1.6,1.2,1.6
        density: 1500
        mask:
        - MidImpassable
        - BarricadeImpassable
        - LargeMobLayer
        layer:
        - LargeMobLayer
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: VehicleFrameTank
  - type: InteractionOutline
  - type: Sprite
    drawdepth: Mobs
    sprite: _RMC14/Structures/Vehicles/tank.rsi
    layers:
    - map: [ base ]
      state: tank_base
    - map: [ armor ]
      state: ARMOR
      visible: false
    - map: [ primary ]
      state: tank_turret_0
      visible: false
    - map: [ secondary ]
      state: SECONDARY
      visible: false
    - map: [ support ]
      state: SUPPORT
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: SpriteMovement
    movementLayers:
      rmc-wheels:
        state: wheels_0
    noMovementLayers:
      rmc-wheels:
        state: wheels_1
  - type: PointLight
    enabled: false
    radius: 12
    energy: 3
    softness: 2
    autoRot: true
    offset: "0,0.9"
  - type: Corrodible
    isCorrodible: false
  - type: DoAfter
  - type: UserInterface
    interfaces:
      enum.HardpointUiKey.Key:
        type: HardpointBoundUserInterface
      enum.VehicleWeaponsUiKey.Key:
        type: VehicleWeaponsBoundUserInterface
  - type: VehicleWeapons
  - type: VehicleHardpointVisuals
  - type: InputMover
  - type: ItemSlots
    slots:
      armor:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      primary:
        startingItem: VehicleTankTurret
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      secondary:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      support:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      wheel-1:
        disableEject: true
        whitelist:
          components:
          - VehicleWheelItem
  - type: HardpointSlots
    vehicleFamily: HardpointVehicleFamilyTank
    slots:
    - id: armor
      hardpointType: HardpointTypeArmor
      slotType: HardpointSlotTypeArmor
      visualLayer: armor
      insertDelay: 2.5
      required: false
    - id: primary
      hardpointType: HardpointTypeTurret
      slotType: HardpointSlotTypeTurret
      visualLayer: primary
      insertDelay: 3.0
      required: false
    - id: secondary
      hardpointType: HardpointTypeSecondary
      visualLayer: secondary
      insertDelay: 2.5
      required: false
    - id: support
      hardpointType: HardpointTypeSupport
      slotType: HardpointSlotTypeSupportAttachment
      visualLayer: support
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: HardpointTypeWheel
      slotType: HardpointSlotTypeTreads
      insertDelay: 2.0
  - type: VehicleWheelSlots
    slotCount: 1
  - type: HardpointIntegrity
    maxIntegrity: 1000
    bypassEntryOnZero: true
  - type: Appearance
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/tank_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 4
    maxXenos: 2
    entryPoints:
    - offset: 0,2
      radius: 1
      interiorCoords: 0.5,-1

- type: entity
  parent: VehicleTankBase
  id: VehicleTankTest
  name: test tank (autodrive)
  description: A test tank that automatically drives east on spawn.
  components:
  - type: RMCVehicleAutopilot
    direction: 1,0

- type: entity
  parent: VehicleTankBase
  id: VehicleTank
  components:
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/tank_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 3
    maxXenos: 2
    reservedPassengerPools:
    - slots: 2
      eligibleJobs:
      - CMVehicleCrewman
    entryPoints:
    - offset: 0,2
      radius: 1
      interiorCoords: 0.5,-1
  - type: MarineMapTracked
  - type: TacticalMapTracked
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips_large.rsi
      state: tank

- type: entity
  parent: VehicleTankBase
  id: VehicleSPPTank
  name: SPP tank
  description: A heavy SPP battle tank.
  components:
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/spp_tank_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 4
    maxXenos: 2
    entryPoints:
    - offset: 0,2
      radius: 1
      interiorCoords: 0.5,0.5
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/spptank.rsi
    layers:
    - map: [ base ]
      state: tank_base
    - map: [ armor ]
      state: ARMOR
      visible: false
    - map: [ primary ]
      state: tank_turret_0
      visible: false
    - map: [ secondary ]
      state: SECONDARY
      visible: false
    - map: [ support ]
      state: SUPPORT
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: ItemSlots
    slots:
      armor:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      primary:
        startingItem: VehicleSPPTankTurret
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      secondary:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      support:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      wheel-1:
        startingItem: VehicleTankTreads
        disableEject: true
        whitelist:
          components:
          - VehicleWheelItem
  - type: HardpointSlots
    vehicleFamily: HardpointVehicleFamilyTank
    slots:
    - id: armor
      hardpointType: HardpointTypeArmor
      slotType: HardpointSlotTypeArmor
      compatibilityId: HardpointCompatibilitySPPTank
      visualLayer: armor
      insertDelay: 2.5
      required: false
    - id: primary
      hardpointType: HardpointTypeTurret
      slotType: HardpointSlotTypeTurret
      compatibilityId: HardpointCompatibilitySPPTank
      visualLayer: primary
      insertDelay: 3.0
      required: false
    - id: secondary
      hardpointType: HardpointTypeSecondary
      compatibilityId: HardpointCompatibilitySPPTank
      visualLayer: secondary
      insertDelay: 2.5
      required: false
    - id: support
      hardpointType: HardpointTypeSupport
      slotType: HardpointSlotTypeSupportAttachment
      compatibilityId: HardpointCompatibilitySPPTank
      visualLayer: support
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: HardpointTypeWheel
      slotType: HardpointSlotTypeTreads
      insertDelay: 2.0

