    stateDoorClosed:
    stateDoorOpen:

- type: entity
  parent: VehicleSPPTankAmmoStorageBase
  id: VehicleSPPTankAmmoStorage
  name: SPP tank ammunition storage

- type: entity
  parent: VehicleInteriorWallMountedBase
  id: VehicleSPPTankAmmoLoader
  name: SPP tank ammo loader
  description: A loader for SPP tank hardpoint ammunition.
  components:
  - type: Sprite
    drawdepth: BelowMobs
    sprite: _RMC14/Structures/Vehicles/Interiors/spptank.rsi
    state: weapons_loader
  - type: VehicleAmmoLoader
  - type: UserInterface
    interfaces:
      enum.VehicleAmmoLoaderUiKey.Key:
        type: VehicleAmmoLoaderBoundUserInterface
