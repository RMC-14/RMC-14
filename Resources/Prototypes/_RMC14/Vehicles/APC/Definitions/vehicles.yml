- type: entity
  parent: RMCVehicleAPCBase
  id: RMCVehicleSPPAPC
  name: SPP armored personnel carrier
  description: An armored personnel carrier configured for SPP forces.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/sppapc.rsi
    layers:
    - map: [ base ]
      state: sppapc_base
    - map: [ damaged_frame ]
      state: damaged_frame
      visible: false
    - map: [ primary ]
      state: PRIMARY
      visible: false
    - map: [ secondary ]
      state: SECONDARIES
      visible: false
    - map: [ support ]
      state: SUPPORT
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: ItemSlots
    slots:
      port-gun-north:
        startingItem: null
      port-gun-south:
        startingItem: null
      primary:
        startingItem: RMCVehicleSPPAPCTurret
        whitelist:
          components:
          - RMCHardpointItem
      wheel-1:
        startingItem: RMCVehicleSPPAPCWheel
        whitelist:
          components:
          - RMCVehicleWheelItem
  - type: RMCHardpointSlots
    vehicleFamily: APC
    slots:
    - id: primary
      hardpointType: Turret
      slotType: Turret
      compatibilityId: SPPAPC
      visualLayer: primary
      insertDelay: 2.5
      required: false
    - id: secondary
      hardpointType: Cannon
      slotType: Cannon
      compatibilityId: SPPAPC
      visualLayer: secondary
      insertDelay: 2.5
      required: false
    - id: support
      hardpointType: SupportAttachment
      slotType: SupportAttachment
      compatibilityId: SPPAPC
      visualLayer: support
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: Wheel
      slotType: Wheel
      compatibilityId: SPPAPC
      insertDelay: 1.5
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/spp_apc_interior.yml
