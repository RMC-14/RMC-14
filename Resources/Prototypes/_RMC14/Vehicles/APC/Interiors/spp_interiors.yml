- type: entity
  abstract: true
  id: RMCVehicleSPPAPCInteriorBase
  name: SPP APC interior piece
  description: A decorative interior piece for an SPP APC.
  placement:
    mode: PlaceFree
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/sppapc.rsi
    drawdepth: Overdoors
  - type: InteractionTransparency

- type: entity
  abstract: true
  id: RMCVehicleSPPAPCRoofBase
  name: SPP APC Side Door
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/sppapc.rsi
    drawdepth: Overdoors
  - type: InteractionTransparency
  - type: RMCSpriteFade
    targetAlpha: 0.35
    changeRate: 4.0
    reactToMouse: false
    fadeOnSharedGrid: true
    fadeLayers:
    - "roof"

- type: entity
  abstract: true
  id: RMCVehicleSPPAPCChassisBase
  name: SPP APC interior chassis
  description: A chassis segment for an SPP APC interior.
  placement:
    mode: PlaceFree
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/sppapc_chassis.rsi
    drawdepth: FloorTiles
  - type: InteractionTransparency

- type: entity
  parent: RMCVehicleSPPAPCChassisBase
  id: RMCVehicleSPPAPCChassis
  components:
  - type: Sprite
    state: sppapc_chassis

- type: entity
  abstract: true
  parent: RMCVehicleSPPAPCInteriorBase
  id: RMCVehicleSPPAPCWallBase
  placement:
    mode: PlaceFree
  components:
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Occluder
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - Opaque
        - InteractImpassable

- type: entity
  abstract: true
  parent: RMCVehicleSPPAPCWallBase
  id: RMCVehicleSPPAPCDoorBase
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: RemoveComponents
    components:
    - type: InteractionTransparency

- type: entity
  parent: RMCVehicleSPPAPCDoorBase
  id: RMCVehicleSPPAPCDoorFront
  components:
  - type: Sprite
    state: door_front
  - type: Occluder
    enabled: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - InteractImpassable

- type: entity
  parent: RMCVehicleSPPAPCRoofBase
  id: RMCVehicleSPPAPCDoorBack
  components:
  - type: Sprite
    drawdepth: BelowMobs
    layers:
    - state: door_back
      map: [ "roof" ]
  - type: Clickable
  - type: InteractionOutline
  - type: RemoveComponents
    components:
    - type: InteractionTransparency

- type: entity
  parent: RMCVehicleSPPAPCDoorBase
  id: RMCVehicleSPPAPCDoorRearCenter
  components:
  - type: Sprite
    state: door_rear_center

- type: entity
  parent: RMCVehicleSPPAPCDoorBase
  id: RMCVehicleSPPAPCExitDoor
  components:
  - type: Sprite
    state: exit_door

- type: entity
  abstract: true
  parent: RMCVehicleInteriorWallMountedBase
  id: RMCVehicleSPPAPCConsoleBase
  placement:
    mode: PlaceFree
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/sppapc.rsi

- type: entity
  parent: RMCVehicleSPPAPCConsoleBase
  id: RMCVehicleSPPAPCDriverConsole
  name: SPP APC driver console
  components:
  - type: Sprite
    state: Driveconsole

- type: entity
  parent: RMCVehicleSPPAPCConsoleBase
  id: RMCVehicleSPPAPCDriverConsoleOff
  name: SPP APC driver console (off)
  components:
  - type: Sprite
    state: Driveconsole0

- type: entity
  parent: RMCVehicleSPPAPCConsoleBase
  id: RMCVehicleSPPAPCDriverConsoleBroken
  name: SPP APC driver console (broken)
  components:
  - type: Sprite
    state: Driveconsoleb

- type: entity
  parent: RMCVehicleSPPAPCConsoleBase
  id: RMCVehicleSPPAPCWeaponConsole
  name: SPP APC weapon console
  components:
  - type: Sprite
    state: Weaponconsole

- type: entity
  parent: RMCVehicleSPPAPCConsoleBase
  id: RMCVehicleSPPAPCWeaponConsoleOff
  name: SPP APC weapon console (off)
  components:
  - type: Sprite
    state: Weaponconsole0

- type: entity
  parent: RMCVehicleSPPAPCConsoleBase
  id: RMCVehicleSPPAPCWeaponConsoleBroken
  name: SPP APC weapon console (broken)
  components:
  - type: Sprite
    state: Weaponconsoleb

- type: entity
  abstract: true
  parent: CMClosetBase
  id: RMCVehicleSPPAPCLockerBase
  name: SPP APC locker
  description: A storage locker for SPP APC interiors.
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
  - type: WallMount
    arc: 360
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/sppapc.rsi
    drawdepth: Overdoors
    layers:
    - state: locker
      map: ["enum.StorageVisualLayers.Base"]
    - state: locker
      map: ["enum.StorageVisualLayers.Door"]
  - type: EntityStorageVisuals
    stateBaseClosed: locker
    stateBaseOpen: locker_open
    stateDoorClosed:
    stateDoorOpen:

- type: entity
  parent: RMCVehicleSPPAPCLockerBase
  id: RMCVehicleSPPAPCLocker
  name: SPP APC locker

- type: entity
  parent: RMCVehicleInteriorWallMountedBase
  id: RMCVehicleSPPAPCAmmoLoader
  name: SPP APC ammo loader
  description: A loader for SPP APC hardpoint ammunition.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/sppapc.rsi
    state: weapons_loader
  - type: RMCVehicleAmmoLoader
  - type: UserInterface
    interfaces:
      enum.RMCVehicleAmmoLoaderUiKey.Key:
        type: RMCVehicleAmmoLoaderBoundUserInterface
