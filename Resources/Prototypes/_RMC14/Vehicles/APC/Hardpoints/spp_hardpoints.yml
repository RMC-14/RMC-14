- type: entity
  parent: BaseItem
  id: RMCVehicleSPPAPCHardpointBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
  - type: Item
    size: Large

- type: entity
  parent: RMCVehicleSPPAPCHardpointBase
  id: RMCVehicleSPPAPCWheel
  name: SPP APC wheel
  description: A reinforced APC wheel produced for SPP vehicles.
  components:
  - type: Sprite
    state: spp_tires
  - type: RMCHardpointItem
    hardpointType: Wheel
    vehicleFamily: APC
    slotType: Wheel
    compatibilityId: SPPAPC
    damageMultiplier: 0.15
    repairCategory: Wheel
  - type: RMCHardpointIntegrity
    maxIntegrity: 500
  - type: RMCVehicleWheelItem

- type: entity
  parent: RMCVehicleSPPAPCHardpointBase
  id: RMCVehicleSPPAPCTurret
  name: SPP APC turret
  description: A rotating turret mount for an SPP APC.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/sppapc.rsi
    state: apc_turret_0
  - type: RMCHardpointItem
    hardpointType: Turret
    vehicleFamily: APC
    slotType: Turret
    compatibilityId: SPPAPC
    damageMultiplier: 0.2
    repairCategory: Turret
  - type: RMCHardpointIntegrity
    maxIntegrity: 500
  - type: VehicleTurret
    rotateToCursor: true
    stabilizedRotation: false
    rotationSpeed: 80
    showOverlay: true
    useDirectionalOffsets: true
    overlayRsi: _RMC14/Structures/Vehicles/sppapc.rsi
    overlayState: apc_turret_0
    pixelOffsetNorth: "0,4"
    pixelOffsetEast: "-1,28"
    pixelOffsetSouth: "0,6"
    pixelOffsetWest: "-1,28"
  - type: ItemSlots
    slots:
      turret-cannon:
        startingItem: RMCVehicleSPPAPCMinigun
        whitelist:
          components:
          - RMCHardpointItem
  - type: RMCHardpointSlots
    vehicleFamily: APC
    slots:
    - id: turret-cannon
      hardpointType: Cannon
      slotType: Cannon
      compatibilityId: SPPAPCTurret
      required: false
      insertDelay: 2.0
  - type: RMCHardpointVisual
    vehicleState: apc_turret_0

- type: entity
  parent: RMCAPCDualCannon
  id: RMCVehicleSPPAPCMinigun
  name: SPP APC minigun
  description: A minigun fitted to an SPP APC turret.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: apc_minigun
  - type: RMCHardpointItem
    hardpointType: Cannon
    vehicleFamily: APC
    slotType: Cannon
    compatibilityId: SPPAPCTurret
    damageMultiplier: 0.2
    repairCategory: Primary
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    showOverlay: true
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    overlayRsi: _RMC14/Structures/Vehicles/sppapc.rsi
    overlayState: apc_minigun_0
    fireWhileRotatingGraceDegrees: 20
    useBarrelDirectionForShots: true
    maxShotCurvatureDegrees: 10
  - type: GunMuzzleOffset
    useDirectionalOffsets: true
    rotateDirectionalOffsets: true
    offsetNorth: "0,-1.2"
    offsetEast: "0,-1.2"
    offsetSouth: "0,-1.2"
    offsetWest: "0,-1.2"
    muzzleOffset: "0,0"
    useAimDirection: true
  - type: RMCHardpointVisual
    vehicleState: apc_minigun_0

- type: entity
  parent: RMCAPCFrontCannon
  id: RMCVehicleSPPAPCAutocannon
  name: SPP APC autocannon
  description: A frontal autocannon hardpoint for an SPP APC.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: apc_autocannon
  - type: RMCHardpointItem
    compatibilityId: SPPAPC
  - type: GunMuzzleOffset
    useDirectionalOffsets: true
    rotateDirectionalOffsets: true
    offsetNorth: "0.5,-1.7"
    offsetEast: "0.5,-1.7"
    offsetSouth: "0.5,-1.7"
    offsetWest: "0.5,-1.7"
    muzzleOffset: "0,0"
    useAimDirection: true
  - type: RMCHardpointVisual
    vehicleState: apc_autocannon_0

- type: entity
  parent: RMCVehicleTankTowLauncher
  id: RMCVehicleSPPAPCHJ35Launcher
  name: HJ35 APC launcher
  description: A missile launcher fitted to the secondary mount of an SPP APC.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: hj35launcher
  - type: RMCHardpointItem
    hardpointType: Cannon
    vehicleFamily: APC
    slotType: Cannon
    compatibilityId: SPPAPC
    damageMultiplier: 0.11
  - type: RMCHardpointIntegrity
    maxIntegrity: 350
  - type: RMCHardpointVisual
    vehicleState: apc_hj35_0

- type: entity
  parent: RMCAPCFlareLauncher
  id: RMCVehicleSPPAPCFlareLauncher
  name: SPP APC flare launcher
  description: A flare launcher hardpoint for SPP APC support slots.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: spp_flare_launcher
  - type: RMCHardpointItem
    compatibilityId: SPPAPC
  - type: RMCHardpointVisual
    vehicleState: spp_flare_launcher_0
