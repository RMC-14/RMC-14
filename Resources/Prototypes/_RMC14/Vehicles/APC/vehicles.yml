- type: entity
  parent: RMCVehicleBase
  id: VehicleAPCBase
  abstract: true
  name: armored personnel carrier
  description: A rugged armored personnel carrier outfitted for battlefield support.
  components:
  - type: WarpPoint
    follow: true
    location: APC
  - type: GridVehicleMover
    maxSpeed: 5
    acceleration: 4
    deceleration: 10
    turnDelay: 0.4
    xenoBlockMinimumSize: Immobile
    xenoPushMinimumSize: Immobile
    weightClass: Light
  - type: VehicleOvercharge
    speedMultiplier: 1.4
    duration: 3
    cooldown: 15
    overchargeSound: /Audio/_RMC14/Vehicle/overdrive_activate.ogg
  - type: VehicleSpotlight
    radius: 7
    energy: 3
    softness: 2
  - type: Fixtures
    fixtures:
      world:
        shape:
          !type:PhysShapeAabb
          bounds: -1,-1.7,1,1.7
        density: 1200
        mask:
        - Impassable
        - HighImpassable
        - LowImpassable
        - LargeMobLayer
        - Vehicle
        layer:
        - LargeMobLayer
        - Vehicle
      mob:
        shape:
          !type:PhysShapeAabb
          bounds: -1,-1.7,1,1.7
        density: 1200
        mask:
        - MidImpassable
        - BarricadeImpassable
        - LargeMobLayer
        layer:
        - LargeMobLayer
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: VehicleFrameAPC # APC damage modifier
  - type: Sprite
    drawdepth: Mobs
    sprite: _RMC14/Structures/Vehicles/apc.rsi
    layers:
    - map: [ base ]
      state: apc_base
    - map: [ damaged_frame ]
      state: damaged_frame
      visible: false
    - map: [ primary ]
      state: PRIMARY
      visible: false
    - map: [ secondary ]
      state: SECONDARY
      visible: false
    - map: [ support ]
      state: SUPPORT
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: PointLight
    enabled: false
    radius: 12
    energy: 2.5
    softness: 2
    autoRot: true
    offset: "0,0.9"
  - type: VehicleHardpointVisuals
  - type: ItemSlots
    slots:
      port-gun-north:
        startingItem: VehicleAPCM56FPWPortGunRight
        insertOnInteract: false
        ejectOnInteract: false
        ejectOnUse: false
        locked: true
        disableEject: true
        whitelist:
          components:
          - VehiclePortGun
      port-gun-south:
        startingItem: VehicleAPCM56FPWPortGunLeft
        insertOnInteract: false
        ejectOnInteract: false
        ejectOnUse: false
        locked: true
        disableEject: true
        whitelist:
          components:
          - VehiclePortGun
  - type: HardpointSlots
    vehicleFamily: HardpointVehicleFamilyAPC
    slots:
    - id: primary
      hardpointType: HardpointTypeTurret
      slotType: HardpointSlotTypeTurret
      visualLayer: primary
      insertDelay: 2.5
      required: false
    - id: secondary
      hardpointType: HardpointTypeCannon
      slotType: HardpointSlotTypeCannon
      visualLayer: secondary
      insertDelay: 2.5
      required: false
    - id: support
      hardpointType: HardpointTypeSupportAttachment
      slotType: HardpointSlotTypeSupportAttachment
      visualLayer: support
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: HardpointTypeWheel
      slotType: HardpointSlotTypeWheel
      insertDelay: 1.5
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/apc_transport_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 10
    maxXenos: 3
    entryPoints:
    - offset: 1.5,0
      radius: 0.7
      interiorCoords: 1.55,2.65
    - offset: -1.5,0
      radius: 0.7
      interiorCoords: 1.55,-1.2

- type: entity
  parent: VehicleAPCBase
  id: VehicleAPC
  suffix: Drivable, APC, Base
  components:
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/apc_transport_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 18
    maxXenos: 3
    reservedPassengerPools:
    - slots: 2
      eligibleJobs:
      - CMVehicleCrewman
    - slots: 1
      eligibleJobs:
      - RMCJobSynthetic
      - RMCCorporateSynthetic
    entryPoints:
    - offset: 1.5,0
      radius: 0.7
      interiorCoords: 1.55,2.65
    - offset: -1.5,0
      radius: 0.7
      interiorCoords: 1.55,-1.2

- type: entity
  parent: VehicleAPC
  id: VehicleAPCTracked
  suffix: Drivable, APC, Base, Tracked
