## SPP

- type: entity
  parent: VehicleAPCBase
  id: VehicleSPPAPC
  name: SPP armored personnel carrier
  description: An armored personnel carrier configured for SPP forces.
  suffix: Drivable, APC, Base, SPP
  components:
  - type: GridVehicleMover
    maxSpeed: 5
    acceleration: 2.0
    deceleration: 7.5
    maxReverseSpeed: 2.5
    reverseAcceleration: 2.0
    turnDelay: 0.25
    turnInPlace: false
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/sppapc.rsi
    layers:
    - map: [ base ]
      state: sppapc_base
    - map: [ damaged_frame ]
      state: damaged_frame
      visible: false
    - map: [ primary ]
      state: PRIMARY
      visible: false
    - map: [ secondary ]
      state: SECONDARIES
      visible: false
    - map: [ support ]
      state: SUPPORT
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: ItemSlots
    slots:
      port-gun-north:
        startingItem: null
      port-gun-south:
        startingItem: null
      primary:
        startingItem: VehicleSPPAPCTurret
        whitelist:
          components:
          - HardpointItem
      wheel-1:
        startingItem: VehicleSPPAPCWheel
        whitelist:
          components:
          - VehicleWheelItem
  - type: HardpointSlots
    vehicleFamily: HardpointVehicleFamilyAPC
    slots:
    - id: primary
      hardpointType: HardpointTypeTurret
      slotType: HardpointSlotTypeTurret
      compatibilityId: HardpointCompatibilitySPPAPC
      visualLayer: primary
      insertDelay: 2.5
      required: false
    - id: secondary
      hardpointType: HardpointTypeCannon
      slotType: HardpointSlotTypeCannon
      compatibilityId: HardpointCompatibilitySPPAPC
      visualLayer: secondary
      insertDelay: 2.5
      required: false
    - id: support
      hardpointType: HardpointTypeSupportAttachment
      slotType: HardpointSlotTypeSupportAttachment
      compatibilityId: HardpointCompatibilitySPPAPC
      visualLayer: support
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: HardpointTypeWheel
      slotType: HardpointSlotTypeWheel
      compatibilityId: HardpointCompatibilitySPPAPC
      insertDelay: 1.5
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/spp_apc_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 14
    maxXenos: 4
    entryPoints:
    - offset: -1.5,0
      radius: 0.7
      interiorCoords: 4.45,-1.2
    - offset: 1.5,0
      radius: 0.7
      interiorCoords: 4.45,1.7
