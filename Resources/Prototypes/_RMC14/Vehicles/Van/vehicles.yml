- type: entity
  parent: VehicleSPPVan
  id: VehicleSPPVanArmed
  name: SPP van (armed)
  description: An SPP van fitted with a roof-mounted weapon.
  components:
  - type: Sprite
    layers:
    - map: [ base ]
      state: sppvant_base
    - map: [ damaged_frame ]
      state: damaged_frame
      visible: false
    - map: [ secondary ]
      state: SECONDARY
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: VehicleHardpointVisuals
  - type: ItemSlots
    slots:
      secondary:
        startingItem: VehicleSPPVanTurret
        whitelist:
          components:
          - HardpointItem
  - type: HardpointSlots
    vehicleFamily: Van
    slots:
    - id: secondary
      hardpointType: Secondary
      slotType: Launcher
      compatibilityId: SPPVan
      visualLayer: secondary
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: Wheel
      slotType: Wheel
      compatibilityId: SPPVan
      insertDelay: 1.5
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/spp_van_armed_interior.yml
