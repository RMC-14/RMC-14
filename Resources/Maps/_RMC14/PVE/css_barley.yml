    components:
    - type: MetaData
      name: Barley Guide
    - type: Transform
      pos: 16.19143,17.526728
      parent: 1
    - type: Paper
      content: >-
        [color=lavender]▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄[/color]

        [color=gray]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]

        [head=3]Barley Guide

        [color=gray]‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾[/color][/head]

        This is an OOC document to help explain the Barley and how to set it up. The other paper is a concise checklist of standard tasks for set up.


        The Barley is designed to be useable by a variety of factions, and as such lacks certain amenities that would be standard in a regular shipmap. There are no weapons or gear racks by default. Suggested placements for these items have been marked.


        Additionally, for flexibility, all access requirements have been removed. Command consoles, vendors, lockers, and all doors should be accessible by anyone without ID card modification.


        [italic](Using command consoles still requires the relevant training.)[/italic]


        This does mean that all players will be able to, for example, take advanced medical supplies from the medbay, if they are so inclined.


        [bold]Supplies[/bold]

        The map largely lacks any round-impacting gear by default. The following supplies should be noted:

        [bullet]Tools (abundant)

        [bullet]1x Metal Sheets crate

        [bullet]Several storage solutions crates


        It does not have:

        [bullet]Plentiful light sources (No flares. Flashlights and lamps are limited)

        [bullet]Weapons beyond simple knives

        [bullet]Any storage or armor besides basic civilian outerwear


        A variety of basic civilian clothes have been provided in the hypersleep locker room to ensure everyone has something to wear.


        [color=gray][head=3]‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾[/color][/head]

        [bold]Overwatch[/bold]

        The command consoles (Overwatch and Groundside Operations) both have their Overwatch group set to "None" by default. This will have to be changed for OW to function properly.


        The process is identical for both consoles.


        ViewVariables -> Server Components

        Find OverwatchConsoleComponent

        Change the "Group" field to the appropriate faction


        A list of useable groups:

        [bullet]UNMC (for all standard UNMC squads, and "Unassigned")

        [bullet]SPP

        [bullet]WeYa (for PMCs)

        [bullet]CLF

        [bullet]Freelancer

        [bullet]Whiskey Troop

        [bullet]SOF

        [bullet]Provost


        (Not an exhaustive list)


        Except for those otherwise stated, the group name matches the relevant squad assignment.


        Ensure that all players have been added to the correct squad.


        [color=gray][head=3]‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾[/color][/head]
