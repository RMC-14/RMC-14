- author: Vermidia
  changes:
  - message: Fixed Impale and Tail Trip miss cooldowns being too long (1.5s -> 0.7s)
    type: Fix
  - message: Fixed Impale having less range than Tail Trip. They're both 2 now.
    type: Fix
  - message: Fixed Impale and Tail Trip deselecting on hit.
    type: Fix
  - message: Fixed Berserk Ravager not capping its applied Frenzy pheros to 2.9, and
      Dancer Praetorian not capping its Recovery pheros to 3.
    type: Fix
  - message: Fixed Dancer Praetorian's general health regen not being higher than
      a base xeno. It's now 35% better.
    type: Fix
  - message: Fixed Dodge still giving a speed boost while in a crowd.
    type: Fix
  - message: Fixed Impale rarely not stabbing twice if multiple Dancers are attempting
      to do so in a short span of time.
    type: Fix
  - message: Corrected various ability descriptions (mostly involving tail stabs and
      Dancer Praetorian)
    type: Fix
  - message: Critting/killing an enemy (or just attacking them if they're crit) as
      a Dancer Praetorian now spreads critical marks, which look different and refresh
      the Dancer's ability cooldowns if hit.
    type: Add
  - message: Dancer Praetorian now has Tail Lance Stab and Tail Lance Slam, they share
      cooldowns. The former is a normal tailstab, while the latter deals much less
      damage, has less cooldown, but fully pierces armor.
    type: Add
  - message: Dancer Praetorians by default now dodge every 6th projectile that would
      hit them (in a short span of time, and not while resting or crit/unconscious).
      When dodge is active this is every 3rd projectile instead. This doesn't count
      rockets or sniper bullets.
    type: Add
  - message: Dodge creates afterimages of the praetorian while active.
    type: Add
  - message: Fixed impale having an orange square on the icon
    type: Fix
