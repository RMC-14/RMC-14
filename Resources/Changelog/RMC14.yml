- author: Dygon
  changes:
  - message: The ML66D heavy machine gun can now be acquired through requisitions,
      the combat engineer vendor, and the squad leader vendor. The ML66D is a machine-gun
      emplacement with IFF capability that requires tools to assemble or disassemble.
    type: Add
  - message: The M2C heavy machine gun is now available through requisitions. The
      M2C is a rapidly deployable machine-gun emplacement that can be rotated, set
      up, and packed up without tools. Firing it for too long without allowing it
      to cool will cause it to overheat and take damage. It can be repaired with a
      welder.
    type: Add
  - message: "The dropship part fabricator can now print the A/A-32-P Sentry Defense\
      \ System (200 points) and the MTU-4B Door Gunner Hardpoint System (50 points).\
      \ These can be installed in a dropship\u2019s weapon or utility slots and deploy\
      \ either an omnidirectional sentry gun or a scoped heavy machine-gun nest."
    type: Add
  - message: Fuel pump sentries can now be deployed on red alert or higher, and can
      be undeployed.
    type: Tweak
  id: 2908
  time: '2026-02-06T00:06:55.0000000+00:00'
