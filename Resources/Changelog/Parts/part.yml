author: DrSmugleaf
changes:
- type: Fix
  message: Fixed a source of server-side lag, specially in high pop.
- type: Fix
  message: Fixed correspondents not getting universal recorders in their vendor bundle.
- type: Fix
  message: Fixed xenos being able to interact with M-6 folding barricades.
- type: Fix
  message: Fixed not being able to open the storage UI on the scout helmet.
- type: Fix
  message: Fixed dropship consoles, evacuation pod computers, and quickmeds being unpowered.
- type: Fix
  message: Fixed the Warden jumpsuit being invisible.
- type: Fix
  message: Fixed nested contents within supply drop crates being destroyed upon landing, such as shells inside shell boxes, or XM88 bullets inside their kits.
- type: Fix
  message: Fixed Almayer hangar bay destinations not being named.
